<script>

  // ===================== VISUALIZAÇÃO DO ESTOQUE =====================
  var evItens = [];

  function carregarEstoqueView() {
    document.getElementById('evBody').innerHTML =
      '<tr class="loading-row"><td colspan="11"><div class="spinner"></div>Carregando...</td></tr>';
    google.script.run
      .withSuccessHandler(function(res) { evRender((res && res.data) || res); })
      .withFailureHandler(function(e) { snack('Erro: ' + e.message); })
      .getEstoqueBootstrapData('estoque-view');
  }

  function evRender(lista) {
    evItens = lista || [];
    var projs = {}, tipos = {}, status = {};
    evItens.forEach(function(i) {
      if (i.projeto) projs[i.projeto] = 1;
      var tipo = evTipoItem(i);
      if (tipo) tipos[tipo] = 1;
      if (i.status) status[i.status] = 1;
    });
    var sel = document.getElementById('evFilterProjeto');
    var cur = sel.value;
    sel.innerHTML = '<option value="">Todos os projetos</option>' +
      Object.keys(projs).sort().map(function(p) {
        return '<option value="' + esc(p) + '">' + esc(p) + '</option>';
      }).join('');
    sel.value = cur;
    var selTipo = document.getElementById('evFilterTipo');
    var curTipo = selTipo.value;
    selTipo.innerHTML = '<option value="">Todos os tipos</option>' +
      Object.keys(tipos).sort().map(function(t) {
        return '<option value="' + esc(t) + '">' + esc(t) + '</option>';
      }).join('');
    selTipo.value = curTipo;
    var selStatus = document.getElementById('evFilterStatus');
    var curStatus = selStatus.value;
    selStatus.innerHTML = '<option value="">Todos os status</option>' +
      Object.keys(status).sort().map(function(s) {
        return '<option value="' + esc(s) + '">' + esc(s) + '</option>';
      }).join('');
    selStatus.value = curStatus;
    evStats(evItens);
    evFiltrar();
  }

  function evTipoItem(it) {
    return String((it && (it.tipoItem || it.tipo)) || '').trim();
  }

  function evStats(lista) {
    var ok = 0, baixo = 0, critico = 0, pend = 0;
    lista.forEach(function(it) {
      var n = evNivel(it);
      if (n === 'ok') ok++;
      else if (n === 'baixo') baixo++;
      else if (n === 'critico') critico++;
      if (it.qtdePedidaPendente && Number(it.qtdePedidaPendente) > 0) pend++;
    });
    document.getElementById('evStatTotal').textContent    = lista.length;
    document.getElementById('evStatOk').textContent       = ok;
    document.getElementById('evStatBaixo').textContent    = baixo;
    document.getElementById('evStatCritico').textContent  = critico;
    document.getElementById('evStatPendente').textContent = pend;
  }

  function evNivel(it) {
    var q   = Number(it.qtde);
    var min = Number(it.estoqueMinimo);
    if (isNaN(q)) return 'desconhecido';
    if (q <= 0)   return 'critico';
    if (!isNaN(min) && min > 0) {
      if (q <= min)       return 'critico';
      if (q <= min * 1.5) return 'baixo';
    }
    return 'ok';
  }

  function evFiltrar() {
    var q      = document.getElementById('evSearch').value.toLowerCase().trim();
    var proj   = document.getElementById('evFilterProjeto').value.toLowerCase();
    var tipo   = document.getElementById('evFilterTipo').value.toLowerCase();
    var status = document.getElementById('evFilterStatus').value.toLowerCase();
    var f = evItens.filter(function(it) {
      var tipoItem = evTipoItem(it);
      if (q && !([it.descricao, it.projeto, tipoItem, it.localizacao, it.idItem, it.numeroPedido, it.responsavel]
        .join(' ').toLowerCase().includes(q))) return false;
      if (proj   && (it.projeto  || '').toLowerCase() !== proj)   return false;
      if (tipo   && tipoItem.toLowerCase() !== tipo)   return false;
      if (status && (it.status   || '').toLowerCase() !== status) return false;
      return true;
    });
    evRenderTabela(f);
  }

  function evRenderTabela(lista) {
    var tb = document.getElementById('evBody');
    if (!lista.length) {
      tb.innerHTML = '<tr class="empty-row"><td colspan="11">Nenhum item encontrado.</td></tr>';
      return;
    }
    tb.innerHTML = lista.map(function(it, idx) {
      var uid   = 'ev-' + idx;
      var nivel = evNivel(it);
      var qCls  = nivel === 'critico' ? 'color:#b3261e;font-weight:700' :
                  nivel === 'baixo'   ? 'color:#e65100;font-weight:700' : 'color:#137333;font-weight:700';
      var vCls  = evValCls(it.validade);
      var pedPend = (it.qtdePedidaPendente !== '' && Number(it.qtdePedidaPendente) > 0)
        ? '<span class="chip chip-blue">' + esc(String(it.qtdePedidaPendente)) + '</span>'
        : '—';

      var r1 = '<tr class="par-main" data-pair="' + uid + '">' +
        '<td><button style="width:28px;height:28px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-faint);border-radius:var(--r-sm);" onclick="evToggle(\'' + uid + '\')">' +
          '<span class="material-symbols-outlined" style="font-size:18px;transition:transform .25s;" id="evarw-' + uid + '">chevron_right</span>' +
        '</button></td>' +
        '<td><span class="chip chip-blue">' + esc(it.projeto || '—') + '</span></td>' +
        '<td style="font-weight:500;max-width:220px;">' + esc(it.descricao) + '</td>' +
        '<td>' + itemTipoChip(evTipoItem(it)) + '</td>' +
        '<td style="' + vCls + '">' + esc(it.validade || '—') + '</td>' +
        '<td style="color:var(--text-muted);">' + esc(it.localizacao || '—') + '</td>' +
        '<td style="text-align:center;' + qCls + '">' + (it.qtde !== undefined && it.qtde !== "" ? it.qtde : "—") + '</td>' +
        '<td style="text-align:center;color:var(--text-muted);">' + (it.estoqueMinimo !== undefined && it.estoqueMinimo !== "" ? it.estoqueMinimo : "—") + '</td>' +
        '<td>' + evChipStatus(it.status) + '</td>' +
        '<td style="text-align:center;">' + pedPend + '</td>' +
        '<td style="font-size:11.5px;color:var(--text-muted);">' + evPedidoLink(it.numeroPedido) + '</td>' +
      '</tr>';

      var r2 = '<tr class="par-detail" id="evdet-' + uid + '" data-pair="' + uid + '" style="display:none;">' +
        '<td colspan="11" style="padding:4px 0 12px 0;background:#fafbff;">' +
          '<div style="padding:8px 12px 6px 52px;display:flex;flex-wrap:wrap;gap:6px 28px;">' +
            '<span style="display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--text-muted);">' +
              '<span class="material-symbols-outlined" style="font-size:15px;color:#b0b8c8;">tag</span>' +
              '<b style="font-size:10px;text-transform:uppercase;color:var(--text-faint);">ID:</b>&nbsp;' + esc(it.idItem || '—') +
            '</span>' +
            '<span style="display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--text-muted);">' +
              '<span class="material-symbols-outlined" style="font-size:15px;color:#b0b8c8;">history</span>' +
              '<b style="font-size:10px;text-transform:uppercase;color:var(--text-faint);">Última Alteração:</b>&nbsp;' + esc(it.ultimaAlteracao || '—') +
            '</span>' +
            '<span style="display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--text-muted);">' +
              '<span class="material-symbols-outlined" style="font-size:15px;color:#b0b8c8;">person</span>' +
              '<b style="font-size:10px;text-transform:uppercase;color:var(--text-faint);">Responsável:</b>&nbsp;' + esc(it.responsavel || '—') +
            '</span>' +
          '</div>' +
        '</td>' +
      '</tr>';

      return r1 + r2;
    }).join('');

    document.querySelectorAll('#page-estoque-view .par-main, #page-estoque-view .par-detail').forEach(function(tr) {
      var pair = tr.dataset.pair;
      tr.addEventListener('mouseenter', function() {
        document.querySelectorAll('[data-pair="' + pair + '"]').forEach(function(el) { el.classList.add('par-hover'); });
      });
      tr.addEventListener('mouseleave', function() {
        document.querySelectorAll('[data-pair="' + pair + '"]').forEach(function(el) { el.classList.remove('par-hover'); });
      });
    });
  }

  function evToggle(uid) {
    var det = document.getElementById('evdet-' + uid);
    var arw = document.getElementById('evarw-' + uid);
    if (!det) return;
    var open = det.style.display === 'table-row';
    document.querySelectorAll('#evBody .par-detail').forEach(function(row) {
      if (row.id !== 'evdet-' + uid) row.style.display = 'none';
    });
    document.querySelectorAll('#evBody [id^="evarw-"]').forEach(function(icon) {
      if (icon.id !== 'evarw-' + uid) icon.style.transform = '';
    });
    det.style.display = open ? 'none' : 'table-row';
    if (arw) arw.style.transform = open ? '' : 'rotate(90deg)';
  }

  function evValCls(val) {
    if (!val || val === '—') return '';
    try {
      var p = val.split('/');
      if (p.length !== 3) return '';
      var d = new Date(Number(p[2]), Number(p[1]) - 1, Number(p[0]));
      var hoje = new Date(); hoje.setHours(0,0,0,0);
      var diff = (d - hoje) / 86400000;
      if (diff < 0)  return 'color:#b3261e;font-weight:600;';
      if (diff < 90) return 'color:#e65100;font-weight:500;';
      return 'color:#137333;';
    } catch(e) { return ''; }
  }

  function evChipStatus(s) {
    if (!s) return '<span style="color:#9aa3b0">—</span>';
    var n = s.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    var map = { 'ativo':'chip-green', 'inativo':'chip', 'vencido':'chip-red' };
    return '<span class="chip ' + (map[n]||'chip') + '">' + esc(s) + '</span>';
  }
  // ===================== FIM VISUALIZAÇÃO DO ESTOQUE =====================

  function ensureEstoqueFramePage() {
    var content = document.querySelector('.content');
    var page = document.getElementById('page-estoque-app');
    if (!content) return page;
    if (!page) {
      page = document.createElement('div');
      page.className = 'page';
      page.id = 'page-estoque-app';
      page.style.height = '100%';
      page.innerHTML =
        '<div id="estoqueInlineShell" style="height:100%;overflow:auto;padding:18px">' +
          '<div class="stats-row" id="eiStatsRow" style="grid-template-columns:repeat(5,1fr);border-radius:var(--r-lg) var(--r-lg) 0 0;border-top:1px solid #e8edf8;margin-bottom:0">' +
            '<div class="stat-card" id="eiCard1" style="--accent:#1266f1;border-radius:var(--r-lg) 0 0 0"><div class="stat-value" id="eiStat1">0</div><div class="stat-label" id="eiLabel1">Total</div><div class="stat-icon"><span class="material-symbols-outlined" id="eiIcon1">inventory_2</span></div></div>' +
            '<div class="stat-card" id="eiCard2" style="--accent:#137333"><div class="stat-value" id="eiStat2">0</div><div class="stat-label" id="eiLabel2">Ativos</div><div class="stat-icon"><span class="material-symbols-outlined" id="eiIcon2">check_circle</span></div></div>' +
            '<div class="stat-card" id="eiCard3" style="--accent:#e65100"><div class="stat-value" id="eiStat3">0</div><div class="stat-label" id="eiLabel3">Atenção</div><div class="stat-icon"><span class="material-symbols-outlined" id="eiIcon3">warning</span></div></div>' +
            '<div class="stat-card" id="eiCard4" style="--accent:#b3261e"><div class="stat-value" id="eiStat4">0</div><div class="stat-label" id="eiLabel4">Crítico</div><div class="stat-icon"><span class="material-symbols-outlined" id="eiIcon4">error</span></div></div>' +
            '<div class="stat-card" id="eiCard5" style="--accent:#6a1b9a;border-radius:0 var(--r-lg) 0 0"><div class="stat-value" id="eiStat5">0</div><div class="stat-label" id="eiLabel5">Projetos</div><div class="stat-icon"><span class="material-symbols-outlined" id="eiIcon5">folder_open</span></div></div>' +
          '</div>' +
          '<div class="toolbar-card">' +
            '<div class="search-wrap"><span class="material-symbols-outlined">search</span><input type="text" id="eiSearch" placeholder="Buscar..." oninput="renderEstoqueInline()"></div>' +
            '<select class="f-input f-select" id="eiRelTipo" onchange="window._relatorioEstoqueTipo=this.value;renderRelatoriosInline()" style="display:none;max-width:230px;height:40px"><option value="estoque">Estoque por projeto</option><option value="validade">Próximos da validade</option><option value="vencidos">Itens vencidos</option></select>' +
            '<select class="f-input f-select" id="eiPedidoStatus" onchange="renderPedidosInline()" style="display:none;max-width:190px;height:40px"><option value="">Todos os status</option></select>' +
            '<select class="f-input f-select" id="eiMovTipoFiltro" onchange="renderMovimentacoesInline()" style="display:none;max-width:230px;height:40px"><option value="">Todos os movimentos</option></select>' +
            '<button class="btn-new" id="eiBtnNovoItem" onclick="abrirFormItemInline()" style="display:none"><span class="material-symbols-outlined">add</span> Novo Item</button>' +
            '<button class="btn-new" id="eiBtnPlanejarPedido" onclick="abrirPlanejamentoPedidoInline()" style="display:none"><span class="material-symbols-outlined">shopping_cart</span> Planejar Pedido</button>' +
            '<button class="btn-new" id="eiBtnPlanejarDescarte" onclick="abrirPlanejamentoDescarteInline()" style="display:none;background:#b3261e"><span class="material-symbols-outlined">delete_sweep</span> Preparar Descarte</button>' +
            '<button class="btn-new" id="eiBtnNovoPedido" onclick="abrirFormPedidoInline()" style="display:none"><span class="material-symbols-outlined">add</span> Novo Pedido</button>' +
            '<button class="btn-new" id="eiBtnNovaMov" onclick="abrirFormMovInline()" style="display:none"><span class="material-symbols-outlined">add</span> Nova Movimentação</button>' +
            '<button class="btn-new" id="eiBtnImprimirRel" onclick="imprimirRelatorioEstoque()" style="display:none"><span class="material-symbols-outlined">print</span> Imprimir</button>' +
            '<button class="btn-new" onclick="carregarEstoqueInline()" style="background:var(--primary-light);color:var(--primary);box-shadow:none;border:1.5px solid var(--primary-border)"><span class="material-symbols-outlined">refresh</span> Atualizar</button>' +
          '</div>' +
          '<div class="table-card"><table class="data-table" id="eiTable" style="min-width:820px"><thead id="eiHead"></thead><tbody id="eiBody"><tr class="loading-row"><td><div class="spinner"></div>Carregando...</td></tr></tbody></table></div>' +
        '</div>' +
        '<div class="modal-overlay" id="modalItemInline" onclick="fecharModalSeClicouFora(event,&quot;modalItemInline&quot;)">' +
          '<div class="modal-box" style="max-width:700px">' +
            '<div class="modal-header">' +
              '<div class="modal-header-icon"><span class="material-symbols-outlined">inventory</span></div>' +
              '<div><div class="modal-header-title">NOVO ITEM DE ESTOQUE</div><div class="modal-header-sub">Cadastro de item para pedidos e controle de estoque</div></div>' +
              '<button class="modal-close" onclick="fecharOverlay(&quot;modalItemInline&quot;)"><span class="material-symbols-outlined">close</span></button>' +
            '</div>' +
            '<div class="modal-body">' +
              '<div class="form-section">' +
                '<div class="section-label"><span class="material-symbols-outlined">label</span>Identificação do Item</div>' +
                '<div class="field-row cols-2" style="margin-bottom:12px">' +
                  '<div><label class="field-label" for="iiProjeto">Projeto <span class="required-star">*</span></label><select id="iiProjeto" class="f-input f-select"><option value="">— Selecione —</option></select><div class="field-error" id="errIiProjeto">Selecione um projeto.</div></div>' +
                  '<div><label class="field-label" for="iiTipo">Tipo <span class="required-star">*</span></label><select id="iiTipo" class="f-input f-select"><option value="">— Selecione —</option></select><div class="field-error" id="errIiTipo">Selecione um tipo.</div></div>' +
                '</div>' +
                '<div style="margin-bottom:12px"><label class="field-label" for="iiDescricao">Descrição do Item <span class="required-star">*</span></label><input type="text" id="iiDescricao" class="f-input large" placeholder="Ex: Standard Bulk Supply Box"><div class="field-error" id="errIiDescricao">Campo obrigatório.</div></div>' +
                '<div class="field-row cols-2">' +
                  '<div><label class="field-label" for="iiLaboratorio">Laboratório <span class="required-star">*</span></label><select id="iiLaboratorio" class="f-input f-select"><option value="">— Selecione —</option></select><div class="field-error" id="errIiLaboratorio">Selecione um laboratório.</div></div>' +
                  '<div><label class="field-label" for="iiStatus">Status</label><select id="iiStatus" class="f-input f-select"><option>Ativo</option><option>Inativo</option></select></div>' +
                '</div>' +
              '</div>' +
              '<div class="form-section">' +
                '<div class="section-label"><span class="material-symbols-outlined">warehouse</span>Controle e Armazenamento</div>' +
                '<div class="field-row cols-2" style="margin-bottom:12px">' +
                  '<div><label class="field-label" for="iiLocalizacao">Localização padrão</label><select id="iiLocalizacao" class="f-input f-select"><option value="">— Selecione —</option></select></div>' +
                  '<div><label class="field-label" for="iiEstoqueMin">Estoque mínimo</label><input type="number" id="iiEstoqueMin" class="f-input" min="0" placeholder="0"></div>' +
                '</div>' +
                '<label class="field-label" for="iiObs">Observações</label><textarea id="iiObs" class="f-input" style="height:78px;padding-top:10px;resize:vertical" placeholder="Detalhes adicionais do item, condições de armazenamento, uso preferencial..."></textarea>' +
              '</div>' +
              '<button class="btn-save" id="btnSalvarItemInline" onclick="salvarItemInline()"><span class="material-symbols-outlined">save</span> Salvar Item</button>' +
              '<div class="status-msg" id="statusItemInline"></div>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="modal-overlay" id="modalPedidoInline" onclick="fecharModalSeClicouFora(event,&quot;modalPedidoInline&quot;)">' +
          '<div class="modal-box" style="max-width:760px">' +
            '<div class="modal-header">' +
              '<div class="modal-header-icon"><span class="material-symbols-outlined">inventory_2</span></div>' +
              '<div><div class="modal-header-title">NOVO PEDIDO</div><div class="modal-header-sub">Registro de pedido de estoque</div></div>' +
              '<button class="modal-close" onclick="fecharOverlay(&quot;modalPedidoInline&quot;)"><span class="material-symbols-outlined">close</span></button>' +
            '</div>' +
            '<div class="modal-body">' +
              '<div class="form-section">' +
                '<div class="section-label"><span class="material-symbols-outlined">assignment</span>Dados do Pedido</div>' +
                '<div class="field-row cols-2" style="margin-bottom:12px">' +
                  '<div><label class="field-label" for="piNumero">N° do Pedido <span class="required-star">*</span></label><input type="text" id="piNumero" class="f-input" placeholder="Ex: PED-2026-001"><div class="field-error" id="errPiNumero">Campo obrigatório.</div></div>' +
                  '<div><label class="field-label" for="piData">Data do Pedido</label><input type="date" id="piData" class="f-input"></div>' +
                '</div>' +
                '<div class="field-row cols-2" style="margin-bottom:12px">' +
                  '<div><label class="field-label" for="piProjeto">Projeto <span class="required-star">*</span></label><select id="piProjeto" class="f-input f-select" onchange="onPedidoProjetoChange()"><option value="">— Selecione —</option></select><div class="field-error" id="errPiProjeto">Selecione um projeto.</div></div>' +
                  '<div><label class="field-label" for="piLab">Laboratório <span class="required-star">*</span></label><select id="piLab" class="f-input f-select" onchange="onPedidoLabChange()"><option value="">— Selecione o projeto primeiro —</option></select><div class="field-error" id="errPiLab">Selecione um laboratório.</div></div>' +
                '</div>' +
                '<label class="field-label" for="piObs">Observação</label><input type="text" id="piObs" class="f-input" placeholder="Observações adicionais">' +
              '</div>' +
              '<div class="form-section" id="piSecaoItens" style="display:none">' +
                '<div class="section-label"><span class="material-symbols-outlined">category</span>Itens do Pedido</div>' +
                '<div class="pedido-item-form-grid">' +
                  '<div><label class="field-label" for="piTipo">Tipo</label><select id="piTipo" class="f-input f-select" onchange="onPedidoTipoChange()"><option value="">— Tipo —</option></select></div>' +
                  '<div><label class="field-label" for="piItem">Item</label><select id="piItem" class="f-input f-select"><option value="">— Selecione o tipo —</option></select></div>' +
                  '<div><label class="field-label" for="piQtd">Qtd</label><input type="number" id="piQtd" class="f-input" min="1" value="1"></div>' +
                  '<div style="padding-top:18px"><button class="btn-new" style="height:40px;padding:0 12px" onclick="adicionarItemPedidoInline()"><span class="material-symbols-outlined">add</span></button></div>' +
                '</div>' +
                '<div id="piItensWrap" style="display:none;background:#fff;border:1.5px solid #e0e6f0;border-radius:var(--r-md);overflow:hidden">' +
                  '<table style="width:100%;border-collapse:collapse"><thead><tr style="background:#f0f4ff"><th style="padding:7px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--primary);border-bottom:1px solid #e0e6f0;text-align:left">Tipo</th><th style="padding:7px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--primary);border-bottom:1px solid #e0e6f0;text-align:left">Descrição</th><th style="padding:7px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--primary);border-bottom:1px solid #e0e6f0;text-align:left">Qtd</th><th style="padding:7px 10px;border-bottom:1px solid #e0e6f0"></th></tr></thead><tbody id="piItensBody"></tbody></table>' +
                '</div>' +
              '</div>' +
              '<button class="btn-save" id="btnSalvarPedidoInline" onclick="salvarPedidoInline()"><span class="material-symbols-outlined">save</span> Salvar Pedido</button>' +
              '<div class="status-msg" id="statusPedidoInline"></div>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="modal-overlay" id="modalReceberPedidoInline" onclick="fecharModalSeClicouFora(event,&quot;modalReceberPedidoInline&quot;)">' +
          '<div class="modal-box" style="max-width:820px">' +
            '<div class="modal-header">' +

  function irParaEstoqueApp(pagina) {
    setCurrentPage('estoque-app');

    document.querySelectorAll('.nav-group-body').forEach(function(el) { el.classList.remove('open'); });

    document.getElementById('navEstoqueToggle').classList.add('open');
    document.getElementById('navEstoqueBody').classList.add('open');

    var ids = {
      itens: 'navEstItens',
      pedidos: 'navEstPedidos',
      descartes: 'navEstDescartes',
      movimentacoes: 'navEstMovimentacoes',
      relatorios: 'navEstRelatorios'
    };
    var navEl = document.getElementById(ids[pagina]);
    if (navEl) navEl.classList.add('active');

    var titulos = {
      itens: { label: 'Cadastro de Itens de Estoque', icon: 'inventory' },
      pedidos: { label: 'Pedidos', icon: 'inventory_2' },

      movimentacoes: { label: 'Movimentações de Estoque', icon: 'swap_vert' },
      relatorios: { label: 'Relatórios de Estoque', icon: 'assessment' }

    document.querySelectorAll('.page').forEach(function(el) { el.classList.remove('active'); });
    var page = ensureEstoqueFramePage();
    if (page) page.classList.add('active');
    resetAppScrollPosition();

    updateFloatingAddButton();
    carregarEstoqueInlineBootstrap();

  function applyEstoqueBootstrapConfig(cfg) {
    cfg = cfg || {};
    ESTOQUE_CONFIG.laboratorios = cfg.laboratorios && cfg.laboratorios.length ? cfg.laboratorios : ESTOQUE_CONFIG.laboratorios;
    ESTOQUE_CONFIG.localizacoes = cfg.localizacoes && cfg.localizacoes.length ? cfg.localizacoes : ESTOQUE_CONFIG.localizacoes;
    ESTOQUE_CONFIG.tiposItem = cfg.tiposItem && cfg.tiposItem.length ? cfg.tiposItem : ESTOQUE_CONFIG.tiposItem;
    _estoqueConfigLoaded = true;
  }

  function carregarEstoqueInlineBootstrap() {
    var body = document.getElementById('eiBody');
    if (body) body.innerHTML = '<tr class="loading-row"><td colspan="9"><div class="spinner"></div>Carregando...</td></tr>';
    google.script.run
      .withSuccessHandler(function(res) {
        res = res || {};
        applyEstoqueBootstrapConfig(res.config || {});
        setEstoqueInlineDadosState(res.data || {});
        if (_estoqueInlinePagina === 'relatorios') setEstoqueInlineDadosState({ estoque: res.data || [] });
        if (_pedidoFiltroInicial) {
          var s = document.getElementById('eiSearch');
          if (s) s.value = _pedidoFiltroInicial;
          _pedidoFiltroInicial = '';
        }
        renderEstoqueInline();
      })
      .withFailureHandler(function(e) {
        estoqueInlineErro(e);
      })
      .getEstoqueBootstrapData(_estoqueInlinePagina);
  }

  function carregarEstoqueConfig(done) {
    if (_estoqueConfigLoaded) {
      if (done) done();
      return;
    }
    google.script.run
      .withSuccessHandler(function(cfg) {
        applyEstoqueBootstrapConfig(cfg || {});
        if (done) done();
      })
      .withFailureHandler(function() {
        _estoqueConfigLoaded = true;
        if (done) done();
      })
      .getEstoqueConfig();
  }

  function carregarEstoqueInline() {
    var body = document.getElementById('eiBody');
    if (body) body.innerHTML = '<tr class="loading-row"><td colspan="9"><div class="spinner"></div>Carregando...</td></tr>';
    if (_estoqueInlinePagina === 'pedidos') {
      google.script.run
        .withSuccessHandler(function(d) {
          setEstoqueInlineDadosState(d || {});
          if (_pedidoFiltroInicial) {
            var s = document.getElementById('eiSearch');
            if (s) s.value = _pedidoFiltroInicial;
            _pedidoFiltroInicial = '';
          }
          renderEstoqueInline();
        })
        .withFailureHandler(function(e) { estoqueInlineErro(e); })
        .getPedidosEstoque();
      return;
    }
    if (_estoqueInlinePagina === 'itens') {
      google.script.run
        .withSuccessHandler(function(d) { setEstoqueInlineDadosState(d || {}); renderEstoqueInline(); })
        .withFailureHandler(function(e) { estoqueInlineErro(e); })
        .getItensEstoque();
      return;
    }
    if (_estoqueInlinePagina === 'descartes') {
      google.script.run
        .withSuccessHandler(function(d) { setEstoqueInlineDadosState(d || {}); renderEstoqueInline(); })
        .withFailureHandler(function(e) { estoqueInlineErro(e); })
        .getDescartesEstoque();
      return;
    }
    if (_estoqueInlinePagina === 'movimentacoes') {
      google.script.run
        .withSuccessHandler(function(d) { setEstoqueInlineDadosState(d || {}); renderEstoqueInline(); })
        .withFailureHandler(function(e) { estoqueInlineErro(e); })
        .getMovimentacoesEstoque();
      return;
    }
    if (_estoqueInlinePagina === 'relatorios') {
      google.script.run
        .withSuccessHandler(function(d) { setEstoqueInlineDadosState({ estoque: d || [] }); renderEstoqueInline(); })
        .withFailureHandler(function(e) { estoqueInlineErro(e); })
        .getEstoque();
      return;
    }
    renderEstoqueInline();
  }

  function getRelatorioEstoqueTipo() {
    var sel = document.getElementById('eiRelTipo');
    var tipo = (sel && sel.value) || _relatorioEstoqueTipo || 'estoque';
    _relatorioEstoqueTipo = tipo;
    return tipo;
  }

  function filtrarItensRelatorioPorTipo(lista, tipoRel) {
    return (lista || []).filter(function(it) {
      var dias = diasAteValidade(it.validade);
      var st = String(it.status || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
      if (tipoRel === 'validade') return (dias >= 0 && dias <= 90) || st.indexOf('vence em breve') >= 0 || st.indexOf('proximo') >= 0;
      if (tipoRel === 'vencidos') return dias < 0 || st.indexOf('vencido') >= 0;
      return true;
    });
  }

  function getItensRelatorioFiltrados() {
    var estoque = ((_estoqueInlineDados || {}).estoque || []);
    var tipoRel = getRelatorioEstoqueTipo();
    var q = ((document.getElementById('eiSearch') || {}).value || '').toLowerCase().trim();
    return filtrarItensRelatorioPorTipo(estoque, tipoRel).filter(function(it) {
      if (!q) return true;
      return [it.projeto, it.descricao, it.tipoItem, it.validade, it.localizacao, it.status, it.numeroPedido].join(' ').toLowerCase().indexOf(q) >= 0;
    }).sort(function(a, b) {
      return String(a.projeto || '').localeCompare(String(b.projeto || '')) || sortValidade(a.validade, b.validade);
    });
  }

  function diasAteValidade(val) {
    if (!val || val === '—') return 999999;
    var s = String(val).trim();
    var p = s.split('/');
    if (p.length === 3) {
      var d = new Date(Number(p[2]), Number(p[1]) - 1, Number(p[0]));
      var hoje = new Date(); hoje.setHours(0,0,0,0);
      return Math.floor((d - hoje) / 86400000);
    }
    p = s.split('-');
    if (p.length !== 3) return 999999;
    var d = new Date(Number(p[0]), Number(p[1]) - 1, Number(p[2]));
    var hoje = new Date(); hoje.setHours(0,0,0,0);
    return Math.floor((d - hoje) / 86400000);
  }

  function sortValidade(a, b) {
    return diasAteValidade(a) - diasAteValidade(b);
  }

    var itens = (mapa[pedido.idPedido] || []).map(function(it, idx) {
      var solicitada = Number(it.qtdSolicitada || 0);
      var recebida = Number(it.qtdRecebida || 0);
      return {
        idx: idx,
        idItem: it.idItem,
        descricao: it.descricao,
        tipo: it.tipo,
        qtdSolicitada: solicitada,
        qtdRecebida: recebida,
        pendente: Math.max(0, solicitada - recebida),
        status: it.status
      };
    }).filter(function(it) { return it.pendente > 0; });
    if (!itens.length) {

  function salvarRecebimentoPedidoInline() {
    var rec = _recebimentoPedidoInline;
    if (!rec) return;
    var itens = [];
    var ok = true;
    rec.itens.forEach(function(it, idx) {
      var qtdEl = document.getElementById('rpQtd-' + idx);
      var valEl = document.getElementById('rpVal-' + idx);
      var qtd = Number(qtdEl.value || 0);
      qtdEl.classList.remove('invalid');
      valEl.classList.remove('invalid');
      if (qtd < 0 || qtd > it.pendente) {
        qtdEl.classList.add('invalid');
        ok = false;
      }
      if (qtd > 0 && !valEl.value) {
        valEl.classList.add('invalid');
        ok = false;
      }
      if (qtd > 0) {
        itens.push({
          idItem: it.idItem,
          descricao: it.descricao,
          qtdRecebida: qtd,
          validade: valEl.value
        });
      }
    });
    if (!ok) {
      document.getElementById('statusRecebimentoInline').innerHTML = '<span style="color:#e53935">Confira quantidade e validade dos itens recebidos.</span>';
      return;
    }
    if (!itens.length) {
      document.getElementById('statusRecebimentoInline').innerHTML = '<span style="color:#e53935">Informe pelo menos um item recebido.</span>';
      return;
    }
    var btn = document.getElementById('btnSalvarRecebimentoInline');
    btn.disabled = true;
    document.getElementById('statusRecebimentoInline').innerHTML = '<span style="color:#5f6b7c">Registrando recebimento…</span>';
    google.script.run
      .withSuccessHandler(function(msg) {
        btn.disabled = false;
        fecharOverlay('modalReceberPedidoInline');
        snack(msg || 'Recebimento registrado.');
        carregarEstoqueInline();
      })
      .withFailureHandler(function(e) {
        btn.disabled = false;
        document.getElementById('statusRecebimentoInline').innerHTML = '<span style="color:#e53935">' + esc(e.message || e) + '</span>';
      })
      .receberPedidoEstoque({
        rowIndex: rec.pedido.rowIndex,
        idPedido: rec.pedido.idPedido,
        dataReceb: document.getElementById('rpData').value,
        observacoes: document.getElementById('rpObs').value.trim(),
        itens: itens
      });
  }

      document.getElementById('piObs').value = pedido.observacoes || '';
      onPedidoProjetoChange();
      document.getElementById('piLab').value = pedido.laboratorio || '';
      onPedidoLabChange();
      _pedidoInlineItens = (mapa[pedido.idPedido] || []).map(function(it) {
        return {
          idItem: it.idItem,
          descricao: it.descricao,
          tipo: it.tipo,
          qtdSolicitada: it.qtdSolicitada
        };
      });
    }
    renderPedidoInlineItensForm();
    abrirOverlay('modalPedidoInline');
  }

  function onPedidoProjetoChange() {
    var dados = _estoqueInlineDados || {};
    var projLabs = dados.projLabsMap || {};
    var proj = document.getElementById('piProjeto').value;
    var labSel = document.getElementById('piLab');
    labSel.innerHTML = '<option value="">— Selecione —</option>';
    document.getElementById('piTipo').innerHTML = '<option value="">— Tipo —</option>';
    document.getElementById('piItem').innerHTML = '<option value="">— Selecione o tipo —</option>';
    document.getElementById('piSecaoItens').style.display = 'none';
    _pedidoInlineItens = [];
    renderPedidoInlineItensForm();
    if (!proj) return;
    var labsProjeto = projLabs[proj] || [];
    if (!labsProjeto.length) labsProjeto = ESTOQUE_CONFIG.laboratorios || [];
    labsProjeto.forEach(function(lab) {
      labSel.insertAdjacentHTML('beforeend', '<option value="' + esc(lab) + '">' + esc(lab) + '</option>');
    });
    if (labsProjeto.length === 1) {
      labSel.value = labsProjeto[0];
      onPedidoLabChange();
    }
  }

  function onPedidoLabChange() {
    var dados = _estoqueInlineDados || {};
    var itensMap = dados.projLabItensMap || {};
    var catalogo = dados.itensCatalogo || [];
    var proj = document.getElementById('piProjeto').value;
    var lab = document.getElementById('piLab').value;
    var sec = document.getElementById('piSecaoItens');
    var tipoSel = document.getElementById('piTipo');
    tipoSel.innerHTML = '<option value="">— Tipo —</option>';
    document.getElementById('piItem').innerHTML = '<option value="">— Selecione o tipo —</option>';
    if (!proj || !lab) {
      sec.style.display = 'none';
      return;
    }
    sec.style.display = 'block';
    var tipos = {};
    var lista = itensMap[proj + '||' + lab] || [];
    if (!lista.length) {
      lista = catalogo.filter(function(it) { return it.projeto === proj; });
    }
    lista.forEach(function(it) {
      if (it.tipo) tipos[it.tipo] = 1;
    });
    Object.keys(tipos).sort().forEach(function(tipo) {
      tipoSel.insertAdjacentHTML('beforeend', '<option value="' + esc(tipo) + '">' + esc(tipo) + '</option>');
    });
  }

  function onPedidoTipoChange() {
    var dados = _estoqueInlineDados || {};
    var itensMap = dados.projLabItensMap || {};
    var catalogo = dados.itensCatalogo || [];
    var proj = document.getElementById('piProjeto').value;
    var lab = document.getElementById('piLab').value;
    var tipo = document.getElementById('piTipo').value;
    var itemSel = document.getElementById('piItem');
    itemSel.innerHTML = '<option value="">— Selecione —</option>';
    if (!proj || !lab || !tipo) return;
    var lista = itensMap[proj + '||' + lab] || [];
    if (!lista.length) {
      lista = catalogo.filter(function(it) { return it.projeto === proj; });
    }
    lista
      .filter(function(it) { return it.tipo === tipo; })
      .forEach(function(it) {
        itemSel.insertAdjacentHTML('beforeend', '<option value="' + esc(it.id) + '">' + esc(it.descricao) + '</option>');
      });
  }

  function adicionarItemPedidoInline() {
    var tipo = document.getElementById('piTipo').value;
    var itemSel = document.getElementById('piItem');
    var idItem = itemSel.value;
    var qtd = parseInt(document.getElementById('piQtd').value, 10) || 1;
    if (!tipo || !idItem) {
      snack('Selecione tipo e item.');
      return;
    }
    var descricao = itemSel.options[itemSel.selectedIndex].text;
    _pedidoInlineItens.push({
      idItem: idItem,
      descricao: descricao,
      tipo: tipo,
      qtdSolicitada: qtd
    });
    document.getElementById('piQtd').value = 1;
    renderPedidoInlineItensForm();
  }

  function renderPedidoInlineItensForm() {
    var wrap = document.getElementById('piItensWrap');
    var body = document.getElementById('piItensBody');
    if (!wrap || !body) return;
    organizarLayoutItensPedidoInline();
    if (!_pedidoInlineItens.length) {
      wrap.style.display = 'none';
      var vazio = document.getElementById('piItensEmpty');
      if (vazio) vazio.style.display = 'block';
      body.innerHTML = '';
      return;
    }
    wrap.style.display = 'block';
    var vazio = document.getElementById('piItensEmpty');
    if (vazio) vazio.style.display = 'none';
    body.innerHTML = _pedidoInlineItens.map(function(it, idx) {
      return '<tr>' +
        '<td style="padding:8px 10px">' + itemTipoChip(it.tipo) + '</td>' +
        '<td style="padding:8px 10px;font-size:12px">' + esc(it.descricao) + '</td>' +
        '<td style="padding:8px 10px;font-size:12px">' + esc(it.qtdSolicitada) + '</td>' +
        '<td style="padding:8px 10px"><button class="btn-remove-item" onclick="removerItemPedidoInline(' + idx + ')"><span class="material-symbols-outlined">close</span></button></td>' +
      '</tr>';
    }).join('');
  }

  function organizarLayoutItensPedidoInline() {
    var sec = document.getElementById('piSecaoItens');
    var grid = sec ? sec.querySelector('.pedido-item-form-grid') : null;
    var wrap = document.getElementById('piItensWrap');
    if (!sec || !grid || !wrap || sec.dataset.organizado === '1') return;
    var intro = document.createElement('div');
    intro.style.cssText = 'font-size:12px;color:#5f6b7c;margin:-2px 0 10px';
    intro.textContent = 'Confira primeiro os itens que serao efetivamente pedidos. Use a area inferior apenas para incluir um item adicional.';
    sec.insertBefore(intro, grid);
    sec.insertBefore(wrap, grid);

    var vazio = document.createElement('div');
    vazio.id = 'piItensEmpty';
    vazio.style.cssText = 'display:none;background:#fff;border:1.5px dashed #d8e2f0;border-radius:8px;padding:12px 14px;margin-bottom:14px;color:#7b8794;font-size:12px';
    vazio.textContent = 'Nenhum item incluido ainda.';
    sec.insertBefore(vazio, grid);

    var addLabel = document.createElement('div');
    addLabel.style.cssText = 'font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#7b8794;margin-bottom:8px';
    addLabel.textContent = 'Adicionar item adicional';
    sec.insertBefore(addLabel, grid);
    wrap.style.marginBottom = '14px';
    sec.dataset.organizado = '1';
  }

  function removerItemPedidoInline(idx) {
    _pedidoInlineItens.splice(idx, 1);
    renderPedidoInlineItensForm();
  }

  function validarCampoPedidoInline(id, errId, valido) {
    var el = document.getElementById(id);
    var err = document.getElementById(errId);
    if (el) el.classList.toggle('invalid', !valido);
    if (err) err.classList.toggle('visible', !valido);
    return valido;
  }

  function salvarPedidoInline() {
    var numero = document.getElementById('piNumero').value.trim();
    var projeto = document.getElementById('piProjeto').value;
    var lab = document.getElementById('piLab').value;
    var ok = true;
    ok = validarCampoPedidoInline('piNumero', 'errPiNumero', !!numero) && ok;
    ok = validarCampoPedidoInline('piProjeto', 'errPiProjeto', !!projeto) && ok;
    ok = validarCampoPedidoInline('piLab', 'errPiLab', !!lab) && ok;
    if (!ok) return;

    var btn = document.getElementById('btnSalvarPedidoInline');
    btn.disabled = true;
    document.getElementById('statusPedidoInline').innerHTML = '<span style="color:#5f6b7c">Salvando…</span>';
    google.script.run
      .withSuccessHandler(function(msg) {
        btn.disabled = false;
        document.getElementById('statusPedidoInline').innerHTML = '';
        fecharOverlay('modalPedidoInline');
        snack(msg || 'Pedido cadastrado.');
        carregarEstoqueInline();
      })
      .withFailureHandler(function(e) {
        btn.disabled = false;
        document.getElementById('statusPedidoInline').innerHTML = '<span style="color:#e53935">' + esc(e.message || e) + '</span>';
      })
      .salvarPedidoEstoque({
        rowIndex: _pedidoInlineEdit ? _pedidoInlineEdit.rowIndex : '',
        idPedido: _pedidoInlineEdit ? _pedidoInlineEdit.idPedido : '',
        numeroPedido: numero,
        data: document.getElementById('piData').value,
        projeto: projeto,
        laboratorio: lab,
        status: 'Pendente',
        observacoes: document.getElementById('piObs').value.trim(),
        itens: _pedidoInlineItens
      });
  }

  function excluirPedidoInline(rowIndex, idPedido, numero) {
    abrirConfirmacaoDestrutiva({
      mensagem: 'Deseja excluir o pedido "' + numero + '"? Esta ação não pode ser desfeita.',
      onConfirm: function() {
        google.script.run
          .withSuccessHandler(function(msg) {
            snack(msg || 'Pedido excluído.');
            carregarEstoqueInline();
          })
          .withFailureHandler(function(e) { snack('Erro: ' + (e.message || e)); })
          .excluirPedidoEstoque(rowIndex, idPedido);
      }
    });
  }

  function abrirFormMovInline() {
    var dados = _estoqueInlineDados || {};
    _movEstoqueItens = dados.estoque || [];
    var catalogo = dados.itensCatalogo || [];
    var movs = dados.movimentacoes || [];
    document.getElementById('miTipoMov').value = 'Saída - Visita';
    document.getElementById('miData').value = new Date().toISOString().split('T')[0];
    ['miParticipante','miVisita','miOrigem','miObs'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.value = '';
    });
    document.getElementById('miQtd').value = 1;
    ['miProjeto','miTipoItem','miItem','miQtd'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.classList.remove('invalid');
    });
    ['errMiProjeto','errMiTipoItem','errMiItem','errMiQtd'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.classList.remove('visible');
    });
    var projetos = {};
    _movEstoqueItens.forEach(function(it) {
      if (it.projeto) projetos[it.projeto] = 1;
    });
    movs.forEach(function(m) {
      if (m.projeto) projetos[m.projeto] = 1;
    });
    (dados.projetos || []).forEach(function(proj) {
      if (proj) projetos[proj] = 1;
    });
    catalogo.forEach(function(it) {
      if (it.projeto) projetos[it.projeto] = 1;
    });
    var projSel = document.getElementById('miProjeto');
    projSel.innerHTML = '<option value="">— Selecione —</option>';
    Object.keys(projetos).sort().forEach(function(proj) {
      projSel.insertAdjacentHTML('beforeend', '<option value="' + esc(proj) + '">' + esc(proj) + '</option>');
    });
    document.getElementById('miTipoItem').innerHTML = '<option value="">— Selecione o projeto primeiro —</option>';
    document.getElementById('miItem').innerHTML = '<option value="">— Selecione o tipo —</option>';
    preencherParticipantesMov('');
    onMovTipoMovChange();
    document.getElementById('statusMovInline').innerHTML = '';
    document.getElementById('btnSalvarMovInline').disabled = false;
    abrirOverlay('modalMovInline');
  }

  function onMovTipoMovChange() {
    var isVisita = document.getElementById('miTipoMov').value === 'Saída - Visita';
    ['miParticipanteWrap','miVisitaWrap'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.style.display = isVisita ? '' : 'none';
    });
    if (!isVisita) {
      var part = document.getElementById('miParticipante');
      var visita = document.getElementById('miVisita');
      if (part) part.value = '';
      if (visita) visita.value = '';
    }
  }

  function onMovProjetoChange() {
    var dados = _estoqueInlineDados || {};
    var catalogo = dados.itensCatalogo || [];
    var proj = document.getElementById('miProjeto').value;
    var tipoSel = document.getElementById('miTipoItem');
    tipoSel.innerHTML = '<option value="">— Selecione —</option>';
    document.getElementById('miItem').innerHTML = '<option value="">— Selecione o tipo —</option>';
    preencherParticipantesMov(proj);
    if (!proj) return;
    var tipos = {};
    _movEstoqueItens.forEach(function(it) {
      if (it.projeto === proj && it.tipoItem) tipos[it.tipoItem] = 1;
    });
    catalogo.forEach(function(it) {
      if (it.projeto === proj && it.tipo) tipos[it.tipo] = 1;
    });
    Object.keys(tipos).sort().forEach(function(tipo) {
      tipoSel.insertAdjacentHTML('beforeend', '<option value="' + esc(tipo) + '">' + esc(tipo) + '</option>');
    });
  }

  function participanteAtivoMov(p) {
    var st = String(p.status || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();
    return st === 'ativo';
  }

  function preencherParticipantesMov(proj) {
    var sel = document.getElementById('miParticipante');
    if (!sel) return;
    var participantes = ((_estoqueInlineDados || {}).participantes || [])
      .filter(function(p) {
        return participanteAtivoMov(p) && (!proj || normSelectValue(p.projeto) === normSelectValue(proj));
      })
      .sort(function(a, b) { return String(a.nome || '').localeCompare(String(b.nome || '')); });
    sel.innerHTML = '<option value="">— Selecione —</option>' + participantes.map(function(p) {
      var label = (p.nome || '') + (p.idParticipante ? ' · ' + p.idParticipante : '');
      return '<option value="' + esc(p.nome || '') + '">' + esc(label) + '</option>';
    }).join('');
    if (!participantes.length && proj) {
      sel.innerHTML = '<option value="">Nenhum participante ativo neste projeto</option>';
    }
  }

  function onMovTipoItemChange() {
    var dados = _estoqueInlineDados || {};
    var catalogo = dados.itensCatalogo || [];
    var proj = document.getElementById('miProjeto').value;
    var tipo = document.getElementById('miTipoItem').value;
    var itemSel = document.getElementById('miItem');
    itemSel.innerHTML = '<option value="">— Selecione —</option>';
    if (!proj || !tipo) return;
    _movEstoqueItens
      .filter(function(it) { return it.projeto === proj && it.tipoItem === tipo && Number(it.qtde || 0) > 0; })
      .forEach(function(it) {
        var key = encodeURIComponent(JSON.stringify({
          idItem: it.idItem,
          descricao: it.descricao,
          tipoItem: it.tipoItem,
          projeto: it.projeto,
          qtde: it.qtde,
          validade: it.validade,
          localizacao: it.localizacao,
          lote: it.lote || '',
          numeroPedido: it.numeroPedido || ''
        }));
        var label = it.descricao + ' · qtd ' + it.qtde + (it.validade ? ' · val. ' + it.validade : '') + (it.localizacao ? ' · ' + it.localizacao : '');
        itemSel.insertAdjacentHTML('beforeend', '<option value="' + key + '">' + esc(label) + '</option>');
      });
    if (itemSel.options.length === 1) {
      catalogo
        .filter(function(it) { return it.projeto === proj && it.tipo === tipo; })
        .forEach(function(it) {
          var key = encodeURIComponent(JSON.stringify({
            idItem: it.idItem,
            descricao: it.descricao,
            tipoItem: it.tipo,
            projeto: it.projeto,
            qtde: 0,
            validade: '',
            localizacao: it.localizacao || '',
            lote: '',
            numeroPedido: ''
          }));
          itemSel.insertAdjacentHTML('beforeend', '<option value="' + key + '">' + esc(it.descricao + ' · sem saldo em estoque') + '</option>');
        });
    }
  }

  function onMovItemChange() {
    var item = getMovItemSelecionado();
    if (!item) return;
    var qtd = document.getElementById('miQtd');
    qtd.max = item.qtde || '';
    if (Number(qtd.value || 0) > Number(item.qtde || 0)) qtd.value = item.qtde || 1;
  }

  function getMovItemSelecionado() {
    var val = document.getElementById('miItem').value;
    if (!val) return null;
    try { return JSON.parse(decodeURIComponent(val)); } catch(e) { return null; }
  }

  function salvarMovInline() {
    var item = getMovItemSelecionado();
    var projeto = document.getElementById('miProjeto').value;
    var tipoItem = document.getElementById('miTipoItem').value;
    var qtd = Number(document.getElementById('miQtd').value || 0);
    var ok = true;
    ok = validarCampoPedidoInline('miProjeto', 'errMiProjeto', !!projeto) && ok;
    ok = validarCampoPedidoInline('miTipoItem', 'errMiTipoItem', !!tipoItem) && ok;
    ok = validarCampoPedidoInline('miItem', 'errMiItem', !!item) && ok;
    ok = validarCampoPedidoInline('miQtd', 'errMiQtd', qtd > 0 && (!item || qtd <= Number(item.qtde || 0))) && ok;
    if (!ok) return;

    var btn = document.getElementById('btnSalvarMovInline');
    btn.disabled = true;
    document.getElementById('statusMovInline').innerHTML = '<span style="color:#5f6b7c">Registrando…</span>';
    google.script.run
      .withSuccessHandler(function(msg) {
        btn.disabled = false;
        fecharOverlay('modalMovInline');
        snack(msg || 'Movimentação registrada.');
        carregarEstoqueInline();
      })
      .withFailureHandler(function(e) {
        btn.disabled = false;
        document.getElementById('statusMovInline').innerHTML = '<span style="color:#e53935">' + esc(e.message || e) + '</span>';
      })
      .registrarMovimentacaoEstoque({
        tipoMovimento: document.getElementById('miTipoMov').value,
        data: document.getElementById('miData').value,
        idItem: item.idItem,
        descricao: item.descricao,
        tipoItem: item.tipoItem,
        projeto: item.projeto,
        qtde: qtd,
        validade: item.validade,
        localizacao: item.localizacao,
        lote: item.lote || '',
        participante: document.getElementById('miParticipante').value.trim(),
        idVisita: document.getElementById('miVisita').value.trim(),
        origem: document.getElementById('miOrigem').value.trim() || 'Movimentação manual',
        observacao: document.getElementById('miObs').value.trim()
      });
  }
</script>
