  <style>
    /* AGENDA OPERACIONAL */
    .ag-wrap{width:100%;max-width:none;margin:0 auto}
    .ag-toolbar{background:var(--surface);border:1px solid #e0e6f0;border-radius:var(--r-lg) var(--r-lg) 0 0;padding:10px 18px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .ag-tb-btn{height:32px;padding:0 12px;border:1.5px solid #e0e6f0;background:var(--surface);border-radius:var(--r-sm);font-family:Roboto,sans-serif;font-size:12px;font-weight:500;color:var(--text-muted);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap}

    .ag-tb-btn.primary:hover{background:var(--primary-dark);color:#fff}
    .ag-tb-btn.active{background:var(--primary-light);color:var(--primary);border-color:#c5d5fb;font-weight:600}
    .ag-date-jump{position:relative;width:32px;height:32px;display:inline-flex;flex:0 0 32px;cursor:pointer}
    .ag-date-jump input{position:absolute;inset:0;width:100%;height:100%;margin:0;opacity:0;cursor:pointer}
    .ag-date-jump:focus-within .ag-tb-btn{background:var(--primary-light);border-color:#c5d5fb;color:var(--primary);box-shadow:0 0 0 3px rgba(18,102,241,.12)}
    .ag-day-hdr.focus-date,.ag-wk-col.focus-date{box-shadow:inset 0 0 0 2px var(--primary);background:#f4f8ff}
    .ag-period{font-size:14px;font-weight:600;color:var(--text);padding:0 4px}
    .ag-sep{width:1px;height:22px;background:#e0e6f0;margin:0 2px}
    .ag-search{flex:1;min-width:180px;display:flex;align-items:center;background:#f6f8ff;border:1.5px solid #e0e6f0;border-radius:var(--r-sm);padding:5px 11px;gap:6px}
    .ag-search input{border:none;outline:none;font-size:12.5px;color:var(--text);background:transparent;width:100%;min-width:0}
    .ag-create-panel{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:220;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .2s}

    .ag-create-box{background:var(--surface);border-radius:16px;width:min(1120px,94vw);max-height:92vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.22)}
    .ag-create-head{background:linear-gradient(135deg,#1a74f5,#0d47a1);padding:16px 22px;display:flex;align-items:center;gap:12px;border-radius:16px 16px 0 0;color:#fff}

    .ag-create-body{padding:20px 22px}
    .ag-modal-actions{margin-top:12px}
    .ag-display-btn{width:100%;height:40px;justify-content:center;margin-bottom:12px}
    .ag-modal-actions .btn-save{margin-top:0}
    .ag-form-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}
    .ag-log-card{background:#f8faff;border:1px solid #dfe8f8;border-radius:var(--r-md);padding:14px;margin-top:14px}
    .ag-log-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--primary);margin-bottom:12px;display:flex;align-items:center;gap:6px}
    .ag-log-title .material-symbols-outlined{font-size:15px}
    .ag-proc-chips{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 8px}
    .ag-proc-chip{height:28px;border:1px solid #d7dee8;border-radius:999px;background:#f7f8fa;color:#475569;font-size:11.5px;font-weight:700;padding:0 10px;display:inline-flex;align-items:center;gap:5px;cursor:pointer;transition:all .14s}
    .ag-proc-chip:hover{background:#eef1f5;border-color:#c4ccd8;color:#263241;transform:translateY(-1px)}
    .ag-proc-chip .material-symbols-outlined{font-size:14px}
    #agTransporteCard .ag-form-grid-3{grid-template-columns:1fr}

    .ag-transport-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:-2px 0 12px}
    .ag-transport-actions .ag-tb-btn{height:34px}
    .ag-transport-fields{display:grid;grid-template-columns:1.2fr 1.3fr 1fr 1fr .9fr;gap:10px;margin-bottom:10px}
    .ag-transport-fields.backup{grid-template-columns:1fr 1fr 1fr}
    .ag-view-wrap{background:var(--surface);border:1px solid #e0e6f0;border-top:none;border-radius:0 0 var(--r-lg) var(--r-lg);overflow:hidden}
    .ag-day-hdr{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:14px 24px;background:#fbfcff;border-bottom:1px solid #e8edf8;position:sticky;top:0;z-index:2}
    .ag-day-hdr.today{background:#eef5ff;border-bottom-color:#cfe0ff}
    .ag-day-hdr.past{background:#fbfcff;opacity:.58}
    .ag-day-cal{display:flex;align-items:baseline;gap:8px;min-width:0}
    .ag-day-wd{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--primary)}
    .ag-day-n{font-size:18px;font-weight:800;line-height:1.1;color:var(--text)}
    .ag-day-info{flex:1;min-width:0;display:flex;align-items:center;justify-content:space-between;gap:18px}
    .ag-day-label{font-size:15px;font-weight:800;color:var(--text)}
    .ag-day-stats{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:flex-end}
    .ag-dpill{display:inline-flex;align-items:center;gap:3px;border-radius:999px;padding:2px 8px;font-size:10px;font-weight:700}
    .ag-dp-n{background:#edf3ff;color:#0b4fa3}.ag-dp-ok{background:#e6f4ea;color:#137333}.ag-dp-pend{background:#fff3cd;color:#856404}.ag-dp-lab{background:#f1f5f9;color:#475569}.ag-dp-mon{background:#f5f3ff;color:#5b21b6}.ag-dp-car{background:#fff4d6;color:#7a4d00;border:1px solid #f2c35b}.ag-dp-car .material-symbols-outlined{font-size:14px}
    .ag-appt{border-left:3px solid transparent;border-bottom:1px solid #f0f4f8}

    .ag-appt.past:hover{opacity:1}
    .ag-appt.focus-from-week{box-shadow:inset 0 0 0 2px #1266f1;background:#f8fbff}
    .ag-appt.focus-from-week>.ag-appt-main{background:#eef4ff}
    .ag-appt:hover>.ag-appt-main{background:#f8faff}
    .ag-appt.st-agendado{border-left-color:#28a745}.ag-appt.st-realizado{border-left-color:#6c757d}.ag-appt.st-cancelado{border-left-color:#b3261e}.ag-appt.st-concluido{border-left-color:#212529}.ag-appt.st-monitoria{border-left-color:#5b21b6}.ag-appt.st-pendente,.ag-appt.st-reagendado{border-left-color:#e65100}
    .ag-appt-main{position:relative;display:flex;align-items:flex-start;gap:14px;padding:12px 24px 12px 24px;cursor:pointer;transition:background .12s;overflow:hidden}
    .ag-appt-time{min-width:46px;height:26px;border-radius:13px;font-size:11.5px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;background:#f0f4f8;color:var(--text-muted)}
    .ag-appt.st-agendado .ag-appt-time{background:#d4edda;color:#155724}.ag-appt.st-cancelado .ag-appt-time{background:#fce8e6;color:#b3261e}.ag-appt.st-monitoria .ag-appt-time{background:#f5f3ff;color:#5b21b6}
    .ag-appt-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px}
    .ag-appt-side{width:300px;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:6px;padding-top:1px}
    .ag-lab-watermark{position:absolute;right:-28px;top:50%;transform:translateY(-50%) rotate(-8deg);pointer-events:none;color:#64748b;opacity:.085;z-index:0}
    .ag-lab-watermark .material-symbols-outlined{font-size:116px;font-variation-settings:'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 48}
    .ag-appt-time,.ag-appt-body,.ag-appt-side,.ag-appt-actions{position:relative;z-index:1}
    .ag-side-line{display:flex;align-items:center;justify-content:flex-end;gap:6px;flex-wrap:wrap}
    .ag-side-note{font-size:11px;color:var(--text-faint);text-align:right;line-height:1.25;max-width:210px}
    .ag-l1,.ag-l2,.ag-l3,.ag-l4{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
    .ag-l3{font-size:11.5px;color:var(--text-faint)}.ag-l3 .sep{color:#dde2ea}
    .ag-meta-text{font-size:12px;color:#475569;display:flex;align-items:center;gap:5px}
    .ag-meta-text .material-symbols-outlined{font-size:14px;color:#94a3b8}
    .ag-birth-age{display:inline-flex;align-items:flex-start;gap:5px;color:#475569;line-height:1.15;position:relative}
    .ag-birth-age .material-symbols-outlined{font-size:14px;color:#94a3b8;margin-top:1px;position:static}
    .ag-birth-age-text{display:flex;flex-direction:column;gap:2px;position:relative}
    .ag-birth-age-date{font-size:12px;color:#475569}
    .ag-birth-age-years{font-size:10.5px;color:#9aa3b0}
    .ag-l3 .ag-birth-age{display:inline-flex;flex-direction:row;align-items:center;gap:6px;position:static}
    .ag-l3 .ag-birth-age .material-symbols-outlined{order:2;font-size:14px;line-height:1;font-weight:400;color:#666;margin-top:0;position:static}
    .ag-l3 .ag-birth-age-text{display:contents;position:static}
    .ag-l3 .ag-birth-age-years{order:1;font-size:12px;line-height:1.15;font-weight:400;color:#666;position:static}
    .ag-l3 .ag-birth-age-date{order:3;font-size:12px;line-height:1.15;font-weight:400;color:#666;position:static}
    .ag-part-info-birth{display:inline-flex;vertical-align:middle;align-items:flex-start;gap:5px;margin-right:12px}
    .ag-part-info-birth .ag-birth-age-date{font-size:12.5px;font-weight:700;color:#334155}
    .ag-part-info-birth .ag-birth-age-years{font-size:11px;color:#8a96a8}
    .ag-appt-name{font-size:14px;font-weight:700;color:var(--text)}.ag-appt.st-cancelado .ag-appt-name{text-decoration:line-through;color:var(--text-faint)}
    .ag-proj-chip,.ag-visit-chip,.ag-mon-chip,.ag-cro-chip,.ag-braco-tag,.ag-lab-ind,.ag-type-chip{display:inline-flex;align-items:center;gap:5px;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:700}
    .ag-proj-chip{background:var(--primary-light);color:var(--primary);border:1px solid rgba(18,102,241,.28)}
    .ag-visit-chip{background:#f0f4f8;color:#374151;border:1px solid #d1d5db}
    .ag-mon-chip{background:#f5f3ff;color:#5b21b6;border:1px solid #ddd6fe}
    .ag-post-icons{display:inline-flex;align-items:center;gap:4px}
    .ag-post-mini{width:25px;height:25px;border-radius:6px;border:1px solid #d7dee8;background:#fff;color:#8a96a8;display:inline-flex;align-items:center;justify-content:center;position:relative;overflow:hidden;text-decoration:none}
    a.ag-post-mini{cursor:pointer}a.ag-post-mini:hover{transform:translateY(-1px);box-shadow:0 2px 6px rgba(15,23,42,.16)}
    .ag-post-mini.done{background:#e6f4ea;border-color:#a5d6a7;color:#137333}
    .ag-post-mini.pending{background:#fff7e6;border-color:#f5cd75;color:#9a4b16}
    .ag-post-mini img{max-width:17px;max-height:17px;display:block}
    .ag-post-mini.pending img{opacity:.58;filter:grayscale(1)}
    .ag-post-mini .material-symbols-outlined{font-size:16px}
    .ag-polo-icon{width:16px;height:16px;display:inline-block;position:relative;flex-shrink:0;border-radius:50%;background:#111827;box-shadow:inset 0 0 0 1px rgba(255,255,255,.16)}
    .ag-polo-icon:before{content:"";position:absolute;inset:3px 2px 2px 3px;background:linear-gradient(135deg,#ffc557 0%,#f5a623 58%,#d78218 58%,#b86612 100%);clip-path:polygon(5% 95%,38% 24%,95% 4%,63% 78%);transform:rotate(-8deg)}
    .ag-post-checks{margin:10px 0 14px;background:#fbfcff;border:1px solid #e0e6f0;border-radius:8px;padding:10px 12px;display:none;gap:10px;align-items:center;flex-wrap:wrap}
    .ag-post-checks-title{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--text-faint);margin-right:2px}
    .ag-post-check{display:inline-flex;align-items:center;gap:7px;border:1px solid #e0e6f0;border-radius:7px;background:#fff;color:#5f6b7c;padding:7px 10px;font-size:12px;font-weight:700;cursor:pointer}
    a.ag-post-check{text-decoration:none}a.ag-post-check:hover{border-color:#c5d5fb;background:var(--primary-light);color:var(--primary)}
    .ag-post-check input{width:17px;height:17px;accent-color:#137333}
    .ag-post-check img{width:18px;height:18px;object-fit:contain}
    .ag-post-check .ag-polo-icon{width:18px;height:18px}
    .ag-post-check .material-symbols-outlined{font-size:17px;color:#5f6b7c}
    .ag-type-chip .material-symbols-outlined{font-size:14px}
    .ag-type-visita{background:#bfd7ff;color:#0b4fa3;border:1px solid #9ec2fb}
    .ag-type-monitoria{background:#ffe4a8;color:#7a4f00;border:1px solid #f5cd75}
    .ag-type-amostras{background:#e0c2f3;color:#6c2a8f;border:1px solid #d0a7ea}
    .ag-type-imagem{background:#d7ef9b;color:#365f00;border:1px solid #bedc77}
    .ag-type-lab{background:#bddde7;color:#14586b;border:1px solid #9bc8d5}
    .ag-type-feriado{background:#ffc8c3;color:#b3261e;border:1px solid #f5aaa3}
    .ag-type-siv{background:#c9c4ff;color:#3e3aa0;border:1px solid #aaa4ee}
    .ag-type-closeout{background:#e0e0e0;color:#333;border:1px solid #c9c9c9}
    .ag-type-reuniao{background:#ffc9a8;color:#8a3d00;border:1px solid #f2aa7b}
    .ag-type-auditoria{background:#ffd0b3;color:#8a3d00;border:1px solid #f1b48e}
    .ag-type-default{background:#eef2f7;color:#374151;border:1px solid #d7dee8}
    .ag-cro-chip{background:#f5f3ff;color:#5b21b6;border:1px solid #ddd6fe}
    .ag-braco-tag{font-size:11.5px;color:var(--text-muted);background:#f6f8ff;border:1px solid #e0e6f0;padding:3px 8px}
    .ag-lab-ind{background:#e8f0fe;border:1.5px solid #94b8ff;color:#0d47a1;font-size:11.5px;box-shadow:inset 0 0 0 1px rgba(18,102,241,.08)}
    .ag-st-chip{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;white-space:nowrap}
    .ag-ch-agendado{background:#b9ddff;color:#0059a8}.ag-ch-confirmado{background:#c9efc7;color:#0b6b23}.ag-ch-enviado{background:#e1c5ff;color:#6d1b9a}.ag-ch-entregue{background:#008f45;color:#fff}.ag-ch-cancelado{background:#ffd0c9;color:#c5221f}.ag-ch-realizado{background:#f8f9fa;color:#495057;border:1.5px solid #dee2e6}.ag-ch-concluido{background:#212529;color:#fff}.ag-ch-pendente,.ag-ch-reagendado{background:#fff3cd;color:#856404}.ag-ch-naoagendado{background:#eeeeee;color:#555}.ag-ch-monitoria{background:#f5f3ff;color:#5b21b6;border:1px solid #ddd6fe}
    .ag-proc-preview{font-size:12px;color:#374151;line-height:1.35;max-width:680px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .ag-appt-actions{display:flex;gap:4px;align-items:flex-start;flex-shrink:0;padding-top:2px}
    .ag-act-btn{width:28px;height:28px;border-radius:var(--r-sm);border:1.5px solid #e0e6f0;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:all .14s}
    .ag-act-btn:hover{background:var(--primary-light);border-color:#c5d5fb;color:var(--primary)}
    .ag-act-btn.open{transform:rotate(180deg);background:var(--primary-light);border-color:#c5d5fb;color:var(--primary)}
    .ag-appt-detail{display:none;padding:12px 24px 16px 84px;background:#f8faff;border-top:1px dashed #d8e2f0}
    .ag-appt-detail.open{display:block}
    .ag-det-section{margin-bottom:14px}.ag-det-section:last-child{margin-bottom:0}
    .ag-det-label{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-faint);margin-bottom:8px;display:flex;align-items:center;gap:5px}
    .ag-det-actions{display:flex;align-items:center;gap:8px;justify-content:flex-end;margin-bottom:12px}
    .ag-proc-wrap{display:flex;flex-wrap:wrap;gap:4px}
    .ag-proc-tag{display:inline-flex;align-items:center;gap:3px;background:#f0f4f8;color:var(--text-muted);border-radius:4px;padding:3px 9px;font-size:11.5px}
    .ag-obs-block{background:#fffde7;border:1px solid #ffe082;border-radius:var(--r-sm);padding:8px 12px;font-size:12px;color:#5d4037;display:flex;align-items:flex-start;gap:6px}
    .ag-courier-stack{display:flex;flex-direction:column;gap:10px}
    .ag-c-card{background:#fff;border:1.5px solid #e0e6f0;border-radius:var(--r-md);padding:12px 16px;width:100%}
    .ag-c-card.backup{border-color:#80cbc4;background:#f0fdfb}
    .ag-c-doc-btn{height:28px;border:1.5px solid #d7dee8;border-radius:var(--r-sm);background:#fff;color:var(--primary);font-size:11px;font-weight:700;padding:0 9px;display:inline-flex;align-items:center;gap:4px;cursor:pointer;margin-left:auto}

    .ag-c-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
    .ag-c-num{width:22px;height:22px;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#f3e5f5;color:#6a1b9a}

    .ag-temp.temp-refrigerado{background:#b9dce6;color:#15566a;border-color:#9fcbd7}
    .ag-temp.temp-congelado{background:#b9ddff;color:#0059a8;border-color:#98cbf7}
    .ag-awb-actions{display:inline-flex;align-items:center;gap:5px;max-width:100%;flex-wrap:wrap}
    .ag-awb{display:inline-flex;align-items:center;gap:4px;font-family:monospace;font-size:12px;font-weight:700;color:var(--primary);background:var(--primary-light);border:1px solid #c5d5fb;border-radius:4px;padding:2px 8px}
