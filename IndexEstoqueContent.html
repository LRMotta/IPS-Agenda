    <div class="page" id="page-estoque-view">
      <div class="stats-row" style="grid-template-columns:1fr 1fr 1fr 1fr 1fr; border-radius:var(--r-lg) var(--r-lg) 0 0; border-top:1px solid #e8edf8;">
        <div class="stat-card" style="--accent:#1266f1; border-radius:var(--r-lg) 0 0 0;">
          <div class="stat-value" id="evStatTotal">—</div>
          <div class="stat-label">Total de Itens</div>
          <div class="stat-icon"><span class="material-symbols-outlined">inventory_2</span></div>
        </div>
        <div class="stat-card" style="--accent:#137333;">
          <div class="stat-value" id="evStatOk">—</div>
          <div class="stat-label">Estoque OK</div>
          <div class="stat-icon"><span class="material-symbols-outlined">check_circle</span></div>
        </div>
        <div class="stat-card" style="--accent:#e65100;">
          <div class="stat-value" id="evStatBaixo">—</div>
          <div class="stat-label">Estoque Baixo</div>
          <div class="stat-icon"><span class="material-symbols-outlined">warning</span></div>
        </div>
        <div class="stat-card" style="--accent:#b3261e;">
          <div class="stat-value" id="evStatCritico">—</div>
          <div class="stat-label">Crítico / Zerado</div>
          <div class="stat-icon"><span class="material-symbols-outlined">error</span></div>
        </div>
        <div class="stat-card" style="--accent:#6a1b9a; border-radius:0 var(--r-lg) 0 0;">
          <div class="stat-value" id="evStatPendente">—</div>
          <div class="stat-label">Pedidos Pendentes</div>
          <div class="stat-icon"><span class="material-symbols-outlined">local_shipping</span></div>
        </div>
      </div>
      <div class="toolbar-card">
        <div class="search-wrap">
          <span class="material-symbols-outlined">search</span>
          <input type="text" id="evSearch" placeholder="Buscar por descrição, projeto, localização, N° pedido..." oninput="evFiltrar()">
        </div>
        <select class="f-select" id="evFilterProjeto" onchange="evFiltrar()" style="height:36px;font-size:12px;color:var(--text-muted);border:1.5px solid #e0e6f0;border-radius:var(--r-sm);background:#f6f8ff;padding:0 30px 0 10px;">
          <option value="">Todos os projetos</option>
        </select>
        <select class="f-select" id="evFilterTipo" onchange="evFiltrar()" style="height:36px;font-size:12px;color:var(--text-muted);border:1.5px solid #e0e6f0;border-radius:var(--r-sm);background:#f6f8ff;padding:0 30px 0 10px;">
          <option value="">Todos os tipos</option>
        </select>
        <select class="f-select" id="evFilterStatus" onchange="evFiltrar()" style="height:36px;font-size:12px;color:var(--text-muted);border:1.5px solid #e0e6f0;border-radius:var(--r-sm);background:#f6f8ff;padding:0 30px 0 10px;">
          <option value="">Todos os status</option>
        </select>
        <button class="btn-new" onclick="carregarEstoqueView(true)" style="background:var(--primary-light);color:var(--primary);box-shadow:none;border:1.5px solid var(--primary-border);">
          <span class="material-symbols-outlined">refresh</span> Atualizar
        </button>
      </div>
      <div class="table-card">
        <table class="data-table" style="min-width:820px;">
          <thead>
            <tr>
              <th style="width:36px;"></th>
              <th>Projeto</th>
              <th>Descrição do Item</th>
              <th>Tipo</th>
              <th>Validade</th>
              <th>Localização</th>
              <th style="text-align:center;">Qtde.</th>
              <th style="text-align:center;">Est. Mín.</th>
              <th>Status</th>
              <th style="text-align:center;">Qtde Pedida</th>
              <th>N° Pedido</th>
            </tr>
          </thead>
          <tbody id="evBody">
            <tr class="loading-row"><td colspan="11"><div class="spinner"></div>Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
