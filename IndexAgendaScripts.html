  function setAgendaFormDataState(data) {
    _agendaDados = data || null;
    STATE.agenda.formData = _agendaDados;
    _agendaFormDataLoadedAt = _agendaDados ? Date.now() : 0;
    STATE.agenda.formDataLoadedAt = _agendaFormDataLoadedAt;
    return _agendaDados;
  }

  function setAgendaInitStartedState(started) {
    _agendaInitStarted = !!started;
    STATE.agenda.initStarted = _agendaInitStarted;
    return _agendaInitStarted;
  }

  function setAgendaEventosLoadedAtState(ts) {
    _agendaEventosLoadedAt = Number(ts || 0);
    STATE.agenda.eventsLoadedAt = _agendaEventosLoadedAt;
    return _agendaEventosLoadedAt;
  }

  function agendaEventosEstaoDesatualizados() {
    var loadedAt = _agendaEventosLoadedAt || STATE.agenda.eventsLoadedAt || 0;
    return !loadedAt || (Date.now() - loadedAt) > AGENDA_EVENTOS_TTL_MS;
  }

  function agendaFormDataEstaDesatualizado() {
    var loadedAt = _agendaFormDataLoadedAt || STATE.agenda.formDataLoadedAt || 0;
    return !loadedAt || (Date.now() - loadedAt) > AGENDA_FORMDATA_TTL_MS;
  }

  function agendaFormDataRefreshBloqueadoPorEdicao() {
    return !!(window.APP_UNSAVED_SCOPES && window.APP_UNSAVED_SCOPES.agendaCreatePanel);
  }

  function agendaEstaAtiva() {
    if (typeof getCurrentPage === 'function') return getCurrentPage() === 'agenda';
    var page = document.getElementById('page-agenda');
    return !!(page && page.classList.contains('active'));
  }

  function setupAgendaAutoRefreshListeners() {
    if (STATE.agenda.autoRefreshListenersStarted) return;
    STATE.agenda.autoRefreshListenersStarted = true;
    document.addEventListener('visibilitychange', function() {
      if (!document.hidden && agendaEstaAtiva()) {
        agendaRevalidarEventosEmBackground(false);
        agendaRevalidarFormDataEmBackground(false);
      }
    });
    window.addEventListener('focus', function() {
      if (agendaEstaAtiva()) {
        agendaRevalidarEventosEmBackground(false);
        agendaRevalidarFormDataEmBackground(false);
      }
    });
  }

  function agendaRevalidarEventosEmBackground(force) {

    if (!force && !agendaEventosEstaoDesatualizados()) return;
    _agendaEventosRefreshing = true;
    carregarAgendaEventos(true, null, { silent: true, onComplete: function() {
      _agendaEventosRefreshing = false;
    } });
  }

  function agendaRevalidarFormDataEmBackground(force, options) {

        if (typeof options.onComplete === 'function') options.onComplete(true);
      })
      .withFailureHandler(function() {
        _agendaFormDataRefreshing = false;
        if (typeof options.onComplete === 'function') options.onComplete(false);
      })
      .getDadosFormularioAgenda();
  }

  function invalidarAgendaConfigCache() {
    setAgendaFormDataState(null);
    setAgendaInitStartedState(false);
    var page = document.getElementById('page-agenda');
    if (page && page.classList.contains('active')) initAgendaV1();
  }

  function initAgendaV1() {
    var dataEl = document.getElementById('agData');
    if (!dataEl) return;
    if (window.INDEX_INITIAL_AGENDA_ID && !_agendaAbrirAposCarga) {
      _agendaAbrirAposCarga = String(window.INDEX_INITIAL_AGENDA_ID || '');
      window.INDEX_INITIAL_AGENDA_ID = '';
    }
    setupAgendaPastDateAlertListeners();
    setupAgendaAutoRefreshListeners();
    if (_agendaDados || _agendaInitStarted) {
      agendaRevalidarEventosEmBackground(false);
      return;
    }
    setAgendaInitStartedState(true);
    carregarAgendaEventos(false, agendaAbrirPendenteAposCarga);
    if (window.APP_BOOTSTRAP_DATA && window.APP_BOOTSTRAP_DATA.agendaFormData) {
      applyAgendaFormData(window.APP_BOOTSTRAP_DATA.agendaFormData);
      return;
    }
    google.script.run
      .withSuccessHandler(applyAgendaFormData)
      .withFailureHandler(function(e) {
        setAgendaInitStartedState(false);
        document.getElementById('agendaStatusMsg').innerHTML = '<span style="color:#e53935">' + esc(appErrorMessage(e)) + '</span>';
      })
      .getDadosFormularioAgenda();
  }

  function applyAgendaFormData(d) {
    setAgendaFormDataState(d || {});
    if (Array.isArray(_agendaDados.procedimentoChips)) {
      AGENDA_PROCEDIMENTO_CHIPS = _agendaDados.procedimentoChips;
    }
    renderAgendaProcedimentoChips();
    preencherAgendaSelect('agTipo', _agendaDados.tiposEvento || [], '');
    preencherAgendaSelect('agStatus', _agendaDados.status || [], null);
    preencherAgendaSelect('agParticipante', _agendaDados.participantes || [], '');
    preencherAgendaSelect('agProjeto', _agendaDados.projetos || [], '');

    rows.forEach(function(row, idx) {

      var cfg = agendaMatBioTypeConfig(tipo && tipo.value);
      if (outroIdx < 0 && cfg && cfg.outro) outroIdx = idx;

    if (outroIdx > -1) {
      rows.slice(outroIdx + 1).forEach(function(row) { row.remove(); });

    var last = rows[rows.length - 1];

      var tipoEl = row.querySelector('.ag-mat-type-select');
      var formulaEl = row.querySelector('.ag-mat-formula');
      var ensaioEl = row.querySelector('.ag-mat-ensaio');
      if (!tipoEl || !formulaEl || !tipoEl.value) return;
      var t = agendaMatBioTypeConfig(tipoEl.value);
      if (!t) return;
      var formula = formulaEl.value;
      var parsed = agendaMatBioParseFormula(formula);
      var unit = agendaMatBioUnitKey(agendaMatBioDisplayUnit(prefix, t.unit));
      var outro = t.outro ? (row.querySelector('.ag-mat-other') || {}).value || '' : '';
      var label = t.outro ? outro.trim() : t.label;
      if (!label || (!parsed.segmentos.length && !t.outro)) return;
      items.push({
        key: t.key,
        tipo: label,
        ensaio: ensaioEl ? ensaioEl.value.trim() : '',
        formula: String(formula || '').trim(),
        tubos: parsed.tubos,
        total: parsed.total,
        unit: unit,
        segmentos: parsed.segmentos
      });
    });
    return CodexMatBioCore.serializeItems(items);
  }

  function agendaMatBioEventOptions(r, onlyPrefix) {

      { prefix: 'agC3', label: 'Transporte III', data: r && r.courier3 },
      { prefix: 'agBackup', label: 'Backup', data: r && r.backup }
    ].filter(function(x) { return !onlyPrefix || x.prefix === onlyPrefix; });
    var structured = map.map(function(x) {
      var parsed = agendaMatBioParseJson(x.data && x.data.matBioJson);
      if (!parsed.items.length) return null;
      return {
        prefix: x.prefix,
        label: x.label,
        mode: 'structured',
        items: parsed.items,
        summary: parsed.items.map(function(it) { return it.tipo; }).join(', ') || (x.data && x.data.material) || ''
      };
    }).filter(Boolean);

    var legacy = map.map(function(x) {
      var hasStructured = agendaMeaningfulValue(x.data && x.data.matBioJson);
      var txt = x.data && x.data.material ? String(x.data.material).trim() : '';
      if (hasStructured || !agendaMeaningfulValue(txt)) return null;
      return {
        prefix: x.prefix,
        label: x.label + ' texto',
        mode: 'legacy',

  function agendaMatBioUsefulChunk(raw) {
    var n = normAgenda(raw);
    if (!n || /^[-_]+$/.test(n)) return false;
    if (/(envio|agendar|gerar gru|preencher log|para obter volume|dhl solicita|dia da coleta|amostras coletadas|fazer uma awb)/i.test(n)) return false;
    if (/^(amb|ambiente|frozen|congelado|backup|bup|bups|primarias|primary|disease evaluation)$/i.test(n)) return false;
    return true;
  }

  function agendaMatBioEnsaioFromText(raw, startIdx) {
    var text = String(raw || '');
    var after = text.slice(startIdx || 0);
    var match = after.match(/\(([^)]+)\)/);
    if (!match) match = text.match(/\(([^)]+)\)/);
    var ensaio = match ? match[1].replace(/\s+/g, ' ').trim() : '';
    return agendaMatBioEnsaioValido(ensaio) ? ensaio : '';
  }

  function agendaMatBioEnsaioNearMatch(raw, startIdx, len) {
    var text = String(raw || '');
    var end = Number(startIdx || 0) + Number(len || 0);
    var after = text.slice(end);
    var before = text.slice(0, startIdx || 0);
    var match = after.match(/^\s*\(([^)]+)\)/);
    if (match) {
      var depois = match[1].replace(/\s+/g, ' ').trim();
      return agendaMatBioEnsaioValido(depois) ? depois : '';
    }
    match = before.match(/\(([^)]+)\)\s*$/);
    var antes = match ? match[1].replace(/\s+/g, ' ').trim() : '';
    return agendaMatBioEnsaioValido(antes) ? antes : '';
  }

  function agendaMatBioEnsaioValido(ensaio) {
    var n = normAgenda(ensaio);
    return !!n && !/^(pode|depende|opcional|eventual|se houver|caso haja|caso tenha)\b/.test(n);
  }

  function agendaMatBioEnsaioDoRotulo(raw, known) {
    if (!known) return '';
    var texto = String(raw || '');
    if (texto.indexOf(':') === -1) return '';
    var rotulo = texto.split(':')[0]
      .replace(/^\s*\d+[a-z]?\)\s*/i, '')
      .replace(/^\s*[-–—]+\s*/, '')
      .trim();
    if (!rotulo) return '';
    var n = normAgenda(rotulo).replace(/[^a-z0-9]+/g, ' ').trim();
    if (CodexMatBioTypes.aliases(known.key).some(function(v) {
      return n === normAgenda(v).replace(/[^a-z0-9]+/g, ' ').trim();
    })) return '';
    return rotulo;
  }

  function agendaMatBioAppendEnsaio(base, extra) {

    agendaMatBioPushUnique(list, base);

  function agendaMatBioSlideLabel(raw, known) {
    var m = normAgenda(raw).match(/(\d+)\s*(?:l.?minas?|slides?)/i);
    if (!m) return '';
    var qtd = Number(m[1]) || 0;
    var base = qtd + ' ' + (qtd === 1 ? 'l\u00e2mina' : 'l\u00e2minas');
    var n = normAgenda(raw);
    if ((known && known.key === 'sangue') || n.indexOf('hematolog') > -1) return base + ' de hematologia';
    return base;
  }

  function agendaMatBioParseFreeText(text) {
    var items = [];
    var lastKnown = null;
    var chunks = String(text || '')
      .replace(/\r/g, '\n')
      .replace(/[\u2022\u00b7]/g, '\n')
      .split(/[;\n]+/);

    chunks.forEach(function(original) {
      var raw = String(original || '').replace(/\s+/g, ' ').trim();
      if (!raw || !agendaMatBioUsefulChunk(raw)) return;

      var known = agendaMatBioKnownFromText(raw) || lastKnown;
      if (agendaMatBioKnownFromText(raw)) lastKnown = agendaMatBioKnownFromText(raw);

      var slideLabel = agendaMatBioSlideLabel(raw, known);
      var hasVolumeUnit = /\d+(?:[.,]\d+)?\s*(?:mL|ml|ML|g)(?![a-zA-Z\u00C0-\u017F])/.test(raw) ||
        /\d+(?:[.,]\d+)?\s*(?:L|l)(?:\s|$|[);,.])/.test(raw);
      var foundFormula = false;
      var matches = [];
      var occupiedMatchPositions = {};
      function addFormulaMatch(match) {
        matches.push(match);
        for (var pos = match.idx, end = match.idx + match.len; pos < end; pos++) occupiedMatchPositions[pos] = true;
      }
      function formulaMatchStartsInsideAccepted(idx) {
        return !!occupiedMatchPositions[idx];
      }
      var tubeWord = '(?:tubos?|tubo\\(s\\)|tubes?|tube\\(s\\)|vials?|aliquots?|aliquotas?|al[ií]quotas?)';
      var reTubosAntes = new RegExp('(\\d+(?:[.,]\\d+)?)\\s*' + tubeWord + '\\s+[a-z\\u00C0-\\u017F\\s-]*?\\s*(?:x|X|\\u00d7|\\*)\\s*(\\d+(?:[.,]\\d+)?)\\s*(mL|ml|ML|L|l|g)(?![a-zA-Z\\u00C0-\\u017F])', 'g');
      var reTubosVolume = new RegExp('(\\d+(?:[.,]\\d+)?)\\s*' + tubeWord + '.*?(\\d+(?:[.,]\\d+)?)\\s*(mL|ml|ML|L|l|g)(?![a-zA-Z\\u00C0-\\u017F])', 'g');
      var reClassico = /(\d+(?:[.,]\d+)?)\s*(?:x|X|\u00d7|\*)\s*(\d+(?:[.,]\d+)?)\s*(mL|ml|ML|L|l|g)(?![a-zA-Z\u00C0-\u017F])/g;
      var reVolumeSemQtd = /(?:^|[:\s])(\d+(?:[.,]\d+)?)\s*(mL|ml|ML|L|l|g)(?![a-zA-Z\u00C0-\u017F])/g;
      var m;

      if (hasVolumeUnit) {
        while ((m = reTubosAntes.exec(raw)) !== null) addFormulaMatch({ qtd: agendaMatBioNumber(m[1]), vol: agendaMatBioVolumeToDisplay(m[2], m[3]), idx: m.index, len: m[0].length });
        while ((m = reTubosVolume.exec(raw)) !== null) {
          if (!formulaMatchStartsInsideAccepted(m.index)) addFormulaMatch({ qtd: agendaMatBioNumber(m[1]), vol: agendaMatBioVolumeToDisplay(m[2], m[3]), idx: m.index, len: m[0].length });
        }
        while ((m = reClassico.exec(raw)) !== null) {
          if (!formulaMatchStartsInsideAccepted(m.index)) addFormulaMatch({ qtd: agendaMatBioNumber(m[1]), vol: agendaMatBioVolumeToDisplay(m[2], m[3]), idx: m.index, len: m[0].length });
        }
        if (!matches.length && known) {
          while ((m = reVolumeSemQtd.exec(raw)) !== null) {
            if (raw.slice(Math.max(0, m.index - 3), m.index).match(/(?:x|X|\u00d7|\*)\s*$/)) continue;
            addFormulaMatch({ qtd: 1, vol: agendaMatBioVolumeToDisplay(m[1], m[2]), idx: m.index, len: m[0].length });
            break;
          }
        }
      }

      matches.forEach(function(match) {
        if (!known || !match.qtd || !match.vol) return;
        foundFormula = true;
        items.push({
          key: known.key,
          tipo: known.label,
          ensaio: agendaMatBioAppendEnsaio(
            agendaMatBioAppendEnsaio(
              agendaMatBioEnsaioDoRotulo(raw, known),
              agendaMatBioEnsaioFromText(raw, 0)
            ),
            agendaMatBioEnsaioNearMatch(raw, match.idx, match.len)
          ),
          formula: agendaMatBioFormulaText(match.qtd, match.vol)
        });
      });

      if (slideLabel) {
        items.push({ key: 'outro', tipo: slideLabel, ensaio: '', formula: '' });
      }
    });

    return items;
  }

    if (monitorRequired) monitorRequired.style.display = isMonitoria ? '' : 'none';
    var salaRequired = document.getElementById('agSalaRequired');
    if (salaRequired) salaRequired.style.display = isMonitoria ? '' : 'none';
    var ocultarEventoGeral = policy.hideGeneralEvent;
    var ocultarDetalhes = policy.hideDetails;

    agendaSetWrapVisible('agParticipanteWrap', !ocultarDetalhes);
    agendaSetWrapVisible('agProjetoWrap', !ocultarEventoGeral);
    agendaSetWrapVisible('agVisitaWrap', !ocultarDetalhes);
    agendaSetWrapVisible('agMedicoWrap', !ocultarDetalhes);
    agendaSetWrapVisible('agPrestadorWrap', !ocultarDetalhes);
    agendaSetWrapVisible('agLabCentralWrap', !ocultarDetalhes);
    agendaSetWrapVisible('agProcedimentosWrap', !ocultarDetalhes);
    agendaSetWrapVisible('agCarroRequeridoWrap', isVisita);
    agendaSetWrapVisible('agMonitorWrap', isPeriodo);
    agendaSetWrapVisible('agDataFimWrap', isPeriodo);
    agendaSetWrapVisible('agHoraWrap', !isPeriodo || isMonitoria);

    if (dataLabel) dataLabel.innerHTML = isPeriodo ? 'Data de Inicio <span class="required-star">*</span>' : 'Data <span class="required-star">*</span>';

      var dataIni = document.getElementById('agData');
      var dataFim = document.getElementById('agDataFim');
      if (dataIni && dataFim && !dataFim.value) dataFim.value = dataIni.value || '';

    if (ocultarDetalhes) {
      ['agParticipante','agVisita','agMedico','agPrestador','agLabCentral','agProcedimentos'].forEach(agendaClearHiddenField);

  function agendaDateOnlyFromIso(value) {
    var parts = String(value || '').split('-');
    if (parts.length !== 3) return null;
    var d = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
    return isNaN(d.getTime()) ? null : d;
  }

  function agendaIsPastDate(value) {
    var d = agendaDateOnlyFromIso(value);
    if (!d) return false;
    var hoje = new Date();
    hoje.setHours(0, 0, 0, 0);
    d.setHours(0, 0, 0, 0);
    return d.getTime() < hoje.getTime();
  }

  function agendaIsFutureDate(value) {
    var d = agendaDateOnlyFromIso(value);
    if (!d) return false;
    var hoje = new Date();
    hoje.setHours(0, 0, 0, 0);
    d.setHours(0, 0, 0, 0);
    return d.getTime() > hoje.getTime();
  }

  function validarAgendaRealizadoFuturo() {
    var statusEl = document.getElementById('agStatus');
    var data = (document.getElementById('agData') || {}).value || '';
    var dataFim = (document.getElementById('agDataFim') || {}).value || '';
    var futuro = agendaIsFutureDate(data) || agendaIsFutureDate(dataFim);
    var ok = !AgendaRules.isRealized(statusEl && statusEl.value) || !futuro;
    if (statusEl) {
      statusEl.classList.toggle('invalid', !ok);
      statusEl.setAttribute('aria-invalid', ok ? 'false' : 'true');
    }
    if (!ok) {
      if (statusEl) statusEl.dataset.futureRealizadoInvalid = '1';
      setAgendaStatus('Atencao: visitas futuras nao podem ser marcadas como Realizado.', 'danger');
    } else if (statusEl && statusEl.dataset.futureRealizadoInvalid === '1') {
      statusEl.dataset.futureRealizadoInvalid = '';
      setAgendaStatus('', '');
    }
    return ok;
  }

  function validarAgendaAlertasDataPassada() {
    var dataValor = (document.getElementById('agData') || {}).value || '';
    if (!agendaIsPastDate(dataValor)) return true;
    var anterior = _agendaEditId ? (_agendaEventos || []).find(function(x) {
      return String(x.id || '') === String(_agendaEditId);
    }) : null;
    var labSim = AgendaRules.isLabCentral((document.getElementById('agLabCentral') || {}).value || '');
    var temRequisicao = agendaMeaningfulValue((document.getElementById('agPrestador') || {}).value || '') ||
      !!(document.getElementById('agReqEnviada') && document.getElementById('agReqEnviada').checked);
    var anteriorPast = anterior && agendaIsPastDate(anterior.dataIso || anterior.data || '');
    var marcandoLab = labSim && (!anterior || !AgendaRules.isLabCentral(anterior) || !anteriorPast);
    var marcandoRequisicao = temRequisicao && (!anterior || !agendaMeaningfulValue(anterior.servTerc) || !anteriorPast);
    if (marcandoLab) {
      snackErro('Lab Central = Sim nao pode ser marcado para uma data anterior a hoje.');
      return false;
    }
    if (marcandoRequisicao) {
      snackErro('Requisicoes de Exame nao podem ser marcadas para uma data anterior a hoje.');
      return false;
    }
    return true;
  }

  function agendaRequiredChecks() {
    var tipoValor = (document.getElementById('agTipo') || {}).value || '';
    var policy = AgendaRules.formPolicy(tipoValor, agendaModoEdicao());
    var isMonitoria = policy.isMonitoring;
    var isPeriodo = policy.isOperationalPeriod;
    var labEl = document.getElementById('agLabCentral');
    var labRequired = agendaTipoExigeLabCentral(tipoValor);
    var checks = [
      { id: 'agData', err: 'errAgData', label: isPeriodo ? 'data de inicio' : 'data', required: true },
      { id: 'agHora', err: 'errAgHora', label: 'horario de inicio', required: !isPeriodo || isMonitoria },
      { id: 'agTipo', err: 'errAgTipo', label: 'tipo de evento', required: true },
      { id: 'agDataFim', err: 'errAgDataFim', label: 'data final', required: isPeriodo },
      { id: 'agProjeto', err: 'errAgProjeto', label: 'projeto', required: isPeriodo },
      { id: 'agMonitor1', err: 'errAgMonitor1', label: 'monitor 1', required: isMonitoria },
      { id: 'agSalaMonitoria', err: 'errAgSalaMonitoria', label: 'local', required: isMonitoria },
      { id: 'agLabCentral', err: 'errAgLabCentral', label: 'laboratorio central', required: labRequired && labEl && !labEl.disabled }
    ];
    return checks.filter(function(check) {
      return check.required && document.getElementById(check.id);
    });
  }

  function agendaMissingRequiredChecks() {
    return agendaRequiredChecks().filter(function(check) {
      var el = document.getElementById(check.id);
      return !el || !String(el.value || '').trim();
    });
  }

  function updateAgendaSaveAvailability(showValidation) {
    var btn = document.getElementById('btnSalvarAgenda');
    if (!btn) return true;
    if (btn.dataset.busy === '1') {
      btn.disabled = true;
      return false;
    }
    var missing = agendaMissingRequiredChecks();
    btn.disabled = missing.length > 0;
    btn.title = missing.length ? 'Preencha: ' + missing.map(function(x) { return x.label; }).join(', ') : '';
    if (showValidation) {
      agendaRequiredChecks().forEach(function(check) {
        var isMissing = missing.some(function(item) { return item.id === check.id; });
        validarAgendaCampo(check.id, check.err, !isMissing);
      });
      if (missing.length) {
        setAgendaStatus('Atencao: preencha os campos obrigatorios: ' + missing.map(function(x) { return x.label; }).join(', ') + '.', 'validation');
      }
    } else {
      var status = document.getElementById('agendaStatusMsg');
      if (!missing.length && status && status.dataset.validationMessage === '1') setAgendaStatus('', '');
    }
    return missing.length === 0;
  }

  function salvarAgendaEvento(cancelamentoMotivo, opts) {
    opts = opts || {};
    if (!updateAgendaSaveAvailability(true)) return;
    var ok = true;
    var tipoValorAtual = (document.getElementById('agTipo') || {}).value || '';
    var policy = AgendaRules.formPolicy(tipoValorAtual, agendaModoEdicao());
    var isMonitoria = policy.isMonitoring;
    var isPeriodo = policy.isOperationalPeriod;
    ok = validarAgendaCampo('agData', 'errAgData', !!document.getElementById('agData').value) && ok;
    if (!isPeriodo || isMonitoria) ok = validarAgendaCampo('agHora', 'errAgHora', !!document.getElementById('agHora').value) && ok;
    if (isPeriodo) ok = validarAgendaPeriodoMonitoria(true) && ok;
    ok = validarAgendaCampo('agTipo', 'errAgTipo', !!document.getElementById('agTipo').value) && ok;
    if (isPeriodo) {
      ok = validarAgendaCampo('agProjeto', 'errAgProjeto', !!document.getElementById('agProjeto').value) && ok;
    }
    if (isMonitoria) {
      ok = validarAgendaCampo('agMonitor1', 'errAgMonitor1', !!document.getElementById('agMonitor1').value) && ok;
      ok = validarAgendaCampo('agSalaMonitoria', 'errAgSalaMonitoria', !!document.getElementById('agSalaMonitoria').value) && ok;
    }
    var labEl = document.getElementById('agLabCentral');
    var tipoValor = (document.getElementById('agTipo') || {}).value || '';
    var labValor = labEl ? String(labEl.value || '').trim() : '';
    var labSim = AgendaRules.isLabCentral(labValor);
    var labRequired = agendaTipoExigeLabCentral(tipoValor);
    var labErr = document.getElementById('errAgLabCentral');
    var labOk = (!labRequired || !!labValor) && (!labSim || !!document.getElementById('agVisita').value.trim());

  function agendaMonitoriaPeriodo(projeto, monitorName, salaMonitoria, dataIso) {
    var alvo = agendaDateFromIso(dataIso);
    var rows = (_agendaEventos || []).filter(function(x) {
      return agendaIsMonitoria(x) &&
        normAgenda(x.projeto) === normAgenda(projeto) &&
        normAgenda(x.monitorName) === normAgenda(monitorName) &&
        normAgenda(x.salaMonitoria) === normAgenda(salaMonitoria);
    }).map(function(x) {
      return x.dataIso || agendaIsoFromBr(x.data || '');
    }).filter(Boolean).sort();
    if (!rows.length) return { inicio: dataIso || '', fim: dataIso || '' };
    if (!alvo) return { inicio: rows[0], fim: rows[rows.length - 1] };
    var idx = rows.indexOf(dataIso);
    if (idx < 0) return { inicio: dataIso || rows[0], fim: dataIso || rows[0] };
    var start = idx;
    var end = idx;
    while (start > 0 && agendaDaysBetweenIso(rows[start - 1], rows[start]) === 1) start--;
    while (end < rows.length - 1 && agendaDaysBetweenIso(rows[end], rows[end + 1]) === 1) end++;
    return { inicio: rows[start], fim: rows[end] };
  }

  function agendaSivPeriodo(projeto, monitorName, salaMonitoria, dataIso) {
    var rows = (_agendaEventos || []).filter(function(x) {
      return AgendaRules.isSiv(x) &&
        !AgendaRules.isCancelled(x) &&
        normAgenda(x.projeto) === normAgenda(projeto) &&
        normAgenda(x.monitorName) === normAgenda(monitorName) &&
        normAgenda(x.salaMonitoria) === normAgenda(salaMonitoria);
    }).map(function(x) {
      return x.dataIso || agendaIsoFromBr(x.data || '');
    }).filter(Boolean).sort();
    if (!rows.length) return { inicio: dataIso || '', fim: dataIso || '' };
    var idx = rows.indexOf(dataIso);
    if (idx < 0) return { inicio: dataIso || rows[0], fim: dataIso || rows[0] };
    var start = idx;
    var end = idx;
    while (start > 0 && agendaDaysBetweenIso(rows[start - 1], rows[start]) === 1) start--;
    while (end < rows.length - 1 && agendaDaysBetweenIso(rows[end], rows[end + 1]) === 1) end++;
    return { inicio: rows[start], fim: rows[end] };
  }

  function agendaDaysBetweenIso(a, b) {
    var da = agendaDateFromIso(a);
    var db = agendaDateFromIso(b);
    if (!da || !db) return NaN;
    return Math.round((db.getTime() - da.getTime()) / 86400000);

  function agendaMonitoriaPeriodoFromRow(r) {

    );

  function agendaPeriodoFromRow(r) {

    if (r && AgendaRules.isSiv(r)) return agendaSivPeriodo(r.projeto || '', r.monitorName || '', r.salaMonitoria || '', dataIso);

  function agendaKitsSelecionadosParaBaixa() {
    return agendaKitIds().map(function(id) {
      var el = document.getElementById(id);
      if (!el || !el.value) return null;
      var opt = el.options[el.selectedIndex];
      return {
        idItem: el.value,
        label: opt ? opt.text : el.value
      };
    }).filter(Boolean);
  }

  function setAgendaKitsBaixaState(baixados) {
    _agendaKitsBaixados = !!baixados;
    agendaKitIds().forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.disabled = !!baixados;
    });
    var btn = document.getElementById('btnBaixarKitsAgenda');
    if (btn) {
      btn.innerHTML = baixados
        ? '<span class="material-symbols-outlined">assignment_return</span> Devolver kits ao estoque'
        : '<span class="material-symbols-outlined">inventory</span> Dar baixa nos kits selecionados';
    }
  }

  function atualizarEstadoBaixaKitsAgenda(id) {
    setAgendaKitsBaixaState(false);
    if (!id) return;
    google.script.run
      .withSuccessHandler(function(res) { setAgendaKitsBaixaState(!!(res && res.baixados)); })
      .withFailureHandler(function() { setAgendaKitsBaixaState(false); })
      .getKitsAgendaBaixaStatus(id);
  }

  function confirmarAgendaKits(titulo, mensagem, onConfirm) {
    document.getElementById('confirmAgendaKitsTitle').textContent = titulo || 'Confirmar movimentacao';
    document.getElementById('confirmAgendaKitsMsg').textContent = mensagem || 'Confirme a acao.';
    var btn = document.getElementById('btnConfirmAgendaKits');
    btn.onclick = function() {
      fecharOverlay('confirmAgendaKits');
      if (typeof onConfirm === 'function') onConfirm();
    };
    abrirOverlay('confirmAgendaKits');
  }

  function baixarKitsAgendaEvento() {
    if (!_agendaEditId) {
      snackErro('Salve o agendamento antes de dar baixa nos kits.');
      return;
    }
    var kits = agendaKitsSelecionadosParaBaixa();
    var dados = coletarAgendaEvento();
    if (_agendaKitsBaixados) {
      confirmarAgendaKits('Devolver kits ao estoque', 'Devolver ao estoque os kits ja baixados desta visita?', function() {
      var btnDev = document.getElementById('btnBaixarKitsAgenda');
      if (btnDev) btnDev.disabled = true;
      google.script.run
        .withSuccessHandler(function(res) {
        if (btnDev) btnDev.disabled = false;
        snack((res && res.msg) || 'Kits devolvidos ao estoque.');
        setAgendaKitsBaixaState(false);
          carregarAgendaEventos(true);
        })
        .withFailureHandler(function(e) {
          if (btnDev) btnDev.disabled = false;
          snackErro(e);
        })
        .devolverKitsAgendaEvento({
          agendaId: _agendaEditId,
          participante: dados.participante,
          projeto: dados.projeto,
          visita: dados.visita,
          data: dados.data
        });
      });
      return;
    }
    if (!kits.length) {
      snackErro('Selecione pelo menos um kit de coleta.');

    options = options || {};

      if (typeof callback === 'function') callback();
      if (typeof options.onComplete === 'function') options.onComplete();
    }
    function finalizarTentativa() {
      if (typeof options.onComplete === 'function') options.onComplete();

    google.script.run
      .withSuccessHandler(function(rows) {

  function agendaOnSearchInput() {
    if (_agendaSearchTimer) clearTimeout(_agendaSearchTimer);
    var query = String((document.getElementById('agendaBusca') || {}).value || '').trim();
    if (!query) {
      _agendaHistoricoQuery = '';
      _agendaHistoricoEventos = [];
      _agendaHistoricoLoading = false;
      renderAgendaOperacional();
      return;
    }
    _agendaHistoricoLoading = true;
    renderAgendaOperacional();
    if (query.length < 2) {
      _agendaHistoricoLoading = false;
      renderAgendaOperacional();
      return;
    }
    _agendaSearchTimer = setTimeout(function() {
      agendaCarregarHistorico(query, null, 0);

  function agendaCarregarHistorico(query, cursor, page) {
    var requestId = ++_agendaHistoricoRequestId;
    _agendaHistoricoLoading = true;
    renderAgendaOperacional();
    google.script.run
      .withSuccessHandler(function(response) {
        if (requestId !== _agendaHistoricoRequestId) return;
        var current = String((document.getElementById('agendaBusca') || {}).value || '').trim();
        if (normAgenda(current) !== normAgenda(query)) return;
        _agendaHistoricoQuery = query;
        _agendaHistoricoEventos = ((response && response.items) || []).map(agendaNormalizeRow);
        _agendaHistoricoNextCursor = response && response.nextCursor != null ? response.nextCursor : null;
        _agendaHistoricoPage = page;
        _agendaHistoricoCursors[page] = cursor;
        _agendaHistoricoCursors.length = page + 1;
        _agendaHistoricoLoading = false;
        renderAgendaOperacional();
      })
      .withFailureHandler(function(e) {
        if (requestId !== _agendaHistoricoRequestId) return;
        _agendaHistoricoLoading = false;
        var lista = document.getElementById('agendaViewLista');
        if (lista) lista.innerHTML = '<div class="ag-empty" style="color:#e53935"><span class="material-symbols-outlined">error</span>' + esc(appErrorMessage(e)) + '</div>';
      })
      .pesquisarAgendaHistorico(query, cursor, 25);
  }

  function agendaHistoricoProxima() {
    if (_agendaHistoricoNextCursor == null || _agendaHistoricoLoading) return;
    agendaCarregarHistorico(_agendaHistoricoQuery, _agendaHistoricoNextCursor, _agendaHistoricoPage + 1);
  }

  function agendaHistoricoAnterior() {
    if (_agendaHistoricoPage <= 0 || _agendaHistoricoLoading) return;
    var page = _agendaHistoricoPage - 1;
    agendaCarregarHistorico(_agendaHistoricoQuery, _agendaHistoricoCursors[page], page);
  }

  function agendaNormalizeRow(r) {

      r.data, r.hora, r.tipo, r.status, r.participante, r.idParticipante, r.projeto,
      r.braco, r.visita, r.medico, r.procedimentos, r.servTerc, r.monitorName, r.salaMonitoria, r.obs, r.labCentral,
      r.controle, r.kit, r.statusRequisicao, r.poloTrialData, r.ecrfData,
      agendaCourierSearch(r.courier1), agendaCourierSearch(r.courier2),
      agendaCourierSearch(r.courier3), agendaCourierSearch(r.backup)
    ].join(' ');
    return r;
  }

  function agendaGoToDate(iso) {
    var target = agendaDateFromIso(iso);
    if (!target) return;
    var base = new Date();
    base.setHours(0, 0, 0, 0);
    var baseDay = base.getDay();
    base.setDate(base.getDate() + (baseDay === 0 ? -6 : 1 - baseDay));
    var targetDay = target.getDay();
    target.setDate(target.getDate() + (targetDay === 0 ? -6 : 1 - targetDay));
    var baseUtc = Date.UTC(base.getFullYear(), base.getMonth(), base.getDate());
    var targetUtc = Date.UTC(target.getFullYear(), target.getMonth(), target.getDate());
    _agendaWeekOffset = Math.round((targetUtc - baseUtc) / 604800000);
    renderAgendaOperacional();
    setTimeout(function() { agendaScrollToDate(iso); }, 0);
  }

  function agendaScrollToDate(iso) {
    if (_agendaView === 'lista') {
      var el = document.getElementById('agendaDay-' + iso);
      if (el) {
        el.classList.add('focus-date');
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        setTimeout(function() { el.classList.remove('focus-date'); }, 1800);
      }
      return;
    }
    var wk = document.getElementById('agendaWeekDay-' + iso);
    if (wk) {
      wk.classList.add('focus-date');
      wk.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      setTimeout(function() { wk.classList.remove('focus-date'); }, 1800);
    }
  }

  function renderAgendaOperacional() {
    agendaUpdatePeriod();
    if (_agendaView === 'semana') renderAgendaSemana();
    else renderAgendaLista();
  }

  function agendaWeekStart() {
    var d = new Date();
    d.setHours(0,0,0,0);
    var day = d.getDay();
    var diff = day === 0 ? -6 : 1 - day;
    d.setDate(d.getDate() + diff + (_agendaWeekOffset * 7));
    return d;
  }

  function agendaUpdatePeriod() {
    var el = document.getElementById('agendaPeriodo');
    if (!el) return;
    var q = normAgenda((document.getElementById('agendaBusca') || {}).value || '');
    if (q && _agendaView === 'lista') {
      el.textContent = 'Historico filtrado';
      return;
    }
    var a = agendaWeekStart();
    var b = new Date(a); b.setDate(a.getDate() + 6);
    el.textContent = agendaFmtShort(a) + ' - ' + agendaFmtShort(b);
  }

  function agendaRowsFiltradas() {
    var ini = agendaWeekStart();
    var fim = new Date(ini); fim.setDate(ini.getDate() + 7);
    var q = normAgenda((document.getElementById('agendaBusca') || {}).value || '');
    var source = q && _agendaView === 'lista' ? _agendaHistoricoEventos : _agendaEventos;
    return source.filter(function(r) {
      var d = agendaDateFromIso(r.dataIso);
      if (!d) return false;
      if (!q || _agendaView !== 'lista') {
        if (d < ini || d >= fim) return false;
      }
      return !q || normAgenda(r._search).indexOf(q) > -1;
    });
  }

  function renderAgendaLista() {
    var el = document.getElementById('agendaViewLista');
    if (!el) return;
    var rows = agendaRowsFiltradas();
    var q = normAgenda((document.getElementById('agendaBusca') || {}).value || '');
    var html = '';
    if (q) {
      var rawQuery = String((document.getElementById('agendaBusca') || {}).value || '').trim();
      if (rawQuery.length < 2) {
        el.innerHTML = '<div class="ag-empty"><span class="material-symbols-outlined">manage_search</span>Digite pelo menos 2 caracteres para pesquisar no historico.</div>';
        return;
      }
      if (_agendaHistoricoLoading || normAgenda(_agendaHistoricoQuery) !== q) {
        el.innerHTML = '<div class="ag-empty"><span class="material-symbols-outlined">hourglass_empty</span>Pesquisando historico...</div>';
        return;
      }
      var days = {};
      rows.forEach(function(r) { if (r.dataIso) days[r.dataIso] = true; });
      var keys = Object.keys(days).sort();
      if (!keys.length) {
        el.innerHTML = '<div class="ag-empty"><span class="material-symbols-outlined">search_off</span>Nenhum resultado encontrado.</div>' + agendaHistoricoPagerHtml();
        return;
      }
      keys.forEach(function(iso) {
        var d = agendaDateFromIso(iso);
        var dayRows = rows.filter(function(r) { return r.dataIso === iso; });
        html += agendaDayHeader(d, dayRows);
        html += dayRows.map(function(r, idx) { return agendaCardHtml(r, iso + '-' + idx); }).join('');
      });
    } else {
      for (var i = 0; i < 7; i++) {
        var d = agendaWeekStart(); d.setDate(d.getDate() + i);
        var iso = agendaIso(d);
        var dayRows = rows.filter(function(r) {
          return r.dataIso === iso && AgendaRules.isVisibleIn(r, AgendaRules.Context.LIST);
        });
        html += agendaDayHeader(d, dayRows);
        html += dayRows.length
          ? dayRows.map(function(r, idx) { return agendaCardHtml(r, iso + '-' + idx); }).join('')
          : '<div class="ag-empty"><span class="material-symbols-outlined">event_busy</span>Dia livre - sem agendamentos registrados.</div>';
      }
    }
    if (q) html += agendaHistoricoPagerHtml();
    else if (_agendaEventosTruncated) html += '<div class="ag-empty">Exibindo os primeiros 200 eventos desta semana. Refine o periodo ou use a pesquisa historica.</div>';
    el.innerHTML = html;
  }

  function agendaHistoricoPagerHtml() {

      ? '<button class="ag-tb-btn" onclick="agendaHistoricoAnterior()"><span class="material-symbols-outlined">chevron_left</span>Anterior</button>'
      : '';
    var proxima = _agendaHistoricoNextCursor != null
      ? '<button class="ag-tb-btn" onclick="agendaHistoricoProxima()">Proxima<span class="material-symbols-outlined">chevron_right</span></button>'
      : '';
    return '<div class="ag-history-pager">' + anterior + '<span>Pagina ' + (_agendaHistoricoPage + 1) + '</span>' + proxima + '</div>';
  }

  function renderAgendaSemana() {
    var grid = document.getElementById('agendaWeekGrid');
    if (!grid) return;
    var rows = agendaRowsFiltradas();
    var todayIso = agendaIso(new Date());
    var html = '';
    for (var i = 0; i < 7; i++) {
      var d = agendaWeekStart(); d.setDate(d.getDate() + i);
      var iso = agendaIso(d);
      var dayRows = rows.filter(function(r) {
        return r.dataIso === iso && AgendaRules.isVisibleIn(r, AgendaRules.Context.WEEK);
      });
      var carros = agendaCarroRequeridoCount(dayRows);
      html += '<div class="ag-wk-col ' + (iso === todayIso ? 'today-col' : '') + '" id="agendaWeekDay-' + iso + '">' +
        '<div class="ag-wk-col-hdr"><div class="ag-wk-wd">' + agendaWeekday(d) + '</div><div class="ag-wk-num">' + d.getDate() + '</div>' + (iso === todayIso ? '<div><span class="ag-wk-dot"></span></div>' : '') + (carros ? agendaCarroDiaPill(carros, true) : '') + '</div>' +
        '<div class="ag-wk-appts">' +
        (dayRows.length ? dayRows.map(agendaWeekCardHtml).join('') : '<div class="ag-wk-empty">-</div>') +
        '</div></div>';
    }
    grid.innerHTML = html;

  function agendaDayHeader(d, rows) {
    rows = (rows || []).filter(function(r) {
      return AgendaRules.isVisibleIn(r, AgendaRules.Context.DAILY_HEADER);
    });
    var total = rows.length;
    var lab = rows.filter(function(r) { return AgendaRules.countsIn(r, 'lab-central'); }).length;
    var ok = rows.filter(AgendaRules.isCompleted).length;
    var pend = rows.filter(function(r) { return !AgendaRules.isCompleted(r) && !AgendaRules.isCancelled(r); }).length;
    var tipoStats = agendaTipoStats(rows);
    var courierNaoAg = rows.reduce(function(sum, r) { return sum + agendaCourierNaoAgendadoCount(r); }, 0);
    var carros = agendaCarroRequeridoCount(rows);
    var todayIso = agendaIso(new Date());
    var iso = agendaIso(d);
    var today = iso === todayIso;
    var past = iso < todayIso;
    return '<div class="ag-day-hdr ' + (today ? 'today' : past ? 'past' : '') + '" id="agendaDay-' + iso + '">' +
      '<div class="ag-day-info"><div class="ag-day-cal"><div class="ag-day-wd">' + agendaWeekday(d) + '</div><div class="ag-day-n">' + agendaDayShortLabel(d) + '</div></div>' +
      '<div class="ag-day-stats">' + (tipoStats.length ? tipoStats.map(function(t) {
        return '<span class="ag-dpill ag-dp-n">' + t.count + ' ' + esc(t.label) + '</span>';
      }).join('') : '<span class="ag-dpill ag-dp-n">' + total + ' evento(s)</span>') +
      (lab ? '<span class="ag-dpill ag-dp-lab">' + lab + ' Lab Central</span>' : '') +
      (carros ? agendaCarroDiaPill(carros, false) : '') +
      (courierNaoAg ? '<span class="ag-dpill ag-dp-pend">' + courierNaoAg + ' courier nao agendado</span>' : '') +
      '</div></div><div class="ag-day-actions"><button type="button" class="ag-print-day" title="Imprimir visitas e consultas deste dia" aria-label="Imprimir visitas e consultas deste dia" onclick="imprimirAgendaDia(\'' + iso + '\')"><span class="material-symbols-outlined">print</span></button></div></div>';
  }

  function agendaCarroRequeridoCount(rows) {
    return (rows || []).filter(function(r) {
      return !!(r && r.carroRequerido);
    }).length;
  }

  function agendaCarroDiaPill(count, compact) {
    return '<span class="ag-dpill ag-dp-car" title="Ha pelo menos um evento com carro requerido"><span class="material-symbols-outlined">electric_car</span>Carro requerido</span>';
  }

  function agendaTipoStats(rows) {
    var mapa = {};
    rows.forEach(function(r) {
      var tipo = String(r.tipo || 'Evento').trim() || 'Evento';
      if (AgendaRules.isType(tipo, 'feriado')) return;
      var key = normAgenda(tipo);
      if (!mapa[key]) mapa[key] = { tipo: tipo, count: 0 };
      mapa[key].count++;
    });
    return Object.keys(mapa).map(function(k) {
      var item = mapa[k];
      return { count: item.count, label: agendaTipoPlural(item.tipo, item.count) };
    }).sort(function(a, b) { return b.count - a.count || a.label.localeCompare(b.label); });
  }

  function agendaTipoPlural(tipo, count) {
    return AgendaRules.typePluralLabel(tipo, count, tipo);
  }

  function agendaCourierNaoAgendadoCount(r) {
    return [r.courier1, r.courier2, r.courier3, r.backup].filter(function(c) {

  function agendaPrintShell(opts) {
    opts = opts || {};
    var logo = (typeof getPatientDisplayLogoSrc === 'function' ? getPatientDisplayLogoSrc() : '') || ((document.querySelector('.nav-brand img') || {}).src || '');
    var logoHtml = logo ? '<img src="' + logo + '" alt="IPS | UCS">' : '<div class="brand-text">IPS | UCS</div>';

  function agendaGoogleCalendarDateIso(r) {
    var iso = String((r && r.dataIso) || agendaIsoFromBr((r && r.data) || '') || '').trim();
    return /^\d{4}-\d{2}-\d{2}$/.test(iso) ? iso : '';
  }

  function agendaGoogleCalendarAddDays(iso, days) {
    var p = String(iso || '').split('-');
    if (p.length !== 3) return '';
    var d = new Date(Date.UTC(Number(p[0]), Number(p[1]) - 1, Number(p[2])));
    if (isNaN(d.getTime())) return '';
    d.setUTCDate(d.getUTCDate() + Number(days || 0));
    return d.getUTCFullYear() + '-' + ('0' + (d.getUTCMonth() + 1)).slice(-2) + '-' + ('0' + d.getUTCDate()).slice(-2);
  }

  function agendaGoogleCalendarDateTime(iso, hora, addMinutes) {
    var p = String(iso || '').split('-');
    var hm = String(hora || '08:00').match(/^(\d{1,2}):(\d{2})/);
    if (p.length !== 3 || !hm) return '';
    if (Number(hm[1]) > 23 || Number(hm[2]) > 59) return '';
    var d = new Date(Date.UTC(Number(p[0]), Number(p[1]) - 1, Number(p[2]), Number(hm[1]), Number(hm[2])));
    if (isNaN(d.getTime())) return '';
    d.setUTCMinutes(d.getUTCMinutes() + Number(addMinutes || 0));
    return d.getUTCFullYear() +
      ('0' + (d.getUTCMonth() + 1)).slice(-2) +
      ('0' + d.getUTCDate()).slice(-2) + 'T' +
      ('0' + d.getUTCHours()).slice(-2) +
      ('0' + d.getUTCMinutes()).slice(-2) + '00';
  }

  function agendaGoogleCalendarDescription(r) {
    var linhas = [];
    function add(label, value) {
      value = String(value || '').trim();
      if (value) linhas.push(label + ': ' + value);
    }
    add('Tipo de evento', r.tipo);
    if (AgendaRules.isOperationalPeriod(r)) {
      add('Projeto', r.projeto);
      add('Monitor(es)', r.monitorName);
      add('Sala', r.salaMonitoria);
    } else {
      add('Participante', r.participante);
      add('Projeto', r.projeto);
      add('Visita', r.visita);
      add('Médico', r.medico);
      add('Procedimentos', r.procedimentos);
      add('Serviço terceirizado', r.servTerc);
    }
    add('Observações', r.obs);
    return linhas.join('\n');
  }

  function agendaGoogleCalendarPayload(r) {
    r = r || {};
    var dataIso = agendaGoogleCalendarDateIso(r);
    if (!dataIso) return null;
    var isMonitoria = agendaIsMonitoria(r);
    var isSiv = AgendaRules.isSiv(r);
    var titulo;
    var dates;
    var local = '';
    if (isMonitoria) {
      var periodo = agendaMonitoriaPeriodo(r.projeto || '', r.monitorName || '', r.salaMonitoria || '', dataIso);
      var inicio = periodo.inicio || dataIso;
      var fimExclusivo = agendaGoogleCalendarAddDays(periodo.fim || dataIso, 1);
      if (!fimExclusivo) return null;
      titulo = ['Monitoria', r.projeto, r.monitorName].filter(Boolean).join(' - ');
      dates = inicio.replace(/-/g, '') + '/' + fimExclusivo.replace(/-/g, '');
      local = 'Instituto de Pesquisas em Saúde';
    } else if (isSiv) {
      var periodoSiv = agendaSivPeriodo(r.projeto || '', r.monitorName || '', r.salaMonitoria || '', dataIso);
      var inicioSiv = periodoSiv.inicio || dataIso;
      var fimSivExclusivo = agendaGoogleCalendarAddDays(periodoSiv.fim || dataIso, 1);
      if (!fimSivExclusivo) return null;
      titulo = ['SIV', r.projeto].filter(Boolean).join(' - ');
      dates = inicioSiv.replace(/-/g, '') + '/' + fimSivExclusivo.replace(/-/g, '');
      local = 'Instituto de Pesquisas em Saúde';
    } else {
      var partesTitulo = [r.tipo || 'Evento', r.participante, r.projeto];
      if (r.visita) partesTitulo.push('Visita ' + r.visita);
      titulo = partesTitulo.filter(function(v) { return String(v || '').trim(); }).join(' - ');
      var inicioHora = agendaGoogleCalendarDateTime(dataIso, r.hora || '08:00', 0);
      var fimHora = agendaGoogleCalendarDateTime(dataIso, r.hora || '08:00', 60);
      if (!inicioHora || !fimHora) return null;
      dates = inicioHora + '/' + fimHora;
    }
    if (!dates || dates.indexOf('/') < 0) return null;
    return {
      text: titulo || 'Evento',
      dates: dates,
      details: agendaGoogleCalendarDescription(r),
      location: local
    };
  }

  function agendaGoogleCalendarUrl(r) {
    var payload = agendaGoogleCalendarPayload(r);
    if (!payload) return '';
    var params = new URLSearchParams();
    params.set('action', 'TEMPLATE');
    params.set('text', payload.text);
    params.set('dates', payload.dates);
    params.set('ctz', 'America/Sao_Paulo');
    if (payload.details) params.set('details', payload.details);
    if (payload.location) params.set('location', payload.location);
    return 'https://calendar.google.com/calendar/render?' + params.toString();
  }

  function abrirEventoNoGoogleCalendar(id) {

    }
    if (!AgendaRules.canPerform(r, AgendaRules.Action.ADD_TO_GOOGLE_CALENDAR)) {
      snackErro('Eventos cancelados não podem ser enviados ao Google Agenda.');
      return;
    }
    var url = agendaGoogleCalendarUrl(r);
    if (!url) {
      snackErro('Não foi possível preparar a data deste evento para o Google Agenda.');
      return;
    }
    var w = window.open(url, '_blank', 'noopener');

  }

    var data = agendaMatBioParseJson(c.matBioJson);
    data.items = agendaMatBioGroupItems(data.items);
    if (!data.items.length) {
      return c.material ? esc(c.material) : '<span class="ag-mat-empty">Nenhum material informado.</span>';
    }
    return '<table class="ag-mat-table"><thead><tr>' +
      '<th>Substância</th><th class="r">Tubos</th><th>Volume por tubo</th><th class="r">Total</th><th>Ensaio</th>' +
      '</tr></thead><tbody>' + data.items.map(function(it) {
        return '<tr>' +
          '<td><span class="ag-mat-subst"><span class="material-symbols-outlined">' + esc(agendaMatBioIcon(it.tipo || it.key)) + '</span>' + esc(it.tipo || '-') + '</span></td>' +
          '<td class="r"><b>' + esc(it.segmentos && it.segmentos.length ? agendaFmtNumber(it.tubos, 0) : '-') + '</b></td>' +
          '<td>' + agendaMatBioSegmentsHtml(it) + '</td>' +
          '<td class="r"><b>' + esc(it.segmentos && it.segmentos.length ? agendaFmtNumber(it.total, agendaMatBioUnitKey(it.unit) === 'L' ? 5 : 2) : '-') + '</b>' + (it.segmentos && it.segmentos.length ? '<span class="ag-mat-unit">' + esc(agendaMatBioUnitKey(it.unit)) + '</span>' : '') + '</td>' +
          '<td>' + esc(it.ensaio || '-') + '</td>' +
        '</tr>';
      }).join('') + '</tbody></table>';
  }

  function agendaMatBioSegmentsHtml(it) {
    var segs = Array.isArray(it.segmentos) ? it.segmentos : agendaMatBioParseFormula(it.formula).segmentos;
    if (!segs.length) return '<span class="ag-mat-empty">-</span>';
    var unit = agendaMatBioUnitKey(it.unit);
    it = Object.assign({}, it, { unit: unit });
    return '<div class="ag-vol-group">' + segs.map(function(s, idx) {
      return (idx ? '<span class="ag-vol-plus">+</span>' : '') +
        '<span class="ag-vol-chip"><span class="ag-vol-n">' + esc(agendaFmtNumber(s.qtd, 0)) + '</span><span>×</span><span class="ag-vol-v">' + esc(agendaFmtNumber(s.vol, it.unit === 'L' ? 5 : 2)) + ' ' + esc(it.unit || 'mL') + '</span></span>';
    }).join('') + '</div>';
  }

  function agendaMatBioIcon(tipo) {
    var n = normAgenda(tipo);
    var cfg = AGENDA_MATBIO_TIPOS.find(function(t) { return n === normAgenda(t.key) || n === normAgenda(t.label); });
    return cfg ? cfg.icon : 'biotech';
  }

  function agendaCourierCard(c, n, backup, agendaId, slot) {
    c = c || {};
    if (!agendaCourierMeaningful(c)) return '';
    var naoAplicavel = agendaCourierStatusNaoAplicavel(c.status);
    var ok = ['coletado','enviado','entregue','confirmado'].indexOf(agendaCourierStatusClass(c.status)) > -1;
    var btnId = 'btnCardTransp' + String(agendaId || '').replace(/\W/g, '') + String(slot || '').replace(/\W/g, '');
    var docBtn = agendaId && !backup ? '<button class="ag-c-doc-btn" id="' + esc(btnId) + '" type="button" onclick="event.stopPropagation();gerarTransporteAgendaCard(\'' + esc(agendaId) + '\',\'' + esc(slot) + '\',\'' + esc(btnId) + '\')"><span class="material-symbols-outlined">description</span> Gerar docs</button>' : '';
    return '<div class="ag-c-card ' + (backup ? 'backup' : '') + '">' +
      '<div class="ag-c-head"><span class="ag-c-num">' + esc(n) + '</span><span class="ag-c-brand">' + esc(c.nome || (backup ? 'Backup' : 'Transporte')) + '</span>' + docBtn + '<span class="ag-c-status ag-ch-' + agendaCourierStatusClass(c.status) + '"><span class="material-symbols-outlined">' + (naoAplicavel ? 'block' : ok ? 'check_circle' : 'pending') + '</span>' + esc(c.status || 'Pendente') + '</span></div>' +
      '<div class="ag-c-body">' +
        '<div class="ag-c-col"><div class="ag-c-col-label"><span class="material-symbols-outlined">device_thermostat</span>Temperatura</div>' + (c.temperatura ? '<span class="ag-temp ' + agendaTempClass(c.temperatura) + '">' + esc(c.temperatura) + '</span>' : '<span class="ag-awb-pend">Nao informado</span>') + '</div>' +
        '<div class="ag-c-col"><div class="ag-c-col-label"><span class="material-symbols-outlined">science</span>Laboratório destino</div><div class="ag-mat-text">' + esc(c.destino || '-') + '</div></div>' +
        '<div class="ag-c-col"><div class="ag-c-col-label"><span class="material-symbols-outlined">confirmation_number</span>AWB</div>' + agendaAwbHtml(c.awb, c.nome) + '</div>' +
        '<div class="ag-c-col"><div class="ag-c-col-label"><span class="material-symbols-outlined">biotech</span>Material biológico</div><div class="ag-mat-text">' + agendaMatBioSummaryHtml(c) + '</div></div>' +
      '</div></div>';
  }

  function agendaTempClass(v) {
    return AgendaRules.temperatureClass(v);
  }

  function agendaAwbHtml(awb, courier) {
    awb = String(awb || '').trim();
    if (!awb) return '<span class="ag-awb-pend">Aguardando AWB</span>';
    var url = agendaTrackingUrl(awb, courier);
    if (url) {
      var link = '<a class="ag-awb" href="' + esc(url) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">' + esc(awb) + '</a>';
      if (agendaIsPinexCourier(courier)) {
        return '<span class="ag-awb-actions">' + link + agendaAwbCopyButton(awb) + '</span>';
      }
      return link;
    }
    return '<span class="ag-awb">' + esc(awb) + '</span>';
  }

  function agendaTrackingUrl(awb, courier) {
    awb = String(awb || '').trim();
    if (agendaIsPinexCourier(courier)) return 'https://pinextracking.com.br/#tracking-code';
    if (/^620X[0-9]{8}$/i.test(awb)) return 'https://online.marken.com/FastTrack/Shipment?inputTrack=' + encodeURIComponent(awb);
    if (/^[A-Z][0-9]{7}$/i.test(awb) || /^PK2[A-Z0-9]{9}$/i.test(awb)) return 'https://tracking.ocasa.com/Tracking/index?client=&airbillnumber=' + encodeURIComponent(awb) + '&i=18&url=ocasa';
    if (/^[0-9]{10}$/.test(awb)) return 'https://www.dhl.com/br-en/home/tracking.html?tracking-id=' + encodeURIComponent(awb) + '&submit=1';
    return '';
  }

  function agendaIsPinexCourier(courier) {
    var n = normAgenda(courier);
    return n === 'pinex';
  }

  function agendaAwbCopyButton(awb) {
    return '<button type="button" class="ag-awb-copy" title="Copiar AWB" aria-label="Copiar AWB" onclick="agendaCopyAwb(\'' + encodeURIComponent(awb) + '\', event)"><span class="material-symbols-outlined">content_copy</span></button>';
  }

  function agendaCopyAwb(encodedAwb, event) {
    if (event) event.stopPropagation();
    var awb = decodeURIComponent(encodedAwb || '');
    if (!awb) return;
    var done = function() { snack('AWB copiada.'); };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(awb).then(done).catch(function() { agendaCopyAwbFallback(awb, done); });
    } else {
      agendaCopyAwbFallback(awb, done);
    }
  }

  function agendaCopyAwbFallback(awb, done) {
    var ta = document.createElement('textarea');
    ta.value = awb;
    ta.setAttribute('readonly', '');
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
    if (done) done();
  }

  function agendaWeekCardHtml(r) {
    var labSim = AgendaRules.isLabCentral(r);
    var isMon = agendaIsMonitoria(r);
    var isSiv = AgendaRules.isSiv(r);
    var isPeriodoOperacional = AgendaRules.isOperationalPeriod(r);
    return '<div class="ag-wk-appt wa-' + agendaStatusClass(r) + agendaTipoVisualClass(r) + '" onclick="agendaAbrirNaLista(\'' + esc(r.rowIndex || '') + '\', true)">' +
      '<div class="ag-wk-time">' + esc(r.hora || '--:--') + '</div><div class="ag-wk-name">' + esc(isMon ? 'Monitoria' : (isSiv ? 'SIV' : (r.participante || r.tipo || 'Evento'))) + '</div>' +
      (isPeriodoOperacional ? '' : '<div style="margin:4px 0">' + agendaTipoChip(r.tipo) + '</div>') +
      '<div class="ag-wk-proj"><span class="material-symbols-outlined">folder_open</span>' + esc(r.projeto || '-') + '</div>' +
      (r.carroRequerido ? '<div style="margin-top:4px">' + agendaCarroChip() + '</div>' : '') +
      '<div class="ag-wk-visit">' + esc(isPeriodoOperacional ? (r.salaMonitoria || '-') : (r.visita || r.tipo || '-')) + '</div>' +
      (labSim ? '<div class="ag-wk-lab">Lab central</div>' : '') +
      '</div>';
  }

  function agendaToggleDetail(id) {
    var el = document.getElementById(id);
    if (el) el.classList.toggle('open');
  }

  function agendaStatusChipOp(status, tipo) {
    var cls = agendaStatusClass({status: status, tipo: tipo});
    var label = status || tipo || '-';
    return '<span class="ag-st-chip ag-ch-' + cls + '">' + esc(label) + '</span>';
  }

  function agendaStatusClass(r) {
    return AgendaRules.visualClass(r);
  }

  function agendaTipoVisualClass(r) {
    return AgendaRules.typeVisualClass(r);
  }

  function agendaIsMonitoria(r) {
    return AgendaRules.isMonitoring(r);
  }

  function agendaChip(v, cls, icon) {
    return v ? '<span class="' + cls + '"><span class="material-symbols-outlined">' + icon + '</span>' + esc(v) + '</span>' : '';
  }

  function agendaTipoChip(tipo) {
    if (!tipo) return '';
    return '<span class="ag-type-chip ' + agendaTipoClass(tipo) + '"><span class="material-symbols-outlined">' + agendaTipoIcon(tipo) + '</span>' + esc(tipo) + '</span>';
  }

  function agendaTipoClass(tipo) {
    return AgendaRules.typeClass(tipo);
  }

  function agendaTipoIcon(tipo) {
    return AgendaRules.typeIcon(tipo);
  }

  function agendaChipMeaningful(v, cls, icon) {
    if (!agendaMeaningfulValue(v)) return '';
    return agendaChip(v, cls, icon);
  }

  function agendaCourierSummaryChip(r) {
    var total = agendaCourierList(r).length;
    return total ? '<span class="ag-lab-ind">' + total + ' courier(s)</span>' : '';
  }

  function agendaSidePanelHtml(r, labSim) {
    var resumo = agendaLogisticaResumo(r);
    return resumo ? '<div class="ag-log-summary">' + resumo + '</div>' : '';
  }

  function agendaLogisticaResumo(r) {
    var grupos = {};
    agendaCourierList(r).forEach(function(c) {
      var nome = agendaMeaningfulValue(c.nome) ? c.nome : 'Transporte';
      var status = agendaMeaningfulValue(c.status) ? c.status : 'Pendente';
      var key = normAgenda(nome) + '|' + normAgenda(status);
      if (!grupos[key]) grupos[key] = { nome: nome, status: status, count: 0 };
      grupos[key].count++;
    });
    var linhas = Object.keys(grupos).map(function(k) {
      var g = grupos[k];
      return '<strong>' + esc(g.nome) + '</strong> · ' + esc(g.status) + (g.count > 1 ? ' (' + g.count + ')' : '');
    });
    return linhas.join('<br>');
  }

  function agendaAwbMiniHtml(awb, courier) {
    awb = String(awb || '').trim();
    var url = agendaTrackingUrl(awb, courier);
    if (url) return '<a class="ag-mini-chip ag-mini-awb" href="' + esc(url) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">' + esc(awb) + '</a>';
    return '<span class="ag-mini-chip ag-mini-awb">' + esc(awb) + '</span>';
  }

  function agendaCarroChip() {
    return '<span class="ag-car-chip"><span class="material-symbols-outlined">electric_car</span>Carro requerido</span>';
  }

  function agendaCourierStatusClass(status) {
    return AgendaRules.courierStatusKey(status);
  }

  function agendaTypeHint(r) {
    if (AgendaRules.isLabCentral(r) || agendaMeaningfulValue(r.kit) || agendaCourierList(r).length) return '';
    return '';
  }

  function agendaCourierList(r) {
    return [r.courier1, r.courier2, r.courier3, r.backup].filter(function(c) {
      return agendaCourierMeaningful(c) && !agendaCourierStatusNaoAplicavel(c.status);
    });
  }

  function agendaCourierStatusNaoAplicavel(status) {
    return AgendaRules.courierStatusKey(status) === 'naoaplicavel';
  }

  function agendaCourierMeaningful(c) {
    c = c || {};
    return agendaMeaningfulValue(c.nome) || agendaMeaningfulValue(c.temperatura) ||
      agendaMeaningfulValue(c.destino) || agendaMeaningfulValue(c.awb) ||
      agendaMeaningfulValue(c.status) || agendaMeaningfulValue(c.material) ||
      agendaMeaningfulValue(c.matBioJson);
  }

  function agendaMeaningfulValue(v) {
    var n = normAgenda(v);
    return !!n && n !== 'nao aplicavel' && n !== 'nao se aplica' && n !== 'n/a' && n !== 'na' && n !== '-' && n !== '---' && n !== 'nenhum';
  }

  function agendaKitLabel(v) {
    if (!agendaMeaningfulValue(v)) return '';
    var n = normAgenda(v);
    if (n === 'sim' || n === 'ok' || n === 'recebido') return 'Kit lab';
    if (n === 'nao') return '';
    return v;
  }

  function agendaLineItem(icon, v) {
    return v ? '<span><span class="material-symbols-outlined" style="font-size:13px;vertical-align:-2px">' + icon + '</span> ' + esc(v) + '</span>' : '';
  }

  function agendaBirthAgeHtml(nascimento, idade, extraClass) {
    if (!nascimento && !idade) return '';
    var idadeTxt = idade ? esc(idade) + ' anos' : '';
    return '<span class="ag-birth-age ' + esc(extraClass || '') + '">' +
      '<span class="material-symbols-outlined">cake</span>' +
      '<span class="ag-birth-age-text">' +
        '<span class="ag-birth-age-date">' + esc(nascimento || '-') + '</span>' +
        (idadeTxt ? '<span class="ag-birth-age-years">' + idadeTxt + '</span>' : '') +
      '</span>' +
    '</span>';
  }

  function agendaMetaText(icon, v) {
    return v ? '<span class="ag-meta-text"><span class="material-symbols-outlined">' + icon + '</span>' + esc(v) + '</span>' : '';
  }

  function agendaSep(a, b) {
    return a && b ? '<span class="sep">|</span>' : '';
  }

  function agendaTags(txt, icon) {
    return String(txt || '').split(/[\n;,]+/).map(function(p) { return p.trim(); }).filter(Boolean).map(function(p) {
      return '<span class="ag-proc-tag"><span class="material-symbols-outlined">' + icon + '</span>' + esc(p) + '</span>';
    }).join('');
  }

  function agendaIsoFromBr(s) {
    var txt = String(s || '').trim().toLowerCase();
    var m = txt.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if (m) return m[3] + '-' + ('0' + m[2]).slice(-2) + '-' + ('0' + m[1]).slice(-2);
    m = txt.match(/^(\d{1,2})\/([a-zç.]{3,5})\/(\d{4})$/i);
    if (!m) return '';
    var meses = { 'jan':1,'jan.':1,'fev':2,'fev.':2,'mar':3,'mar.':3,'abr':4,'abr.':4,'mai':5,'mai.':5,'jun':6,'jun.':6,'jul':7,'jul.':7,'ago':8,'ago.':8,'set':9,'set.':9,'out':10,'out.':10,'nov':11,'nov.':11,'dez':12,'dez.':12 };
    var mes = meses[m[2]];
    return mes ? m[3] + '-' + ('0' + mes).slice(-2) + '-' + ('0' + m[1]).slice(-2) : '';
  }

  function agendaDateFromIso(iso) {
    if (!iso) return null;
    var d = new Date(iso + 'T00:00:00');
    return isNaN(d.getTime()) ? null : d;
  }

  function agendaIso(d) {
    return d.getFullYear() + '-' + ('0' + (d.getMonth() + 1)).slice(-2) + '-' + ('0' + d.getDate()).slice(-2);
  }

  function agendaFmtShort(d) {
    var meses = ['jan.','fev.','mar.','abr.','mai.','jun.','jul.','ago.','set.','out.','nov.','dez.'];
    return ('0' + d.getDate()).slice(-2) + '/' + meses[d.getMonth()] + '/' + d.getFullYear();
  }

  function agendaWeekday(d) {
    return ['Dom','Seg','Ter','Qua','Qui','Sex','Sab'][d.getDay()];
  }

  function agendaDayLabel(d) {
    var meses = ['janeiro','fevereiro','marco','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
    return agendaWeekday(d) + ', ' + d.getDate() + ' de ' + meses[d.getMonth()] + ' de ' + d.getFullYear();
  }

  function agendaDayShortLabel(d) {
    var meses = ['jan.','fev.','mar.','abr.','mai.','jun.','jul.','ago.','set.','out.','nov.','dez.'];
    return d.getDate() + ' ' + meses[d.getMonth()];
  }

  function onAgendaAwbInput(event) {
    var id = event && event.target && event.target.id;
    var match = String(id || '').match(/^(agC[123])Awb$/);
    if (!match) return;
    applyAgendaAwbRule(match[1], true);
  }

  function onAgendaTransporteOpcionalInput(event) {
    var id = event && event.target && event.target.id;
    if (!/^(agC2|agC3|agBackup)(Nome|Destino|Temp|Status|Awb)$/.test(String(id || ''))) return;
    atualizarAgendaTransportesOpcionais();
  }

  function onAgendaRequiredInput(event) {
    var panel = document.getElementById('agendaCreatePanel');
    if (!panel || !panel.classList.contains('open')) return;
    if (!event || !event.target || !event.target.closest || !event.target.closest('#agendaCreatePanel')) return;
    if (!/^ag(Data|DataFim|Hora|Tipo|Projeto|Monitor1|SalaMonitoria|LabCentral)$/.test(String(event.target.id || ''))) return;
    updateAgendaSaveAvailability(false);
  }

  document.addEventListener('input', onAgendaAwbInput);
  document.addEventListener('change', onAgendaAwbInput);
  document.addEventListener('input', onAgendaTransporteOpcionalInput);
  document.addEventListener('change', onAgendaTransporteOpcionalInput);
  document.addEventListener('input', onAgendaRequiredInput);
  document.addEventListener('change', onAgendaRequiredInput);

  document.addEventListener('DOMContentLoaded', function() {
    setTimeout(function() {
      if (!window.APP_BOOTSTRAP_STARTED) initAgendaV1();
    }, 0);
  });
</script>
