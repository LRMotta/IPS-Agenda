function codexNormText(v) {
  return String(v == null ? '' : v)
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .trim();
}

function sortCadastroByField(lista, campoNome, fallbackCampo) {
  return (lista || []).slice().sort(function(a, b) {
    var nomeA = String((a && (a[campoNome] || (fallbackCampo && a[fallbackCampo]))) || '');
    var nomeB = String((b && (b[campoNome] || (fallbackCampo && b[fallbackCampo]))) || '');
    return nomeA.localeCompare(nomeB, 'pt-BR', { sensitivity: 'base' });
  });
}

function cadastroBootstrapCacheValid(entry) {
  return !!(entry && entry.data && (Date.now() - Number(entry.loadedAt || 0)) < CADASTROS_BOOTSTRAP_CACHE_TTL_MS);
}

function invalidateCadastroBootstrapCache(page) {
  if (page) {
    delete CADASTROS_BOOTSTRAP_CACHE[page];
    delete CADASTROS_BOOTSTRAP_IN_FLIGHT[page];
    return;
  }
  CADASTROS_BOOTSTRAP_CACHE = {};
  CADASTROS_BOOTSTRAP_IN_FLIGHT = {};
}

function getCadastrosBootstrapCached(page, onSuccess, onFailure, force) {
  var cached = CADASTROS_BOOTSTRAP_CACHE[page];
  if (!force && cadastroBootstrapCacheValid(cached)) {
    onSuccess(cached.data);
    return;
  }
  if (!force && CADASTROS_BOOTSTRAP_IN_FLIGHT[page]) {
    CADASTROS_BOOTSTRAP_IN_FLIGHT[page].push({ ok: onSuccess, fail: onFailure });
    return;
  }
  CADASTROS_BOOTSTRAP_IN_FLIGHT[page] = [{ ok: onSuccess, fail: onFailure }];
  appServerRun({
    method: 'getCadastrosBootstrapData',
    args: [page],
    onSuccess: function(res) {
      CADASTROS_BOOTSTRAP_CACHE[page] = { data: res, loadedAt: Date.now() };
      var waiters = CADASTROS_BOOTSTRAP_IN_FLIGHT[page] || [];
      delete CADASTROS_BOOTSTRAP_IN_FLIGHT[page];
      waiters.forEach(function(w) { if (w.ok) w.ok(res); });
    },
    onFailure: function(e) {
      var waiters = CADASTROS_BOOTSTRAP_IN_FLIGHT[page] || [];
      delete CADASTROS_BOOTSTRAP_IN_FLIGHT[page];
      waiters.forEach(function(w) { if (w.fail) w.fail(e); });
    }
  });
}

function appHasUnsavedChanges() {
  return Object.keys(APP_UNSAVED_SCOPES).some(function(k) { return !!APP_UNSAVED_SCOPES[k]; });
}

function appMarkUnsavedChanges(scopeId) {
  scopeId = scopeId || 'app';
  APP_UNSAVED_SCOPES[scopeId] = true;
}

function appClearUnsavedChanges(scopeId) {
  if (scopeId) delete APP_UNSAVED_SCOPES[scopeId];
  else APP_UNSAVED_SCOPES = {};
}

function appOpenUnsavedConfirm(onConfirm, onCancel) {
  var modal = document.getElementById('confirmUnsaved');
  var btn = document.getElementById('btnConfirmUnsaved');
  if (!modal || !btn) {
    snackErro('Existem alteracoes nao salvas. Salve ou descarte as alteracoes antes de sair.');
    if (typeof onCancel === 'function') onCancel();
    return;
  }
  APP_UNSAVED_ON_CANCEL = typeof onCancel === 'function' ? onCancel : null;
  btn.onclick = function() {
    APP_UNSAVED_ON_CANCEL = null;
    modal.classList.remove('open');
    if (typeof onConfirm === 'function') onConfirm();
  };
  modal.classList.add('open');
}

function fecharConfirmUnsaved() {
  var modal = document.getElementById('confirmUnsaved');
  if (modal) modal.classList.remove('open');
  var onCancel = APP_UNSAVED_ON_CANCEL;
  APP_UNSAVED_ON_CANCEL = null;
  if (typeof onCancel === 'function') onCancel();
}

function appConfirmNavigationIfDirty(scopeId, onConfirm, onCancel) {
  var dirty = scopeId ? !!APP_UNSAVED_SCOPES[scopeId] : appHasUnsavedChanges();
  if (!dirty) return true;
  appOpenUnsavedConfirm(onConfirm, onCancel);
  return false;
}

function appEditableDirtyScope(target) {
  if (!target || !target.closest) return '';
  if (!target.matches('input, textarea, select, [contenteditable="true"]')) return '';
  var scope = target.closest('#agendaCreatePanel, #page-requisicao, #modalReqPreload');
  return scope ? scope.id : '';
}

document.addEventListener('input', function(event) {
  var scopeId = appEditableDirtyScope(event.target);
  if (scopeId) appMarkUnsavedChanges(scopeId);
}, true);

document.addEventListener('change', function(event) {
  var scopeId = appEditableDirtyScope(event.target);
  if (scopeId) appMarkUnsavedChanges(scopeId);
}, true);

document.addEventListener('paste', function(event) {
  var scopeId = appEditableDirtyScope(event.target);
  if (!scopeId) return;
  appMarkUnsavedChanges(scopeId);
  event.stopPropagation();
}, true);

window.addEventListener('beforeunload', function(event) {
  if (!appHasUnsavedChanges()) return;
  event.preventDefault();
  event.returnValue = '';
});

function isEmbeddedModuleEnabled(moduleName) {
  var resolver = APP_ROUTE.embeddedModules && APP_ROUTE.embeddedModules[moduleName];

function applyAppBootstrapData(data) {
  window.APP_BOOTSTRAP_DATA = data || {};

    ? String(window.APP_BOOTSTRAP_DATA.appVersion.version)

function renderAppVersion(appVersion) {
  var el = document.getElementById('appVersionChip');
  if (!el) return;
  appVersion = appVersion || {};
  var version = appVersion.version || 'sem versao';
  el.textContent = 'v ' + version;
  el.title = [
    'Versao: ' + version,
    'Build: ' + (appVersion.label || ''),
    'Data: ' + (appVersion.buildDate || ''),
    'Execute as esperado: ' + (appVersion.expectedExecuteAs || '')
  ].filter(Boolean).join('\n');
}

function startAppVersionWatcher() {
  APP_VERSION_RUNTIME_IS_EXEC = appIsPublishedExecRuntime();
  if (!APP_LOADED_VERSION || APP_VERSION_CHECK_TIMER || !APP_VERSION_RUNTIME_IS_EXEC) return;
  APP_VERSION_CHECK_TIMER = setInterval(checkAppRuntimeVersion, APP_VERSION_CHECK_INTERVAL_MS);
  setTimeout(checkAppRuntimeVersion, APP_VERSION_CHECK_INTERVAL_MS);
}

function appIsPublishedExecRuntime() {
  var urls = [];
  try { urls.push(String(window.top && window.top.location && window.top.location.href || '')); } catch (eTop) {}
  try { urls.push(String(window.location && window.location.href || '')); } catch (eWin) {}
  try { urls.push(String(document.referrer || '')); } catch (eRef) {}
  return urls.some(function(url) {
    return /\/exec(?:[?#]|$)/i.test(url);
  });
}

function checkAppRuntimeVersion() {
  if (!APP_LOADED_VERSION || !APP_VERSION_RUNTIME_IS_EXEC || APP_VERSION_NOTICE_VISIBLE || APP_VERSION_CHECK_IN_FLIGHT) return;
  if (typeof google === 'undefined' || !google.script || !google.script.run) return;
  APP_VERSION_CHECK_IN_FLIGHT = true;
  google.script.run
    .withSuccessHandler(function(info) {
      APP_VERSION_CHECK_IN_FLIGHT = false;
      var current = info && info.appVersion && info.appVersion.version ? String(info.appVersion.version) : '';
      if (current && current !== APP_LOADED_VERSION) showAppVersionNotice(info.appVersion);
    })
    .withFailureHandler(function() {
      APP_VERSION_CHECK_IN_FLIGHT = false;
    })
    .getAppRuntimeInfo();
}

function showAppVersionNotice(appVersion) {
  if (APP_VERSION_NOTICE_VISIBLE) return;
  APP_VERSION_NOTICE_VISIBLE = true;
  var notice = document.getElementById('appVersionUpdateNotice');
  if (!notice) {
    notice = document.createElement('div');
    notice.id = 'appVersionUpdateNotice';
    notice.className = 'app-version-update-notice';
    notice.innerHTML =
      '<span class="material-symbols-outlined" aria-hidden="true">system_update_alt</span>' +
      '<span>Nova versão disponível. Atualize a página para continuar.</span>' +
      '<button type="button" onclick="appReloadWebAppAfterVersionNotice()">Atualizar</button>';
    document.body.appendChild(notice);
  }
  if (appVersion && appVersion.version) {
    notice.title = 'Versao atual: ' + APP_LOADED_VERSION + '\nNova versao: ' + appVersion.version;
  }
  notice.classList.add('show');
}

function appReloadWebAppAfterVersionNotice() {
  var target = '';
  try {
    var topHref = String(window.top && window.top.location && window.top.location.href || '');
    if (/\/exec(?:[?#]|$)/i.test(topHref)) target = topHref;
  } catch (eTopHref) {}
  if (!target) {
    var baseUrl = window.APP_BOOTSTRAP_DATA && window.APP_BOOTSTRAP_DATA.webAppUrl;
    if (baseUrl) target = String(baseUrl) + appCurrentWebAppReloadQuery();
  }
  if (target) {
    target = appAddReloadParam(target);
    try {
      window.top.location.href = target;
      return;
    } catch (eTopSet) {
      window.open(target, '_top');
      return;
    }
  }
  try { window.top.location.reload(); }
  catch (eReload) { window.location.reload(); }
}

function appCurrentWebAppReloadQuery() {
  var pagina = getCurrentPage() || String(window.INDEX_INITIAL_PAGE || 'agenda');
  if (isEmbeddedModuleEnabled('dashboard') || pagina === 'dashboard') return '?page=dashboard';
  if (isEmbeddedModuleEnabled('estoque')) {
    var estoquePagina = getEstoqueRoutePage(pagina === 'estoque-view' ? 'visualizacao' : 'itens');
    if (estoquePagina === 'visualizacao') return '?page=estoque-view';
    return '?page=estoque&pagina=' + encodeURIComponent(estoquePagina || 'itens');
  }
  if (pagina === 'agenda' || !pagina) return '';
  return '?pagina=' + encodeURIComponent(pagina);
}

function appAddReloadParam(url) {
  url = String(url || '');
  if (!url) return url;
  var hash = '';
  var hashIdx = url.indexOf('#');
  if (hashIdx >= 0) {
    hash = url.slice(hashIdx);
    url = url.slice(0, hashIdx);
  }
  var sep = url.indexOf('?') >= 0 ? '&' : '?';
  return url + sep + '_reload=' + Date.now() + hash;
}

function handleUserOAuthStatus(auth) {
  if (!auth || !auth.required || !auth.url) return;
  var userEl = document.getElementById('userEmail');
  if (userEl) {
    userEl.innerHTML = '<a href="' + esc(auth.url) + '" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;font-weight:800">Autorizar Agenda/Drive</a>';
  }
  snack('Autorize Agenda e Drive para usar os recursos vinculados à sua conta.');
}

function handleAppBootstrapFailure(error) {
  var msg = (error && (error.message || error.toString && error.toString())) || 'Falha ao iniciar o app.';
  var userEl = document.getElementById('userEmail');
  var initialEl = document.getElementById('userInitial');
  var urlMatch = String(msg || '').match(/https:\/\/[^\s"']+/);
  if (userEl && urlMatch) {
    userEl.innerHTML = '<a href="' + esc(urlMatch[0]) + '" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;font-weight:800">Autorizar acesso</a>';
  } else if (userEl) {
    userEl.textContent = 'falha no login';
  }
  if (initialEl) initialEl.textContent = '!';
  snack(msg);
}

function startCodexAppOnce() {
  if (window.APP_BOOTSTRAP_STARTED) return;
  window.APP_BOOTSTRAP_STARTED = true;
  var d = new Date();
  var dias  = ['dom','seg','ter','qua','qui','sex','sáb'];
  var meses = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  document.getElementById('topDate').textContent =
    dias[d.getDay()] + ', ' + d.getDate() + ' ' + meses[d.getMonth()] + ' ' + d.getFullYear();
  google.script.run
    .withSuccessHandler(function(data) {
      applyAppBootstrapData(data);
      abrirPaginaInicialApp();
    })
    .withFailureHandler(function(error) {
      handleAppBootstrapFailure(error);
      abrirPaginaInicialApp();
    })
    .getAppBootstrapData();
}

document.addEventListener('DOMContentLoaded', startCodexAppOnce);

function abrirPaginaInicialApp() {
  if (APP_USER_NAVIGATED && getCurrentPage()) return;
  var pagina = String(window.INDEX_INITIAL_PAGE || 'agenda');
  if (isEmbeddedModuleEnabled('dashboard')) {
    irPara('dashboard', { initial: true });
    return;
  }
  if (isEmbeddedModuleEnabled('estoque') && typeof irParaEstoqueApp === 'function') {
    if (APP_ROUTE.estoquePages.indexOf(pagina) === -1) pagina = 'itens';
    if (pagina === 'visualizacao' && typeof carregarEstoqueView === 'function') {
      irPara('estoque-view', { initial: true });
      var buscaInicial = document.getElementById('evSearch');
      if (buscaInicial) buscaInicial.value = String(window.INDEX_INITIAL_SEARCH || '');
    } else irParaEstoqueApp(pagina || 'itens');
    return;
  }
  if (pagina === 'dashboard') {
    abrirModuloDashboard();
    return;
  }
  irPara(pagina || 'agenda', { initial: true });
}

function navegarParaRotaWebApp(query) {
  function navegar(baseUrl) {
    var destino = String(baseUrl || '') + String(query || '');
    if (destino) window.top.location.href = destino;
  }
  var bootstrapUrl = window.APP_BOOTSTRAP_DATA && window.APP_BOOTSTRAP_DATA.webAppUrl;
  if (bootstrapUrl) {
    navegar(bootstrapUrl);
    return;
  }
  google.script.run
    .withSuccessHandler(navegar)
    .withFailureHandler(function(e) { snackErro(e); })
    .getWebAppUrl();
}

function abrirModuloEstoque(pagina, busca) {
  pagina = pagina || 'itens';
  if (isEmbeddedModuleEnabled('estoque')) {
    if (pagina === 'visualizacao') irPara('estoque-view');
    else if (typeof irParaEstoqueApp === 'function') irParaEstoqueApp(pagina);
    return;
  }
  var query = '?page=estoque&pagina=' + encodeURIComponent(pagina);
  if (busca) query += '&busca=' + encodeURIComponent(busca);
  navegarParaRotaWebApp(query);
}

function abrirModuloDashboard() {
  if (isEmbeddedModuleEnabled('dashboard')) {
    irPara('dashboard');
    return;
  }
  navegarParaRotaWebApp('?page=dashboard');
}

function abrirModuloPrincipal(pagina) {
  pagina = pagina || 'agenda';
  var queryExtra = arguments.length > 1 ? String(arguments[1] || '') : '';
  var query = pagina === 'agenda' ? '' : '?pagina=' + encodeURIComponent(pagina);
  if (queryExtra) query += (query ? '&' : '?') + queryExtra.replace(/^\?+|^&+/, '');
  navegarParaRotaWebApp(query);
}

var DASHBOARD_PENDING_FILTER = String(window.INDEX_DASHBOARD_FILTER || '');
var DASHBOARD_PENDING_KEYS = String(window.INDEX_DASHBOARD_FILTER_KEYS || '');

function dashboardFilterKeysMap_() {
  var map = {};
  String(DASHBOARD_PENDING_KEYS || '').split('|').forEach(function(key) {
    key = normSelectValue(key || '');
    if (key) map[key] = true;
  });
  return map;
}

function dashboardProjetoAtivo_(p) {
  var st = normSelectValue(p && p.status);
  return st.indexOf('concluido') === -1 && st.indexOf('cancelado') === -1;
}

function applyDashboardPendingFilter_(pagina) {
  var filtro = String(DASHBOARD_PENDING_FILTER || '');
  if (!filtro) return;
  if (pagina === 'participantes') {
    if (filtro !== 'participantes' && filtro !== 'participantesAtivos') return;
    DASHBOARD_PENDING_FILTER = '';
    DASHBOARD_PENDING_KEYS = '';
    var searchPart = document.getElementById('searchParticipantes');
    var statusPart = document.getElementById('filterStatusPar');
    if (searchPart) searchPart.value = '';
    if (statusPart) statusPart.value = '';
    if (filtro === 'participantes') {
      filtrarParticipantes();
      return;
    }
    renderTabelaPart((_participantes || []).filter(function(p) {
      var st = normSelectValue(p && p.status);
      return st === 'ativo' || st === 'em seguimento';
    }));
    return;
  }
  if (pagina === 'projetos') {
    if (filtro !== 'projetosAtivos' && filtro !== 'recrutZero') return;
    DASHBOARD_PENDING_FILTER = '';
    var keys = dashboardFilterKeysMap_();
    DASHBOARD_PENDING_KEYS = '';
    var searchProj = document.getElementById('searchProjetos');
    if (searchProj) searchProj.value = '';
    if (filtro === 'projetosAtivos') {
      renderTabelaProj((_projetos || []).filter(dashboardProjetoAtivo_));
      return;
    }
    renderTabelaProj((_projetos || []).filter(function(p) {
      return !!(keys[normSelectValue(p && p.nomeAbreviado)] || keys[normSelectValue(p && p.codigo)]);
    }));
  }
}

    medicos: { label: 'Novo médico', action: function() { abrirFormMedico(null); } },
    projetos: { label: 'Novo projeto', action: function() { abrirFormProjeto(null); } },
    monitores: { label: 'Novo monitor', action: function() { abrirFormMonitor(null); } },
    prestadores: { label: 'Novo prestador', action: function() { abrirFormPrestador(null); } },

function updateFloatingAddButton() {

  var canWrite = CURRENT_ACCESS && CURRENT_ACCESS.ok && CURRENT_ACCESS.canWrite;

  var estoqueReady = getCurrentPage() !== 'estoque-app' || !!(STATE.estoque && STATE.estoque.inlineDados);
  var show = !!cfg && canWrite && (!cfg.adminOnly || isAdmin) && estoqueReady;
  btn.classList.toggle('show', show);

    btn.title = cfg.label;
    btn.setAttribute('aria-label', cfg.label);

function handleFloatingAdd() {
  var cfg = getFloatingAddConfig();
  if (!cfg) return;
  if (!(CURRENT_ACCESS && CURRENT_ACCESS.canWrite)) {
    snack('Seu perfil não permite criar registros.');
    updateFloatingAddButton();

  }
  if (cfg.adminOnly && CURRENT_ACCESS.role !== 'admin') {
    snack('Ação disponível apenas para administradores.');
    updateFloatingAddButton();
    return;
  }
  cfg.action();
}

function irPara(pagina, options) {
  options = options || {};
  if (!options.initial) APP_USER_NAVIGATED = true;
  if (!appConfirmNavigationIfDirty(null, function() {
    appClearUnsavedChanges();
    irPara(pagina);
  })) return;
  if (!isEmbeddedModuleEnabled('dashboard') && pagina === 'dashboard') {
    abrirModuloDashboard();
    return;
  }
  if (!isEmbeddedModuleEnabled('estoque') && pagina === 'estoque-view') {
    abrirModuloEstoque('visualizacao');
    return;
  }
  if (isEmbeddedModuleEnabled('dashboard') && pagina !== 'dashboard') {
    abrirModuloPrincipal(pagina);
    return;
  }
  if (isEmbeddedModuleEnabled('estoque') && pagina !== 'estoque-view') {
    abrirModuloPrincipal(pagina);
    return;
  }
  closeMobileNav();
  pagina = setCurrentPage(pagina);
  document.querySelectorAll('.nav-item').forEach(function(el) { el.classList.remove('active'); });
  document.querySelectorAll('.nav-group-toggle').forEach(function(el) { el.classList.remove('open'); });
  document.querySelectorAll('.nav-group-body').forEach(function(el) { el.classList.remove('open'); });
  document.querySelectorAll('.nav-item').forEach(function(el) {
    var oc = el.getAttribute('onclick') || '';
    if (oc.indexOf("'" + pagina + "'") !== -1) el.classList.add('active');
  });
  var cadastros = ['participantes', 'medicos', 'projetos', 'monitores', 'prestadores', 'labcentral', 'couriers', 'solicitantes', 'equipamentos', 'medicamentos'];
  if (cadastros.indexOf(pagina) !== -1) {
    document.getElementById('navCadastrosToggle').classList.add('open');
    document.getElementById('navCadastrosBody').classList.add('open');
  }
  if (pagina === 'estoque-view') {
    document.getElementById('navEstoqueToggle').classList.add('open');
    document.getElementById('navEstoqueBody').classList.add('open');
    var navEstVisualizacao = document.getElementById('navEstVisualizacao');
    if (navEstVisualizacao) navEstVisualizacao.classList.add('active');
  }
  if (pagina === 'dashboard') {
    var navDashboard = document.getElementById('navDashboard');
    if (navDashboard) navDashboard.classList.add('active');
  }
  document.querySelectorAll('.page').forEach(function(el) { el.classList.remove('active'); });
  var pg = document.getElementById('page-' + pagina);
  if (pg) pg.classList.add('active');
  resetAppScrollPosition();
  var t = getRoutePageConfig(pagina);
  document.getElementById('topTitle').textContent = t.label;
  document.getElementById('topIcon').textContent  = t.icon;
  if (pagina === 'participantes') carregarParticipantes();
  if (pagina === 'medicos') carregarMedicos();
  if (pagina === 'solicitantes') carregarSolicitantes();
  if (pagina === 'projetos') carregarProjetos();
  if (pagina === 'monitores') carregarMonitores();
  if (pagina === 'prestadores') carregarPrestadores();
  if (pagina === 'labcentral') carregarLabCentral();
  if (pagina === 'couriers') carregarCouriers();
  if (pagina === 'equipamentos') carregarEquipamentos();
  if (pagina === 'medicamentos') carregarMedicamentos();
  if (pagina === 'configuracoes') carregarConfigApp();
  if (pagina === 'pendencias') carregarPendencias(false);
  if (pagina === 'usuarios') carregarUsersAdmin();
  if (pagina === 'audit-log') carregarAuditLog();
  if (pagina === 'diagnostico') carregarDiagnosticoImplantacao(false);
  if (pagina === 'dashboard') {
    if (typeof carregarDashboard === 'function') {
      carregarDashboard(false);
    } else {
      setTimeout(function() {
        if (typeof carregarDashboard === 'function') carregarDashboard(false);
      }, 0);
    }
  }
  if (pagina === 'requisicao') {
    _rqAgendaOrigemId = '';
    _rqOrigemContext = null;
    initRequisicao();
  }
  if (pagina === 'estoque-view') carregarEstoqueView();
  if (pagina === 'agenda') initAgendaV1();
  updateFloatingAddButton();
}

function prepararJanelaTransporte(args) {
  var w = null;
  try {
    w = window.open('', '_blank');
    if (w) {
      w.document.open();
      w.document.write(transporteLoadingHtml(args));
      w.document.close();
    }
  } catch (e) {
    w = null;
  }
  return w;
}

function atualizarJanelaTransporteErro(w, message) {
  if (!w || w.closed) return;
  try {
    w.document.open();
    w.document.write(transporteErrorHtml(message));
    w.document.close();
  } catch (e) {}
}

function transporteModuloQuery(args) {
  args = args || {};
  var query = '?page=transporte';
  if (args.agendaId) query += '&agendaId=' + encodeURIComponent(args.agendaId);
  if (args.slot) query += '&slot=' + encodeURIComponent(args.slot);
  return query;
}

function abrirTransporteModulo(targetWindow, args) {
  if (!appConfirmNavigationIfDirty(null, function() {
    appClearUnsavedChanges();
    abrirTransporteModulo(targetWindow, args);
  }, function() {
    atualizarJanelaTransporteErro(targetWindow, 'Abertura do modulo de Transporte cancelada.');
  })) {
    return;
  }
  var query = transporteModuloQuery(args);
  var bootstrapUrl = window.APP_BOOTSTRAP_DATA && window.APP_BOOTSTRAP_DATA.webAppUrl;
  if (bootstrapUrl) {
    var url = String(bootstrapUrl) + query;
    if (targetWindow && !targetWindow.closed) targetWindow.location.href = url;
    else window.open(url, '_blank');
    return;
  }
  google.script.run
    .withSuccessHandler(function(url) {
      var targetUrl = String(url || '') + query;
      if (targetWindow && !targetWindow.closed) targetWindow.location.href = targetUrl;
      else window.open(targetUrl, '_blank');
    })
    .withFailureHandler(function(e) {
      var msg = e && e.message ? e.message : String(e);
      atualizarJanelaTransporteErro(targetWindow, msg);
      snackErro(msg);
    })
    .getWebAppUrl();
}

function carregarDiagnosticoImplantacao(force) {
  if (!force && APP_DEPLOYMENT_DIAGNOSTICS) {
    renderDiagnosticoImplantacao(APP_DEPLOYMENT_DIAGNOSTICS);
    return;
  }
  var env = document.getElementById('diagEnvironment');
  var ident = document.getElementById('diagIdentity');
  if (env) env.innerHTML = '<dt>Status</dt><dd>Carregando diagnostico...</dd>';
  if (ident) ident.innerHTML = '';
  google.script.run
    .withSuccessHandler(function(data) {
      APP_DEPLOYMENT_DIAGNOSTICS = data || {};
      renderDiagnosticoImplantacao(APP_DEPLOYMENT_DIAGNOSTICS);
      if (force) snack('Diagnostico atualizado.');
    })
    .withFailureHandler(function(e) {
      var msg = e && e.message ? e.message : String(e || 'Falha ao carregar diagnostico.');
      if (env) env.innerHTML = '<dt>Erro</dt><dd>' + esc(msg) + '</dd>';
      if (ident) ident.innerHTML = '';
      snackErro(msg);
    })
    .getCodexDeploymentDiagnostics();
}

function diagSetText(id, value) {
  var el = document.getElementById(id);
  if (el) el.textContent = value == null || value === '' ? '--' : value;
}

function diagDl(rows) {
  return (rows || []).map(function(row) {
    return '<dt>' + esc(row[0]) + '</dt><dd>' + esc(row[1] == null || row[1] === '' ? '--' : row[1]) + '</dd>';
  }).join('');
}

function diagStatusIcon(ok, status) {
  var s = String(status || '').toLowerCase();
  if (ok === true || s === 'ok') return 'check_circle';
  if (s.indexOf('erro') > -1 || s.indexOf('falha') > -1 || s.indexOf('ausente') > -1 || ok === false) return 'error';
  return 'warning';
}

function diagCheckItem(label, detail, ok, status) {
  return '<div class="diag-check-item"><span class="material-symbols-outlined">' + diagStatusIcon(ok, status) + '</span><span><b>' + esc(label || '') + '</b>' + (detail ? '<br><small>' + esc(detail) + '</small>' : '') + '</span></div>';
}

function renderDiagnosticoImplantacao(data) {
  data = data || {};
  var version = data.appVersion || {};
  var access = data.access || {};
  var auth = data.auth || {};
  var identity = data.identity || {};
  var sheet = data.spreadsheet || {};
  var cache = data.cache || {};
  var transport = data.transport || {};
  var dataCounts = data.dataCounts || {};
  var triggers = data.triggers || {};
  var mail = data.mail || {};
  var permissions = data.permissions || {};
  diagSetText('diagVersion', version.version || '--');
  diagSetText('diagAccess', access.role || '--');
  diagSetText('diagAuth', auth.required ? 'Requer' : (auth.ok ? 'OK' : 'Falha'));
  diagSetText('diagSheet', sheet.ok ? 'OK' : 'Falha');
  diagSetText('diagCheckedAt', data.checkedAt ? 'Atualizado em ' + data.checkedAt : '');
  var env = document.getElementById('diagEnvironment');
  if (env) {
    env.innerHTML = diagDl([
      ['Versao', version.version || ''],
      ['Build', version.label || ''],
      ['Data do build', version.buildDate || ''],
      ['Execute as esperado', version.expectedExecuteAs || ''],
      ['URL do WebApp', data.webAppUrl || data.webAppUrlError || ''],
      ['Planilha', sheet.name || sheet.error || ''],
      ['ID da planilha', sheet.idSuffix ? '...' + sheet.idSuffix : ''],
      ['Fuso da planilha', sheet.timeZone || ''],
      ['Fuso do script', data.script && data.script.timeZone || ''],
      ['Abas encontradas', (sheet.sheets || []).join(', ')]
    ]);
  }
  var ident = document.getElementById('diagIdentity');
  if (ident) {
    ident.innerHTML = diagDl([
      ['Usuario autorizado', access.email || ''],
      ['Perfil', access.role || ''],
      ['OAuth status', auth.status || (auth.required ? 'REQUIRED' : '')],
      ['OAuth URL', auth.url || ''],
      ['Active user', identity.activeUserEmail || identity.activeUserError || ''],
      ['Effective user', identity.effectiveUserEmail || identity.effectiveUserError || ''],
      ['Userinfo status', identity.userinfoStatus || ''],
      ['Userinfo email', identity.userinfoEmail || identity.userinfoError || ''],
      ['Dica de deploy', identity.deploymentHint || '']
    ]);
  }
  var cacheEl = document.getElementById('diagCache');
  if (cacheEl) {
    var cacheRows = [
      ['Config_App em cache', cache.configRowsCachePresent ? 'Sim' : 'Nao'],
      ['Agenda bootstrap em cache hoje', cache.agendaBootstrapCachePresent ? 'Sim' : 'Nao'],
      ['Transporte options', cache.transporteOptionsCacheStatus || (cache.transporteOptionsCachePresent ? 'Disponivel' : 'Nao carregado nesta sessao')],
      ['Linhas Config_App', cache.configRowsApprox || '0']
    ];
    (cache.items || []).forEach(function(item) {
      var meta = item.metaStatus || item.statusLabel || (item.present ? 'Disponivel' : (item.optional ? 'Nao carregado nesta sessao' : 'Ausente'));
      var age = item.ageMinutes === '' ? '' : ('idade ' + item.ageMinutes + ' min');
      var exp = item.expiresInMinutes === '' ? '' : ('expira em ' + item.expiresInMinutes + ' min');
      var parts = [meta];
      if (item.present) {
        if (age) parts.push(age);
        if (exp) parts.push(exp);
      }
      cacheRows.push([item.label || item.key, parts.filter(Boolean).join(' | ')]);
    });
    cacheRows = cacheRows.concat([
      ['Ultima invalidacao', cache.lastConfigInvalidationAt || ''],
      ['Invalidado por', cache.lastConfigInvalidationBy || ''],
      ['Origem da invalidacao', cache.lastConfigInvalidationSource || ''],
      ['Erro de cache', cache.error || '']
    ]);
    cacheEl.innerHTML = diagDl(cacheRows);
  }
  var transportEl = document.getElementById('diagTransport');
  if (transportEl) {
    transportEl.innerHTML = diagDl([
      ['Status', transport.status || ''],
      ['Modo', transport.mode || ''],
      ['URL', transport.url || (transport.mode === 'acoplado' ? 'Nao necessaria' : '')],
      ['GET', transport.responseCode || ''],
      ['POST', transport.postCode || ''],
      ['Mensagem', transport.message || transport.error || '']
    ]);
  }
  var countsEl = document.getElementById('diagDataCounts');
  if (countsEl) {
    countsEl.innerHTML = diagDl((dataCounts.items || []).map(function(item) {
      return [item.label || item.sheetName || '', item.status + ' | ' + (item.rows || 0) + ' linha(s)' + (item.sheetName ? ' | ' + item.sheetName : '') + (item.error ? ' | ' + item.error : '')];
    }));
  }
  var triggerMailEl = document.getElementById('diagTriggersMail');
  if (triggerMailEl) {
    var triggerList = (triggers.triggers || []).map(function(t) {
      return [t.handler, t.eventType || t.source].filter(Boolean).join(' | ');
    }).join('; ');
    triggerMailEl.innerHTML = diagDl([
      ['Monitor confirmacao courier', triggers.monitorConfirmacaoCouriersAtivo ? 'Ativo' : 'Nao encontrado'],
      ['Monitor entregas DHL', triggers.monitorEntregasDhlAtivo ? 'Ativo' : 'Nao encontrado'],
      ['Triggers instalados', triggerList || triggers.error || 'Nenhum'],
      ['Cota MailApp restante', mail.remainingDailyQuota === '' ? (mail.error || '') : mail.remainingDailyQuota],
      ['MailApp', mail.status || '']
    ]);
  }
  var permissionsEl = document.getElementById('diagPermissions');
  if (permissionsEl) {
    permissionsEl.innerHTML = diagDl([
      ['Drive', (permissions.drive && permissions.drive.status) || ''],
      ['Drive detalhe', (permissions.drive && permissions.drive.error) || ''],
      ['Calendar', (permissions.calendar && permissions.calendar.status) || ''],
      ['Calendar detalhe', (permissions.calendar && permissions.calendar.error) || '']
    ]);
  }
  var auditEl = document.getElementById('diagAuditRecent');
  if (auditEl) {
    var audit = data.auditRecent || {};
    auditEl.innerHTML = audit.error
      ? diagCheckItem('Auditoria recente', audit.error, false, 'Erro')
      : ((audit.items || []).length
        ? audit.items.map(function(item) {
            return diagCheckItem(item.action || 'Evento', [item.timestamp, item.email, item.module, item.recordId].filter(Boolean).join(' | '), false, 'Atencao');
          }).join('')
        : diagCheckItem('Sem erros/acessos negados recentes', 'Ultimas linhas de Audit_Log verificadas.', true, 'OK'));
  }
  renderSmokeChecklist(data.smoke || {});
}

function renderSmokeChecklist(smoke) {
  var el = document.getElementById('diagSmokeChecklist');
  if (!el) return;
  smoke = smoke || {};
  if (smoke.checks && smoke.checks.length) {
    el.innerHTML = smoke.checks.map(function(item) {
      return diagCheckItem(item.label, item.detail, item.ok, item.status);
    }).join('');
    return;
  }
  el.innerHTML = diagCheckItem('Checklist', 'Atualize o diagnostico para rodar os checks automaticos.', false, 'Atencao');
}

function carregarAuditLogPaginado() {
  var limitEl = document.getElementById('auditLimit');
  if (limitEl && limitEl.dataset.auditPagedInit !== '1') {
    limitEl.innerHTML =
      '<option value="100" selected>100 por pagina</option>' +
      '<option value="200">200 por pagina</option>' +
      '<option value="500">500 por pagina</option>';
    limitEl.value = '100';
    limitEl.dataset.auditPagedInit = '1';
  }
  AUDIT_PAGE_SIZE = limitEl ? Number(limitEl.value || 100) : 100;
  AUDIT_FILTER_SIGNATURE = auditFilterSignature();
  AUDIT_PAGE_OFFSET[AUDIT_VIEW] = 0;
  AUDIT_PAGE_CACHE[AUDIT_VIEW] = {};
  carregarAuditPage(AUDIT_VIEW, 0, false);
}

function auditFilterKeydown(ev) {
  if (ev && ev.key === 'Enter') {
    ev.preventDefault();
    carregarAuditLog();
  }
}

function auditFilters() {
  function val(id) {
    var el = document.getElementById(id);
    return el ? String(el.value || '').trim() : '';
  }
  return {
    user: val('auditFilterUser'),
    startDate: val('auditFilterStart'),
    endDate: val('auditFilterEnd'),
    action: val('auditFilterAction')
  };
}

function auditFilterSignature() {
  var f = auditFilters();
  return [f.user, f.startDate, f.endDate, f.action].join('|');
}

function limparFiltrosAudit() {
  ['auditFilterUser', 'auditFilterStart', 'auditFilterEnd', 'auditFilterAction'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.value = '';
  });
  carregarAuditLog();
}

function auditCacheKey(limit, offset) {
  return auditFilterSignature() + ':' + String(limit || AUDIT_PAGE_SIZE) + ':' + String(offset || 0);
}

function setAuditRows(type, rows) {
  if (type === 'changes') AUDIT_CHANGES_ROWS = rows || [];
  else AUDIT_LOG_ROWS = rows || [];
}

function auditRowsForView(type) {
  return type === 'changes' ? (AUDIT_CHANGES_ROWS || []) : (AUDIT_LOG_ROWS || []);
}

function carregarAuditPage(type, offset, fromCacheOnly) {
  type = type === 'changes' ? 'changes' : 'log';
  offset = Math.max(0, Number(offset || 0));
  var filters = auditFilters();
  var signature = auditFilterSignature();
  if (signature !== AUDIT_FILTER_SIGNATURE) {
    AUDIT_FILTER_SIGNATURE = signature;
    AUDIT_PAGE_OFFSET[type] = 0;
    AUDIT_PAGE_CACHE[type] = {};
    offset = 0;
  }
  var limit = AUDIT_PAGE_SIZE || 100;
  var key = auditCacheKey(limit, offset);
  var cached = AUDIT_PAGE_CACHE[type] && AUDIT_PAGE_CACHE[type][key];
  if (cached) {
    AUDIT_PAGE_OFFSET[type] = offset;
    AUDIT_PAGE_META[type] = cached.meta;
    setAuditRows(type, cached.rows);
    renderAuditLog();
    prefetchAuditNextPage(type);
    return;
  }
  if (fromCacheOnly) return;
  var tb = document.getElementById('bodyAuditLog');
  var colSpan = type === 'changes' ? 9 : 6;
  if (tb) {
    tb.innerHTML = appTableSkeletonRow(colSpan, {
      rows: 5,
      label: type === 'changes' ? 'Carregando alteracoes da auditoria...' : 'Carregando registros da auditoria...',
      columns: type === 'changes'
        ? ['1fr', '1.35fr', '1fr', '1.1fr', '.9fr', '1fr', '1.15fr', '1.15fr', '1fr']
        : ['1fr', '1.8fr', '1.55fr', '1.15fr', '1fr', '.9fr']
    });
  }
  google.script.run
    .withSuccessHandler(function(data) {
      data = data || {};
      var rows = data.rows || [];
      var meta = {
        total: Number(data.total || 0),
        limit: Number(data.limit || limit),
        offset: Number(data.offset || offset),
        hasMore: !!data.hasMore,
        userCount: Number(data.userCount || 0),
        moduleCount: Number(data.moduleCount || 0)
      };
      AUDIT_PAGE_CACHE[type][key] = { rows: rows, meta: meta };
      AUDIT_PAGE_OFFSET[type] = meta.offset;
      AUDIT_PAGE_META[type] = meta;
      setAuditRows(type, rows);
      renderAuditLog();
      prefetchAuditNextPage(type);
    })
    .withFailureHandler(function(e) {
      if (tb) tb.innerHTML = '<tr class="empty-row"><td colspan="' + colSpan + '">Erro: ' + esc(appErrorMessage(e)) + '</td></tr>';
    })
    .getAuditPage(type, limit, offset, filters);
}

function prefetchAuditNextPage(type) {
  type = type === 'changes' ? 'changes' : 'log';
  var meta = AUDIT_PAGE_META[type] || {};
  if (!meta.hasMore) return;
  var filters = auditFilters();
  var limit = meta.limit || AUDIT_PAGE_SIZE || 100;
  var rows = auditRowsForView(type);
  var nextOffset = (meta.offset || 0) + rows.length;
  var key = auditCacheKey(limit, nextOffset);
  var prefetchKey = type + ':' + key;
  if ((AUDIT_PAGE_CACHE[type] && AUDIT_PAGE_CACHE[type][key]) || AUDIT_PREFETCHING[prefetchKey]) return;
  AUDIT_PREFETCHING[prefetchKey] = true;
  google.script.run
    .withSuccessHandler(function(data) {
      data = data || {};
      AUDIT_PAGE_CACHE[type][key] = {
        rows: data.rows || [],
        meta: {
          total: Number(data.total || 0),
          limit: Number(data.limit || limit),
          offset: Number(data.offset || nextOffset),
          hasMore: !!data.hasMore,
          userCount: Number(data.userCount || 0),
          moduleCount: Number(data.moduleCount || 0)
        }
      };
      delete AUDIT_PREFETCHING[prefetchKey];
      renderAuditPager();
    })
    .withFailureHandler(function() {
      delete AUDIT_PREFETCHING[prefetchKey];
    })
    .getAuditPage(type, limit, nextOffset, filters);
}

function setAuditView(view) {
  AUDIT_VIEW = view === 'changes' ? 'changes' : 'log';
  carregarAuditPage(AUDIT_VIEW, AUDIT_PAGE_OFFSET[AUDIT_VIEW] || 0, false);
}

function auditNextPage() {
  var meta = AUDIT_PAGE_META[AUDIT_VIEW] || {};
  if (!meta.hasMore) return;
  carregarAuditPage(AUDIT_VIEW, (meta.offset || 0) + auditRowsForView(AUDIT_VIEW).length, false);
}

function auditPrevPage() {
  var meta = AUDIT_PAGE_META[AUDIT_VIEW] || {};
  var limit = meta.limit || AUDIT_PAGE_SIZE || 100;
  carregarAuditPage(AUDIT_VIEW, Math.max(0, (meta.offset || 0) - limit), false);
}

function renderAuditPager() {
  var meta = AUDIT_PAGE_META[AUDIT_VIEW] || {};
  var rows = auditRowsForView(AUDIT_VIEW);
  var total = Number(meta.total || rows.length || 0);
  var offset = Number(meta.offset || 0);
  var start = total && rows.length ? offset + 1 : 0;
  var end = total && rows.length ? Math.min(offset + rows.length, total) : 0;
  var el = document.getElementById('auditPager');
  if (!el) return;
  var nextOffset = offset + rows.length;
  var nextKey = auditCacheKey(meta.limit || AUDIT_PAGE_SIZE || 100, nextOffset);
  var nextCached = !!(meta.hasMore && AUDIT_PAGE_CACHE[AUDIT_VIEW] && AUDIT_PAGE_CACHE[AUDIT_VIEW][nextKey]);
  el.innerHTML =
    '<button type="button" class="audit-page-btn" onclick="auditPrevPage()" ' + (offset <= 0 ? 'disabled' : '') + '><span class="material-symbols-outlined">chevron_left</span></button>' +
    '<span class="audit-page-info">' + esc(start + '-' + end + ' de ' + total) + '</span>' +
    '<button type="button" class="audit-page-btn" onclick="auditNextPage()" ' + (!meta.hasMore ? 'disabled' : '') + '><span class="material-symbols-outlined">chevron_right</span></button>' +
    (meta.hasMore ? '<span class="audit-prefetch">' + (nextCached ? 'Proxima pronta' : 'Preparando proxima') + '</span>' : '');
}

function filtrarConfig(forceNow) {
  codexRunSearchFilter('searchConfig', 'config', function() {
    var q = ((document.getElementById('searchConfig') || {}).value || '').toLowerCase().trim();
    var bloco = ((document.getElementById('filterConfigBloco') || {}).value || '');
    var lista = _configApp.filter(function(i) {

      var okBusca = !q || [i.bloco, i.grupo, i.chave, i.valor, i.ativo, i.observacao].join(' ').toLowerCase().indexOf(q) >= 0;
      return okBloco && okBusca;
    });
    renderTabelaConfig(lista);

function bindTableRecordActions(container, records, actions) {
  if (!container) return;
  Array.prototype.forEach.call(container.querySelectorAll('[data-record-action][data-record-index]'), function(button) {
    button.addEventListener('click', function(event) {
      var index = Number(button.dataset.recordIndex);
      var action = actions[button.dataset.recordAction];
      if (!Number.isInteger(index) || !records[index] || typeof action !== 'function') return;
      action(records[index], event);
    });
  });
}

function renderTabelaConfig(lista) {
  var tb = document.getElementById('bodyConfig');
  if (!tb) return;
  if (!lista.length) {
    tb.innerHTML = '<tr class="empty-row"><td colspan="8">Nenhuma configuração encontrada.</td></tr>';
    return;
  }
  tb.innerHTML = lista.map(function(i, index) {
    return '<tr>'
      + '<td><span class="chip chip-blue">' + esc(i.bloco || '—') + '</span></td>'
      + '<td>' + esc(i.grupo || '—') + '</td>'

function configValoresUnicos(bloco, grupo) {
  var seen = {};
  return _configApp.filter(function(i) {
    return (!bloco || i.bloco === bloco) && (!grupo || i.grupo === grupo);
  }).map(function(i) {
    return grupo ? i.chave : i.grupo;
  }).filter(function(v) {
    v = String(v || '').trim();
    if (!v || seen[v]) return false;
    seen[v] = 1;
    return true;
  }).sort(function(a, b) { return a.localeCompare(b); });
}

function preencherSelectConfig(id, valores, selected, placeholder) {
  var el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = '<option value="">' + (placeholder || '— Selecione —') + '</option>' +
    (valores || []).map(function(v) {
      return '<option value="' + esc(v) + '">' + esc(v) + '</option>';
    }).join('');
  el.value = selected || '';
  if (selected && el.value !== selected) {
    var opt = document.createElement('option');
    opt.value = selected;
    opt.textContent = selected;
    el.appendChild(opt);
    el.value = selected;
  }
}

function fillSelectOptions(id, lista, selected, placeholder) {
    var el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = '<option value="">' + (placeholder || '— Selecione —') + '</option>';
    var selectedTxt = String(selected || '').trim();
    var selectedValue = selectedTxt;
    var hasSelected = !selectedTxt;
    (lista || []).forEach(function(v) {
      var val = typeof v === 'string' ? v : (v.nomeAbreviado || v.nome || v.codigo || '');
      val = String(val || '').trim();
      if (!val) return;
      if (selectedTxt && normSelectValue(val) === normSelectValue(selectedTxt)) {
        hasSelected = true;
        selectedValue = val;
      }
      var opt = document.createElement('option');
      opt.value = val;
      opt.textContent = typeof v === 'object' && v.codigo && v.codigo !== val ? val + ' — ' + v.codigo : val;
      el.appendChild(opt);
    });
    if (selectedTxt && !hasSelected) {
      var optSel = document.createElement('option');
      optSel.value = selectedTxt;
      optSel.textContent = selectedTxt;
      el.appendChild(optSel);
    }
  el.value = selectedValue;
  if (/^(eqProjeto|medProjeto|monProjeto[1-4])$/.test(id)) ativarAutocompleteProjeto(id);
  }

var _itemAutocompleteActive = { equipamento: -1, medicamento: -1 };
var _itemSuggestionIndex = { equipamento: null, medicamento: null };

function itemAutocompleteConfig(tipo) {
  return tipo === 'equipamento'
    ? { inputId: 'eqDescricao', listId: 'eqDescricaoList', projectId: 'eqProjeto', items: _equipamentos }
    : { inputId: 'medDescricao', listId: 'medDescricaoList', projectId: 'medProjeto', items: _medicamentos };
}

function resetItemSuggestionIndex(tipo) {
  if (tipo) _itemSuggestionIndex[tipo] = null;
  else _itemSuggestionIndex = { equipamento: null, medicamento: null };
}

function itemSuggestionIndex(tipo) {
  var cfg = itemAutocompleteConfig(tipo);
  var items = cfg.items || [];
  var current = _itemSuggestionIndex[tipo];
  if (current && current.source === items && current.length === items.length) return current;
  var idx = { source: items, length: items.length, all: [], byProject: {}, cache: {} };
  var vistos = {};
  items.forEach(function(item) {
    var descricao = String(item.descricao || '').trim();
    if (!descricao) return;
    var projetoKey = normSelectValue(item.projeto);
    var chave = normSelectValue(descricao) + '|' + projetoKey;
    if (vistos[chave]) return;
    vistos[chave] = true;
    var entry = { item: item, descricaoNorm: normSelectValue(descricao), projetoNorm: projetoKey };
    idx.all.push(entry);
    if (!idx.byProject[projetoKey]) idx.byProject[projetoKey] = [];
    idx.byProject[projetoKey].push(entry);
  });
  _itemSuggestionIndex[tipo] = idx;
  return idx;
}

function sugestoesItem(tipo) {
  var cfg = itemAutocompleteConfig(tipo);
  var input = document.getElementById(cfg.inputId);
  var project = document.getElementById(cfg.projectId);
  var query = normSelectValue(input ? input.value : '');
  var projetoSelecionado = normSelectValue(project ? project.value : '');
  var idx = itemSuggestionIndex(tipo);
  var cacheKey = projetoSelecionado + '|' + query;
  if (idx.cache[cacheKey]) return idx.cache[cacheKey];
  var base = projetoSelecionado ? (idx.byProject[projetoSelecionado] || []) : idx.all;
  var out = [];
  for (var i = 0; i < base.length && out.length < 10; i++) {
    if (!query || base[i].descricaoNorm.indexOf(query) >= 0) out.push(base[i].item);
  }
  idx.cache[cacheKey] = out;
  return out;
}

function mostrarSugestoesItem(tipo) {
  var cfg = itemAutocompleteConfig(tipo);
  var list = document.getElementById(cfg.listId);
  if (!list) return;
  var sugestoes = sugestoesItem(tipo);
  list.innerHTML = '';
  _itemAutocompleteActive[tipo] = -1;
  if (!sugestoes.length) {
    list.classList.remove('open');
    return;
  }
  sugestoes.forEach(function(item) {
    var option = document.createElement('div');
    option.className = 'ac-item';
    option._cadastroItem = item;
    var main = document.createElement('div');
    main.className = 'ac-item-main';
    main.textContent = item.descricao || '';
    var meta = document.createElement('div');
    meta.className = 'ac-item-meta';
    meta.textContent = item.projeto || 'Projeto não informado';
    option.appendChild(main);
    option.appendChild(meta);
    option.onmousedown = function(event) {
      event.preventDefault();
      aplicarSugestaoItem(tipo, item);
    };
    list.appendChild(option);
  });
  list.classList.add('open');
}

function navegarSugestoesItem(event, tipo) {
  var cfg = itemAutocompleteConfig(tipo);
  var list = document.getElementById(cfg.listId);
  if (!list || !list.classList.contains('open')) {
    if (event.key === 'ArrowDown') mostrarSugestoesItem(tipo);
    return;
  }
  var options = list.querySelectorAll('.ac-item');
  if (!options.length) return;
  var active = _itemAutocompleteActive[tipo];
  if (event.key === 'ArrowDown') active = Math.min(active + 1, options.length - 1);
  else if (event.key === 'ArrowUp') active = Math.max(active - 1, 0);
  else if (event.key === 'Enter' && active >= 0) {
    event.preventDefault();
    aplicarSugestaoItem(tipo, options[active]._cadastroItem);
    return;
  } else if (event.key === 'Escape') {
    list.classList.remove('open');
    return;
  } else return;
  event.preventDefault();
  _itemAutocompleteActive[tipo] = active;
  Array.prototype.forEach.call(options, function(option, index) {
    option.classList.toggle('active', index === active);
  });
  options[active].scrollIntoView({ block: 'nearest' });
}

function fecharSugestoesItemDepois(tipo) {
  setTimeout(function() {
    var list = document.getElementById(itemAutocompleteConfig(tipo).listId);
    if (list) list.classList.remove('open');
  }, 120);
}

function aplicarSugestaoItem(tipo, item) {
  item = item || {};
  var cfg = itemAutocompleteConfig(tipo);
  document.getElementById(cfg.inputId).value = item.descricao || '';
  if (tipo === 'equipamento') {
    fillSelectOptions('eqProjeto', _equipProjetos, item.projeto, '— Selecione —');

  } else {
    fillSelectOptions('medProjeto', _medProjetos, item.projeto, '— Selecione —');
    fillSelectOptions('medResponsavelReceb', _medSolicitantes, item.responsavelRecebimento, '— Selecione —');
    fillSelectOptions('medLocalizacao', ESTOQUE_CONFIG.localizacoes || [], item.localizacao, '— Selecione —');
    document.getElementById('medRegistroRm').value = item.registroRm || 'Não';
    document.getElementById('medRemetente').value = item.remetente || '';
  }
  limparErro(cfg.inputId, tipo === 'equipamento' ? 'errEqDescricao' : 'errMedDescricao');
  var list = document.getElementById(cfg.listId);
  if (list) list.classList.remove('open');
}

function dateFromISO(iso) {
  if (!iso) return null;
  var p = String(iso).split('-');
  if (p.length !== 3) return null;
  var d = new Date(Number(p[0]), Number(p[1]) - 1, Number(p[2]));
  return isNaN(d.getTime()) ? null : d;
}

function formatDateBr(dateString) {
  if (!dateString) return '';
  var meses = ['jan.', 'fev.', 'mar.', 'abr.', 'mai.', 'jun.', 'jul.', 'ago.', 'set.', 'out.', 'nov.', 'dez.'];
  var raw = String(dateString).trim();
  var m = raw.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (m) return ('0' + Number(m[3])).slice(-2) + '/' + meses[Number(m[2]) - 1] + '/' + m[1];
  m = raw.toLowerCase().match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) return ('0' + Number(m[1])).slice(-2) + '/' + meses[Number(m[2]) - 1] + '/' + m[3];
  m = raw.toLowerCase().match(/^(\d{1,2})\/([a-z.]{3,5})\/(\d{4})$/);
  if (m) {
    var mapa = { 'jan':1,'jan.':1,'fev':2,'fev.':2,'mar':3,'mar.':3,'abr':4,'abr.':4,'mai':5,'mai.':5,'jun':6,'jun.':6,'jul':7,'jul.':7,'ago':8,'ago.':8,'set':9,'set.':9,'out':10,'out.':10,'nov':11,'nov.':11,'dez':12,'dez.':12 };
    var mes = mapa[m[2]];
    return mes ? ('0' + Number(m[1])).slice(-2) + '/' + meses[mes - 1] + '/' + m[3] : raw;
  }
  var d = new Date(raw);
  return isNaN(d.getTime()) ? raw : ('0' + d.getDate()).slice(-2) + '/' + meses[d.getMonth()] + '/' + d.getFullYear();
}

function dateToInputValue(dateString) {
  if (!dateString) return '';
  var raw = String(dateString).trim();
  var m = raw.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (m) return m[1] + '-' + ('0' + Number(m[2])).slice(-2) + '-' + ('0' + Number(m[3])).slice(-2);
  m = raw.toLowerCase().match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) return m[3] + '-' + ('0' + Number(m[2])).slice(-2) + '-' + ('0' + Number(m[1])).slice(-2);
  m = raw.toLowerCase().match(/^(\d{1,2})\/([a-z.]{3,5})\/(\d{4})$/);
  if (m) {
    var mapa = { 'jan':1,'jan.':1,'fev':2,'fev.':2,'mar':3,'mar.':3,'abr':4,'abr.':4,'mai':5,'mai.':5,'jun':6,'jun.':6,'jul':7,'jul.':7,'ago':8,'ago.':8,'set':9,'set.':9,'out':10,'out.':10,'nov':11,'nov.':11,'dez':12,'dez.':12 };
    var mes = mapa[m[2]];
    return mes ? m[3] + '-' + ('0' + mes).slice(-2) + '-' + ('0' + Number(m[1])).slice(-2) : '';
  }
  return '';
}

function validadeMedicamentoChip(m) {
  if (!m.validade) return '<span style="color:#9aa3b0">—</span>';
  var d = dateFromISO(m.validadeISO);
  if (!d) return esc(m.validade);
  var hoje = new Date(); hoje.setHours(0,0,0,0);
  var dias = Math.ceil((d.getTime() - hoje.getTime()) / 86400000);
  var cls = dias < 0 ? 'chip-red' : dias <= 90 ? 'chip-yellow' : 'chip-green';
  return '<span class="chip ' + cls + '">' + esc(m.validade) + '</span>';
}

function aplicarParticipanteConfig(cfg) {
  cfg = cfg || {};

  fillSelectOptions('filterStatusPar', STATUS_PART, '', 'Todos os status');
  fillSelectOptions('ptStatus', STATUS_PART, '', '-- Selecione --');
}

function garantirParticipanteConfig(callback) {
  if (STATUS_PART && STATUS_PART.length) {
    if (typeof callback === 'function') callback();
    return;
  }
  if (typeof callback === 'function') _participanteConfigCallbacks.push(callback);
  if (_participanteConfigLoading) return;
  _participanteConfigLoading = true;
  appServerRun({
    method: 'getParticipanteFormConfig',
    onSuccess: function(cfg) {
      _participanteConfigLoading = false;
      aplicarParticipanteConfig(cfg || {});
      var callbacks = _participanteConfigCallbacks.splice(0);
      callbacks.forEach(function(fn) { if (typeof fn === 'function') fn(); });
    },
    onFailure: function(e) {
      _participanteConfigLoading = false;
      _participanteConfigCallbacks = [];
      snackErro((e && e.message) || 'Nao foi possivel carregar as opcoes do participante.');
    }
  });
}

function chipStatus(s) {
  if (!s || s === '—') return '<span style="color:#9aa3b0;">—</span>';
  var norm = normSelectValue(s);
  var m = {
    'pre-triagem':'chip-pretriagem','em triagem':'chip-emtriagem',
    'falha de triagem':'chip-falhatriagem','ativo':'chip-ativo',
    'em seguimento':'chip-emseguimento','concluido':'chip-concluido',
    'retirou consentimento':'chip-retirou','descontinuado':'chip-descontinuado',
    'perda de seguimento':'chip-perdaseguimento','obito':'chip-obito'
  };
  var cls = m[norm] || 'chip-status-dynamic ' + participanteStatusDynamicClass(s);
  return '<span class="chip ' + cls + '">' + esc(s) + '</span>';
}

function participanteStatusDynamicClass(status) {
  var statusNorm = normSelectValue(status);
  var configured = (STATUS_PART || []).map(normSelectValue).filter(Boolean);
  var idx = configured.indexOf(statusNorm);
  if (idx < 0) {
    var hash = 0;
    for (var i = 0; i < statusNorm.length; i++) hash = ((hash << 5) - hash + statusNorm.charCodeAt(i)) | 0;
    idx = Math.abs(hash);
  }
  return 'chip-status-auto-' + (idx % 8);
}

function normalizarProjetoParticipante(item) {
  if (typeof item === 'string') return { nome: item, codigo: '' };
  return { nome: String((item && item.nome) || '').trim(), codigo: String((item && item.codigo) || '').trim() };
}

function encontrarProjetoParticipante(valor) {
  var valorNorm = normSelectValue(valor || '');
  if (!valorNorm) return null;
  return (_projListPart || []).map(normalizarProjetoParticipante).find(function(projeto) {
    return normSelectValue(projeto.nome) === valorNorm;
  }) || null;
}

function participanteProjetoCadastrado(projeto) {
  return !normSelectValue(projeto || '') || !!encontrarProjetoParticipante(projeto);
}

  var input = document.getElementById('ptProjeto');
  var list = document.getElementById('ptProjetoList');
  if (!input || !list) return;
  var query = normSelectValue(input.value || '');
  var projetos = (_projListPart || []).map(normalizarProjetoParticipante).filter(function(projeto) {
    return projeto.nome && (!query || normSelectValue(projeto.nome).includes(query) || normSelectValue(projeto.codigo).includes(query));
  });
  _acPtProjetoIndex = -1;
  list.innerHTML = '';

    var empty = document.createElement('div');
    empty.className = 'ac-empty';
    empty.textContent = 'Nenhum projeto cadastrado encontrado.';
    list.appendChild(empty);
  } else {
    projetos.forEach(function(projeto, index) {
      var item = document.createElement('div');
      item.className = 'ac-item';
      item.dataset.index = String(index);
      item.setAttribute('role', 'option');

function appRequiredMissing(fields) {
  return (fields || []).filter(function(field) {
    var value = typeof field.value === 'function' ? field.value() : field.value;
    return !String(value == null ? '' : value).trim();
  }).map(function(field) { return field.label; });
}
function appRequiredFeedback(fields, opts) {
  opts = opts || {};
  var missing = [];
  var firstInput = null;
  (fields || []).forEach(function(field) {
    var input = typeof field.input === 'string' ? document.getElementById(field.input) : field.input;
    var error = typeof field.error === 'string' ? document.getElementById(field.error) : field.error;
    var value = typeof field.value === 'function' ? field.value() : field.value;
    var valid = !!String(value == null ? '' : value).trim();
    if (!valid) {
      if (input) input.classList.add('invalid');
      if (error) {
        error.classList.add('visible');
        error.classList.add('show');
      }
      if (!firstInput && input) firstInput = input;
      missing.push(field.label || 'Campo obrigatorio');
    } else {
      if (input) input.classList.remove('invalid');
      if (error) {
        error.classList.remove('visible');
        error.classList.remove('show');
      }
    }
  });
  if (!missing.length) return true;
  var msg = 'Atencao: preencha os campos obrigatorios: ' + missing.join(', ') + '.';
  if (opts.status) appSetStatus(opts.status, msg, opts.color || '#b3261e');
  if (opts.notify !== false) snackErro(msg);
  if (firstInput && firstInput.scrollIntoView) {
    firstInput.scrollIntoView({ block: 'center', behavior: 'smooth' });
    setTimeout(function() { try { firstInput.focus(); } catch(e) {} }, 250);
  }
  return false;
}
function esc(s) {
  return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

  searchMedicos: 'filtrarMedicos',
  searchProjetos: 'filtrarProjetos',
  searchConfig: 'filtrarConfig',
  searchPrestadores: 'filtrarPrestadores',
  searchLabCentral: 'filtrarLabCentral',

  searchEquipamentos: 'filtrarEquipamentos',

  agendaBusca: 'renderAgendaOperacional',
  searchUsersAdmin: 'renderUsersAdmin',
  searchAudit: 'renderAuditLog',
  evSearch: 'evFiltrar'
};

var CODEX_SEARCH_FILTER_DELAY_MS = 140;
var CODEX_SEARCH_FILTER_TIMERS = {};

function codexRunSearchFilter(inputId, key, renderFn, forceNow) {
  var active = document.activeElement;
  var shouldDebounce = !forceNow && active && active.id === inputId;
  if (CODEX_SEARCH_FILTER_TIMERS[key]) {
    clearTimeout(CODEX_SEARCH_FILTER_TIMERS[key]);
    CODEX_SEARCH_FILTER_TIMERS[key] = null;
  }
  if (!shouldDebounce) {
    renderFn();
    return;
  }
  CODEX_SEARCH_FILTER_TIMERS[key] = setTimeout(function() {
    CODEX_SEARCH_FILTER_TIMERS[key] = null;
    renderFn();
  }, CODEX_SEARCH_FILTER_DELAY_MS);
}

function setupSearchClearButtons() {
  Object.keys(SEARCH_CLEAR_HANDLERS).forEach(function(inputId) {
    var input = document.getElementById(inputId);
    if (!input || input.dataset.clearReady === '1') return;
    var wrap = input.closest ? input.closest('.search-wrap, .ag-search') : input.parentNode;
    if (!wrap) return;
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'search-clear-btn';
    btn.title = 'Limpar busca';
    btn.setAttribute('aria-label', 'Limpar busca');
    btn.innerHTML = '<span class="material-symbols-outlined">close</span>';
    function updateClearState() {
      btn.classList.toggle('visible', !!String(input.value || '').trim());
    }
    function runHandler() {
      var handlerName = SEARCH_CLEAR_HANDLERS[inputId];
      if (handlerName && typeof window[handlerName] === 'function') window[handlerName]();
    }
    btn.addEventListener('click', function() {
      input.value = '';
      updateClearState();
      runHandler();
      input.focus();
    });
    input.addEventListener('input', updateClearState);
    wrap.appendChild(btn);
    input.dataset.clearReady = '1';
    updateClearState();
  });
}

document.addEventListener('DOMContentLoaded', setupSearchClearButtons);

function navAcProj(e, inputId, listId, opts, selVar) {
  var items = document.querySelectorAll('#' + listId + ' .ac-item');
  if (!items.length) return;
  var idx = _acIdxProj[listId] !== undefined ? _acIdxProj[listId] : -1;
  if (e.key==='ArrowDown')  { e.preventDefault(); idx = Math.min(idx+1, items.length-1); }
  else if (e.key==='ArrowUp')   { e.preventDefault(); idx = Math.max(idx-1, 0); }
  else if (e.key==='Enter' && idx>=0) { e.preventDefault(); pickAcProj(inputId, listId, items[idx].dataset.val, selVar); return; }
  else if (e.key==='Escape') { fecharAcProj(listId); return; }
  _acIdxProj[listId] = idx;
  items.forEach(function(el,i){ el.classList.toggle('active',i===idx); });
  if (idx>=0) items[idx].scrollIntoView({block:'nearest'});

var FASE_COLORS = {'I':'#e8f0fe:#1266f1','II':'#e6f4ea:#137333','III':'#fff3e0:#e65100','IV':'#fce8e6:#b3261e'};
var FASE_AUTO_COLORS = [
  '#e0f2fe:#075985',
  '#dcfce7:#166534',
  '#fef3c7:#92400e',
  '#fae8ff:#86198f',
  '#ffe4e6:#be123c',
  '#ccfbf1:#0f766e',
  '#ede9fe:#5b21b6',
  '#fef9c3:#854d0e',
  '#e0e7ff:#3730a3',
  '#ffedd5:#c2410c'
];

function faseAutoColor(fase) {
  var n = norm(fase || '');
  var hash = 0;
  for (var i = 0; i < n.length; i++) hash = ((hash * 31) + n.charCodeAt(i)) >>> 0;
  return FASE_AUTO_COLORS[hash % FASE_AUTO_COLORS.length];
}

function chipFase(fase) {
  var c = (FASE_COLORS[fase] || faseAutoColor(fase)).split(':');
  var faseNorm = norm(fase);
  var label = faseNorm === 'observacional' || String(fase || '').toLowerCase().indexOf('fase') >= 0 ? fase : 'Fase ' + fase;
  return '<span class="chip" style="background:'+c[0]+';color:'+c[1]+'">' + esc(label) + '</span>';
}

function isProjetoStatusConcluido(status) {
  var n = norm(status || '');
  return n.indexOf('concluido') >= 0 || n.indexOf('concluida') >= 0;
}

function projetoStatusAutoColor(status) {
  var c = faseAutoColor('status:' + (status || '')).split(':');
  return c[1] + ':' + c[0];
}

function projetoStatusChip(status) {
  var s = status || '—';
  var n = String(s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  var color = n.indexOf('concluido') >= 0 ? '#137333:#e6f4ea' :
    n.indexOf('acompanhamento') >= 0 ? '#276a7b:#d7eef5' :
    n.indexOf('recrutamento') >= 0 ? '#0b8043:#d7f5cf' :
    n.indexOf('regulatoria') >= 0 ? '#9a4b16:#ffd8bd' :
    n.indexOf('close-out') >= 0 || n.indexOf('closeout') >= 0 ? '#3c4043:#eeeeee' :
    n.indexOf('cancelado') >= 0 ? '#c5221f:#fce8e6' : projetoStatusAutoColor(s);
  var p = color.split(':');
  return '<span class="chip" style="background:' + p[1] + ';color:' + p[0] + '">' + esc(s) + '</span>';
}

function recrutamentoProjetoHtml(p) {
  var concluido = isProjetoStatusConcluido(p.status);
  var ativos = Number(p.participantesAtivos || 0);
  var falhas = Number(p.falhasTriagem || 0);
  var total = Number(p.totalParticipantes || 0);
  var meta = Number(p.metaRecrutamento || 0);
  var pct = meta > 0 ? Math.min(100, Math.round((ativos * 1000) / meta) / 10) : 0;
  var pctLabel = meta > 0 ? pct.toLocaleString('pt-BR', { maximumFractionDigits: 1 }) + '%' : '—';
  var barColor = pct >= 100 ? '#137333' : pct >= 70 ? '#1266f1' : pct >= 35 ? '#e65100' : '#9aa3b0';

  var projeto = String(statusItem.getAttribute('data-projeto-ce') || '').trim();
  var statusId = statusItem.getAttribute('data-ce-status-id') || '';
  var target = statusId ? document.getElementById(statusId) : null;
  if (!target) return;
  if (!projeto) {
    target.textContent = 'Nao';
    target.className = 'ce-status no';

    return;
  }
  var cacheKey = norm(projeto);

  if (cached) {
    target.textContent = cached.found ? 'Sim' : 'Nao';
    target.className = 'ce-status ' + (cached.found ? 'yes' : 'no');

    method: 'getTransporteCeStatus',

var _autocompleteProjetoAtivo = {};
function ativarAutocompleteProjeto(selectId) {
  var select = document.getElementById(selectId);
  if (!select) return;

  var wrap = document.getElementById(wrapId);
  if (!wrap) {
    wrap = document.createElement('div');

    wrap.style.minWidth = '0';

    input.style.width = '100%';
    input.placeholder = 'Pesquise por nome ou código…'; input.id = selectId + 'AutocompleteInput';
    var chevron = document.createElement('span'); chevron.className = 'ac-chevron'; chevron.innerHTML = '<span class="material-symbols-outlined">expand_more</span>';
    var list = document.createElement('div'); list.className = 'ac-list'; list.id = selectId + 'AutocompleteList';
    wrap.appendChild(input); wrap.appendChild(chevron); wrap.appendChild(list);
    select.parentNode.insertBefore(wrap, select.nextSibling);
    select.style.display = 'none';
    input.addEventListener('focus', function() { renderAutocompleteProjeto(selectId); });
    input.addEventListener('input', function() { renderAutocompleteProjeto(selectId); });
    input.addEventListener('blur', function() { setTimeout(function() { sincronizarAutocompleteProjeto(selectId); }, 160); });
    input.addEventListener('keydown', function(event) { navegarAutocompleteProjeto(event, selectId); });
  }
  sincronizarAutocompleteProjeto(selectId);
}

function opcoesAutocompleteProjeto(select) {
  return Array.prototype.slice.call(select.options).filter(function(option) { return !!option.value; }).map(function(option) {
    var parts = String(option.textContent || option.value).split(' — ');
    return { value: option.value, nome: parts[0], codigo: parts.slice(1).join(' — ') };
  });
}
function renderAutocompleteProjeto(selectId) {
  var select = document.getElementById(selectId), input = document.getElementById(selectId + 'AutocompleteInput'), list = document.getElementById(selectId + 'AutocompleteList');
  if (!select || !input || !list) return;
  var query = normSelectValue(input.value || '');
  var options = opcoesAutocompleteProjeto(select).filter(function(option) { return !query || normSelectValue(option.nome).includes(query) || normSelectValue(option.codigo).includes(query); });
  _autocompleteProjetoAtivo[selectId] = { options: options, index: -1 };
  list.innerHTML = '';
  if (!options.length) { var empty = document.createElement('div'); empty.className = 'ac-empty'; empty.textContent = 'Nenhum projeto cadastrado encontrado.'; list.appendChild(empty); }
  options.forEach(function(option, index) {
    var item = document.createElement('div'); item.className = 'ac-item'; item.dataset.index = index; item.setAttribute('role', 'option');
    var main = document.createElement('div'); main.className = 'ac-item-main'; main.textContent = option.nome; item.appendChild(main);
    if (option.codigo) { var meta = document.createElement('div'); meta.className = 'ac-item-meta'; meta.textContent = option.codigo; item.appendChild(meta); }
    item.addEventListener('mousedown', function(event) { event.preventDefault(); selecionarAutocompleteProjeto(selectId, option); });
    list.appendChild(item);
  });
  list.classList.add('open');
}
function selecionarAutocompleteProjeto(selectId, option) {
  var select = document.getElementById(selectId), input = document.getElementById(selectId + 'AutocompleteInput');
  if (!select || !input) return;
  select.value = option.value; input.value = option.nome; document.getElementById(selectId + 'AutocompleteList').classList.remove('open');
  select.dispatchEvent(new Event('change', { bubbles: true }));
}
function sincronizarAutocompleteProjeto(selectId) {
  var select = document.getElementById(selectId), input = document.getElementById(selectId + 'AutocompleteInput'), list = document.getElementById(selectId + 'AutocompleteList');
  if (!select || !input) return;
  var option = select.options[select.selectedIndex]; input.value = option && option.value ? String(option.textContent || option.value).split(' — ')[0] : '';
  if (list) list.classList.remove('open');
}
function navegarAutocompleteProjeto(event, selectId) {
  var state = _autocompleteProjetoAtivo[selectId], list = document.getElementById(selectId + 'AutocompleteList'); if (!state || !list || !state.options.length) return;
  if (event.key === 'ArrowDown') { event.preventDefault(); state.index = Math.min(state.index + 1, state.options.length - 1); }
  else if (event.key === 'ArrowUp') { event.preventDefault(); state.index = Math.max(state.index - 1, 0); }
  else if (event.key === 'Enter' && state.index >= 0) { event.preventDefault(); selecionarAutocompleteProjeto(selectId, state.options[state.index]); return; }
  else if (event.key === 'Escape') { list.classList.remove('open'); return; }
  Array.prototype.forEach.call(list.querySelectorAll('.ac-item'), function(item, index) { item.classList.toggle('active', index === state.index); });
}

function ativarAutocompletesProjetoDinamicos(root) {
  var selector = 'select[id="agProjeto"],select[id="eqProjeto"],select[id="medProjeto"],select[id^="monProjeto"],select[id="iiProjeto"],select[id="piProjeto"],select[id="miProjeto"],select[id="planProjeto"],select[id="desProjeto"]';
  Array.prototype.forEach.call((root || document).querySelectorAll(selector), function(select) { ativarAutocompleteProjeto(select.id); });
}

function iniciarAutocompletesProjetoDinamicos() {
  ativarAutocompletesProjetoDinamicos(document);
  if (!window.MutationObserver || !document.body) return;
  new MutationObserver(function(mutations) {
    mutations.forEach(function(mutation) {
      Array.prototype.forEach.call(mutation.addedNodes, function(node) {
        if (node.nodeType !== 1) return;
        if (node.matches && node.matches('select')) ativarAutocompletesProjetoDinamicos(node.parentNode || document);
        var select = node.closest && node.closest('select');
        if (select) ativarAutocompleteProjeto(select.id);
      });
    });
  }).observe(document.body, { childList: true, subtree: true });
}
if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', iniciarAutocompletesProjetoDinamicos);
else iniciarAutocompletesProjetoDinamicos();

function monitorUnblindedValor(v) {
  return normAgenda(v) === 'sim' ? 'Sim' : 'Não';
}

function monitorProjetosDetalhes(m) {
  if (!m) return [];
  if (m.projetosDetalhes && m.projetosDetalhes.length) {
    return m.projetosDetalhes.map(function(p) {
      return {
        projeto: String((p && p.projeto) || '').trim(),
        unblinded: monitorUnblindedValor((p && p.unblinded) || '')
      };
    }).filter(function(p) { return p.projeto; });
  }
  if (m.projetos && m.projetos.length) {
    return m.projetos.map(function(p, idx) {
      return {
        projeto: String(p || '').trim(),
        unblinded: monitorUnblindedValor(m['unblinded' + (idx + 1)] || '')
      };
    }).filter(function(p) { return p.projeto; });
  }
  return [1, 2, 3, 4].map(function(i) {
    return {
      projeto: String(m['projeto' + i] || '').trim(),
      unblinded: monitorUnblindedValor(m['unblinded' + i] || '')
    };
  }).filter(function(p) { return p.projeto; });
}

function monitorProjetos(m) {
  return monitorProjetosDetalhes(m).map(function(p) { return p.projeto; });
}

function renderMonitores(lista) {
  _monitores = lista || [];
  var projetos = {};
  var multi = 0;
  _monitores.forEach(function(m) {
    var ps = monitorProjetos(m);
    if (ps.length > 1) multi++;

function rqLookupKey(value) {
  return String(value || '').trim();
}

function rqIndexBy(rows, field, normalizer) {
  var out = {};
  normalizer = normalizer || rqLookupKey;
  (rows || []).forEach(function(row) {
    var key = normalizer(row && row[field]);
    if (key && !out[key]) out[key] = row;
  });
  return out;
}

function rebuildRequisicaoLookups() {

function requisicaoDadosCarregados() {

}

function flushRequisicaoLoadCallbacks() {
  if (!requisicaoDadosCarregados()) return;
  var callbacks = _rqLoadCallbacks.splice(0);
  callbacks.forEach(function(cb) {
    try { cb(); } catch(e) { snackErro(e); }
  });
}

function ensureRequisicaoDataLoaded(callback) {
  initRequisicao();
  if (requisicaoDadosCarregados()) {
    callback();
    return;
  }
  _rqLoadCallbacks.push(callback);
}

// ── Autocomplete genérico para o form de requisição ──────────────────────
function _rqNorm(s) {
  return codexNormText(s);
}

function reqAcOptionsIndex(key, opts) {
  opts = opts || [];
  var current = _rqAcOptionsCache[key];
  if (current && current.source === opts && current.length === opts.length) return current.items;
  var items = opts.map(function(o) {
    return { value: o, norm: _rqNorm(o) };
  });
  _rqAcOptionsCache[key] = { source: opts, length: opts.length, items: items };
  return items;
}

function renderReqAC(inputId, listId, opts, selVarName) {
  var q = _rqNorm(document.getElementById(inputId).value);
  var el = document.getElementById(listId);
  var indexed = reqAcOptionsIndex(listId, opts);
  var matches = [];
  for (var i = 0; i < indexed.length && matches.length < 40; i++) {
    if (!q || indexed[i].norm.indexOf(q) >= 0) matches.push(indexed[i].value);
  }
  _rqAcIdx[listId] = -1;
  el.innerHTML = '';
  if (!matches.length) {
    el.innerHTML = '<div class="ac-empty">Nenhum resultado encontrado.</div>';
  } else {
    matches.forEach(function(o) {
      var div = document.createElement('div');
      div.className = 'ac-item';
      div.dataset.val = o;
      div.textContent = o;
      div.addEventListener('mousedown', function(evt) {
        evt.preventDefault();
        pickReqAC(inputId, listId, o, selVarName);
      });
      el.appendChild(div);
    });
  }
  el.classList.add('open');
}

function pickReqAC(inputId, listId, val, selVarName) {
  window[selVarName] = val;
  document.getElementById(inputId).value = val;
  document.getElementById(listId).classList.remove('open');
  if (REQUISICAO_ID_ALIASES.prestador.indexOf(inputId) > -1) {
    preencherEnderecoReq();
    carregarReqPreloadAtual();
  }
  if (inputId === 'rqPaciente') preencherDadosPaciente();
  if (inputId === 'rqSolicitante') preencherDadosSolicitante();
  updateRequisicaoGenerateAvailability(false);
}

function fecharReqAC(listId) {
  var el = document.getElementById(listId);
  if (el) el.classList.remove('open');
}

function navReqAC(e, inputId, listId, opts, selVarName) {
  var items = document.querySelectorAll('#' + listId + ' .ac-item');
  if (!items.length) return;
  var idx = _rqAcIdx[listId] !== undefined ? _rqAcIdx[listId] : -1;
  if (e.key === 'ArrowDown')  { e.preventDefault(); idx = Math.min(idx+1, items.length-1); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); idx = Math.max(idx-1, 0); }
  else if (e.key === 'Enter' && idx >= 0) {
    e.preventDefault();
    pickReqAC(inputId, listId, items[idx].dataset.val, selVarName);
    return;
  } else if (e.key === 'Escape') { fecharReqAC(listId); return; }
  _rqAcIdx[listId] = idx;
  items.forEach(function(el,i){ el.classList.toggle('active', i===idx); });
  if (idx >= 0) items[idx].scrollIntoView({block:'nearest'});
}

function carregarReqPreloadProjeto(projeto, tipoServico) {
  projeto = String(projeto || '').trim();
  tipoServico = String(tipoServico || '').trim();
  if (!projeto) return;
  appServerRun({
    method: 'getReqExamesPreloadProjetoContext',
    args: [projeto, tipoServico],
    onSuccess: function(data) {
      var exames = data && data.exames ? data.exames : (Array.isArray(data) ? data : []);
      var chave = data && data.chave ? data.chave : (projeto + (tipoServico ? ' | ' + tipoServico : ''));
      if (!exames.length) return;
      if (chave && chave === _rqPreloadLastKey) return;
      if (chave && chave === _rqPreloadPromptKey) return;
      var atuais = Array.from(document.querySelectorAll('#rqExamesLista .exam-input, #examList .exam-input'))
        .map(function(i){ return i.value.trim(); }).filter(Boolean);
      var label = tipoServico ? (projeto + ' / ' + tipoServico) : projeto;
      abrirConfirmReqPreload(label, atuais.length, exames.length, function() {
        preencherReqExames(exames);
        _rqPreloadLastKey = chave || '';
        _rqPreloadPromptKey = chave || '';
        snack('Exames padrao carregados.');
      }, function() {
        _rqPreloadPromptKey = chave || '';
      });
    },
    onFailure: function(e) { snackErro(appErrorMessage(e)); }
  });
}

function abrirConfirmReqPreload(projeto, atuais, novos, onConfirm, onSkip) {
  var modal = document.getElementById('confirmReqPreload');
  var msg = document.getElementById('confirmReqPreloadMsg');
  var btn = document.getElementById('btnConfirmReqPreload');
  if (!modal || !msg || !btn) {
    if (typeof onConfirm === 'function') onConfirm();
    return;
  }
  msg.innerHTML =
    'Foram localizados <strong>' + esc(novos || 0) + ' exame(s) padr&atilde;o</strong> para <strong>' + esc(projeto || '') + '</strong>.' +
    (atuais ? '<br><br>Se usar este padr&atilde;o, os ' + esc(atuais || 0) + ' exame(s) j&aacute; digitados ser&atilde;o substitu&iacute;dos.' : '<br><br>Deseja carregar esta lista na requisi&ccedil;&atilde;o agora?') +
    '<br><br>Voc&ecirc; tamb&eacute;m pode manter a lista atual e preencher manualmente.';
  _rqPendingPreloadData = { onConfirm: onConfirm, onSkip: onSkip };
  btn.onclick = function() {
    fecharOverlay('confirmReqPreload');
    _rqPendingPreloadData = null;
    if (typeof onConfirm === 'function') onConfirm();
  };
  abrirOverlay('confirmReqPreload');
}

function recusarReqPreloadEncontrado() {

function reqPreloadUsarListaAtual() {
  var exames = examesAtuaisRequisicao();
  _reqPreloadConflictData = null;
  document.getElementById('reqPreloadExames').value = exames.join('\n');
  appMarkUnsavedChanges('modalReqPreload');
  updateExamCount();
}

function reqPreloadExamesDoModal() {
  return String(document.getElementById('reqPreloadExames').value || '')
    .split(/\r?\n/)
    .map(function(v){ return v.trim(); })
    .filter(Boolean)
    .slice(0, 40);
}

function salvarReqPreloadProjeto() {
  var projeto = document.getElementById('reqPreloadProjeto').value.trim();
  var tipoServico = tipoServicoPrestadorRequisicaoAtual();
  var exames = reqPreloadExamesDoModal();
  var btn = document.getElementById('btnSalvarReqPreload');
  var status = document.getElementById('statusReqPreload');
  if (!projeto) {
    if (status) status.innerHTML = '<span style="color:#e53935;">Projeto não identificado.</span>';
    return;
  }
  appSetButtonBusy(btn, true);
  if (status) status.innerHTML = '<span style="color:#5f6b7c;">Salvando...</span>';
  appServerRun({
    method: 'salvarReqExamesPreloadProjeto',
    args: [projeto, exames, _reqPreloadEditorHash, tipoServico],
    onSuccess: function(res) {
      appSetButtonBusy(btn, false);
      if (res && res.conflict) {
        _reqPreloadConflictData = res;
        if (status) {
          status.innerHTML =
            '<span style="color:#b3261e;">' + esc(res.message || 'Este preload foi alterado por outro usuario.') + '</span>' +
            '<div style="margin-top:8px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap">' +
              '<button class="ag-tb-btn" type="button" onclick="reqPreloadCarregarVersaoAtual()">Carregar versao atual</button>' +
            '</div>';
        }
        snackErro('Preload alterado por outro usuario. Revise a versao atual antes de salvar.');
        return;
      }
      if (status) status.innerHTML = '';
      preencherReqExames((res && res.exames) || exames);
      _reqPreloadEditorHash = res && res.hash ? res.hash : '';
      _rqPreloadLastKey = res && res.chave ? res.chave : _rqPreloadLastKey;
      _reqPreloadConflictData = null;
      appClearUnsavedChanges('modalReqPreload');
      fecharOverlay('modalReqPreload');
      snack((res && res.message) || 'Exames padrão salvos.');
    },
    onFailure: function(e) {
      appSetButtonBusy(btn, false);
      if (status) status.innerHTML = '<span style="color:#e53935;">' + esc(appErrorMessage(e)) + '</span>';
    }
  });
}

function reqPreloadCarregarVersaoAtual() {
  var data = _reqPreloadConflictData;
  if (!data) return;
  var exames = data.exames || [];
  document.getElementById('reqPreloadExames').value = exames.join('\n');
  _reqPreloadEditorHash = data.hash || '';
  _reqPreloadConflictData = null;
  var status = document.getElementById('statusReqPreload');
  if (status) {
    status.innerHTML = '<span style="color:#137333;">Versao atual carregada. Revise a lista antes de salvar.</span>';
  }
  appMarkUnsavedChanges('modalReqPreload');
}

function fecharReqPreloadModal() {
  function close() {
    appClearUnsavedChanges('modalReqPreload');
    _reqPreloadConflictData = null;
    fecharOverlay('modalReqPreload');
  }
  if (!appConfirmNavigationIfDirty('modalReqPreload', close)) return;
  close();
}

function fecharReqPreloadModalSeFora(event) {
  if (event && event.target && event.target.id === 'modalReqPreload') fecharReqPreloadModal();
}

function limparRequisicaoForm(options) {
  options = options || {};
  ['rqPaciente','rqNascimento','rqProtocolo','rqMedico','rqSolicitante','rqPrestador','rqLocalExame','rqEndereco','rqPrestadorTipo','rqData','rqHorario','rqObs'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.value = '';
  });

  var statusEl = requisicaoEl('status');
  if (statusEl) statusEl.innerHTML = '';
  _rqSelPaciente = null;
  _rqSelLocal = null;
  _rqSelSolicitante = null;
  _rqAgendaOrigemId = '';
  _rqOrigemContext = null;
  var page = document.getElementById('page-requisicao');
  if (page && page.dataset) page.dataset.agendaId = '';
  _rqPreloadLastKey = '';
  _rqPreloadPromptKey = '';
  _rqPendingPreloadData = null;
  _rqPostGeneratePreloadOffer = null;
  _rqValidationVisible = false;
  clearRequisicaoValidation();
  if (!options.skipAvailabilityUpdate) updateRequisicaoGenerateAvailability(false);
}

function preencherDadosSolicitante() {

function preencherSolicitanteUsuarioAtual() {
  var input = document.getElementById('rqSolicitante');
  if (!input || input.value.trim() || !_rqSolicitantes.length) return;
  google.script.run
    .withSuccessHandler(function(email) {

    .getUsuarioEmail();
