function adicionarExame() {
  var lista = requisicaoEl('examesLista');
  if (!lista) return;
  var total = lista.children.length;
  if (total >= 40) { snack('Limite de 40 exames atingido.'); return; }
  var num = total + 1;
  var row = document.createElement('div');
  row.className = 'exam-row';
  row.innerHTML =
    '<div class="exam-num">' + num + '</div>' +
    '<input type="text" class="exam-input" placeholder="Descrição do exame ' + num + '">' +
    '<button class="exam-remove" onclick="removerExame(this)" title="Remover">' +
      '<span class="material-symbols-outlined">close</span>' +
    '</button>';
  lista.appendChild(row);
  updateExamCount();
  var btnAdd = document.getElementById('rqBtnAddExam');
  if (btnAdd) btnAdd.style.display = lista.children.length >= 40 ? 'none' : '';
}

function addExam() { adicionarExame(); }

function removerExame(btn) {
  var row = btn.closest('.exam-row');
  row.parentNode.removeChild(row);
  var rows = document.querySelectorAll('#rqExamesLista .exam-row, #examList .exam-row');
  rows.forEach(function(r, i) {
    r.querySelector('.exam-num').textContent = i + 1;
    r.querySelector('.exam-input').placeholder = 'Descrição do exame ' + (i + 1);
  });
  updateExamCount();
  var btnAdd = document.getElementById('rqBtnAddExam');
  if (btnAdd) btnAdd.style.display = '';
}

function updateExamCount() {
  var n = document.querySelectorAll('#rqExamesLista .exam-row, #examList .exam-row').length;
  var count = requisicaoEl('examCount');
  if (count) count.textContent = n + (count.id === 'examCount' ? ' exame(s)' : ' / 40 exames');
}

function getExames() {
  var inputs = document.querySelectorAll('#rqExamesLista .exam-input, #examList .exam-input');
  return Array.from(inputs)
    .map(function(i){ return i.value.trim(); })
    .filter(Boolean)
    .slice(0, 40);
}

// ── Geração do PDF ────────────────────────────────────────────────────────
function requisicaoDateOnlyFromIso(value) {
  var parts = String(value || '').split('-');
  if (parts.length !== 3) return null;
  var d = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
  return isNaN(d.getTime()) ? null : d;
}

function requisicaoIsPastDate(value) {
  var d = requisicaoDateOnlyFromIso(value);
  if (!d) return false;
  var hoje = new Date();
  hoje.setHours(0, 0, 0, 0);
  d.setHours(0, 0, 0, 0);
  return d.getTime() < hoje.getTime();
}

function montarPayloadRequisicao(dadosValidados) {
  var solObj = _rqLookup.solicitantePorNome[rqLookupKey(dadosValidados.solicitante)] || {};
  var agendaIdOrigem = requisicaoAgendaOrigemIdAtual();
  return {
    paciente:        dadosValidados.paciente,
    nascimento:      document.getElementById('rqNascimento').value,
    protocolo:       document.getElementById('rqProtocolo').value,
    medico:          document.getElementById('rqMedico').value,
    localExame:      dadosValidados.local,
    endereco:        document.getElementById('rqEndereco').value,
    dataAgendamento: dadosValidados.data,
    horario:         document.getElementById('rqHorario').value,
    exames:          getExames(),
    observacoes:     document.getElementById('rqObs').value.trim(),
    urgente:         _rqUrgente,
    solicitante:     dadosValidados.solicitante,
    solFormacao:     solObj.formacao || '',
    solRegistro:     solObj.registro || '',
    agendaId:        agendaIdOrigem || '',
    requestedByEmail: solObj.email || (window.APP_BOOTSTRAP_DATA && window.APP_BOOTSTRAP_DATA.access ? window.APP_BOOTSTRAP_DATA.access.email : '')
  };
}

function validarRequisicaoAntesDeGerar() {
  var paciente = document.getElementById('rqPaciente').value.trim();
  var localEl  = requisicaoEl('prestador');
  var local    = localEl ? localEl.value.trim() : '';
  var dataEl   = document.getElementById('rqData');
  var data     = dataEl ? dataEl.value : '';
  var sol      = document.getElementById('rqSolicitante').value.trim();
  clearRequisicaoValidation();
  var erros = appRequiredMissing([
    { label: 'Paciente', value: paciente },
    { label: 'Local do Exame', value: local },
    { label: 'Data do Exame', value: data },
    { label: 'Solicitante', value: sol }
  ]);
  if (erros.length) {
    if (!paciente) setRequisicaoFieldInvalid('rqPaciente', true);
    if (!local) setRequisicaoFieldInvalid(localEl ? localEl.id : 'rqPrestador', true);
    if (!data) setRequisicaoFieldInvalid('rqData', true);
    if (!sol) setRequisicaoFieldInvalid('rqSolicitante', true);
    setRequisicaoStatus('Atencao: preencha os campos obrigatorios: ' + erros.join(', ') + '.', 'danger');
    snackErro('Campos obrigatórios: ' + erros.join(', '));
    return;
  }
  if (requisicaoIsPastDate(data)) {
    setRequisicaoFieldInvalid('rqData', true);
    setRequisicaoStatus('Atencao: a data do exame nao pode ser anterior a hoje.', 'danger');
    snackErro('Requisicoes de Exame nao podem ser marcadas para uma data anterior a hoje.');
    return;
  }
  return { paciente: paciente, local: local, data: data, solicitante: sol };
}

function requisicaoFieldErrorId(id) {
  var map = {
    rqPaciente: 'errRqPaciente',
    rqPrestador: 'errRqPrestador',
    rqLocalExame: 'errRqPrestador',
    rqData: 'errRqData',
    rqSolicitante: 'errRqSolicitante'
  };
  return map[id] || '';
}

function setRequisicaoFieldInvalid(id, invalid, errId) {
  var el = document.getElementById(id);
  if (!el) return;
  el.classList.toggle('invalid', !!invalid);
  el.setAttribute('aria-invalid', invalid ? 'true' : 'false');
  var acWrap = el.closest ? el.closest('.ac-wrap') : null;
  if (invalid) {
    el.style.borderColor = '#e53935';
    el.style.boxShadow = '0 0 0 3px rgba(229,57,53,.12)';
    el.style.outline = '2px solid rgba(229,57,53,.18)';
    el.style.outlineOffset = '1px';
    if (acWrap) acWrap.classList.add('invalid');
  } else {
    el.style.borderColor = '';
    el.style.boxShadow = '';
    el.style.outline = '';
    el.style.outlineOffset = '';
    if (acWrap) acWrap.classList.remove('invalid');
  }
  var field = el.closest ? el.closest('.field') : null;
  if (field) field.classList.toggle('invalid', !!invalid);
  var error = document.getElementById(errId || requisicaoFieldErrorId(id));
  if (error) {
    error.classList.toggle('visible', !!invalid);
    error.classList.toggle('show', !!invalid);
  }
}

function clearRequisicaoValidation() {
  ['rqPaciente','rqPrestador','rqLocalExame','rqData','rqSolicitante'].forEach(function(id) {
    setRequisicaoFieldInvalid(id, false);
  });
}

function requisicaoRequiredValues() {
  var localEl = requisicaoEl('prestador');
  return [
    { id: 'rqPaciente', err: 'errRqPaciente', label: 'Paciente', value: (document.getElementById('rqPaciente') || {}).value },
    { id: localEl ? localEl.id : 'rqPrestador', err: 'errRqPrestador', label: 'Local do Exame', value: localEl ? localEl.value : '' },
    { id: 'rqData', err: 'errRqData', label: 'Data do Exame', value: (document.getElementById('rqData') || {}).value },
    { id: 'rqSolicitante', err: 'errRqSolicitante', label: 'Solicitante', value: (document.getElementById('rqSolicitante') || {}).value }
  ];
}

function requisicaoMissingRequiredLabels() {
  return requisicaoMissingRequiredChecks().map(function(item) { return item.label; });
}

function requisicaoMissingRequiredChecks() {
  return requisicaoRequiredValues().filter(function(item) {
    return !String(item.value || '').trim();
  });
}

function mostrarRequisicaoCamposObrigatorios() {
  var missingChecks = requisicaoMissingRequiredChecks();
  var missing = missingChecks.map(function(item) { return item.label; });
  _rqValidationVisible = missing.length > 0;
  requisicaoRequiredValues().forEach(function(check) {
    var isMissing = missingChecks.some(function(item) { return item.id === check.id; });
    setRequisicaoFieldInvalid(check.id, isMissing, check.err);
  });
  updateRequisicaoGenerateAvailability(true);
  return missing;
}

function updateRequisicaoGenerateAvailability(showStatus) {
  var btn = requisicaoEl('gerarBtn');
  if (!btn || btn.dataset.busy === '1') return true;
  var missingChecks = requisicaoMissingRequiredChecks();
  var missing = missingChecks.map(function(item) { return item.label; });
  if (showStatus && missing.length) _rqValidationVisible = true;
  if (!missing.length) _rqValidationVisible = false;
  btn.disabled = false;
  btn.setAttribute('aria-disabled', missing.length ? 'true' : 'false');
  btn.title = missing.length ? 'Preencha: ' + missing.join(', ') : 'Gerar requisicao.';
  var showFieldValidation = showStatus || _rqValidationVisible;
  requisicaoRequiredValues().forEach(function(check) {
    var isMissing = missingChecks.some(function(item) { return item.id === check.id; });
    setRequisicaoFieldInvalid(check.id, showFieldValidation && isMissing, check.err);
  });
  if (showStatus && missing.length) {
    setRequisicaoStatus('Atencao: preencha os campos obrigatorios: ' + missing.join(', ') + '.', 'danger');
  } else if (missing.length) {
    setRequisicaoStatus('Para gerar, preencha: ' + missing.join(', ') + '.', 'validation');
  } else {
    var status = requisicaoEl('status');
    if (status && status.dataset.validationMessage === '1') setRequisicaoStatus('', '');
  }
  return missing.length === 0;
}

function setRequisicaoStatus(msg, type) {
  var statusEl = requisicaoEl('status');
  if (!statusEl) return;
  var color = type === 'ok' ? '#137333' : (type === 'danger' || type === 'validation' ? '#e53935' : '#5f6b7c');
  statusEl.dataset.validationMessage = type === 'validation' || type === 'danger' ? '1' : '';
  statusEl.innerHTML = msg ? '<span style="color:' + color + '">' + esc(msg) + '</span>' : '';
}

function setRequisicaoButtonState(btn, busy, label) {
  if (!btn) return;
  btn.dataset.busy = busy ? '1' : '';
  appSetButtonBusy(btn, busy);
  var text = btn ? btn.querySelector('.btn-label') : null;
  if (!text) return;
  if (!btn.dataset.defaultLabel) btn.dataset.defaultLabel = text.textContent;
  text.textContent = label || btn.dataset.defaultLabel;
  if (!busy) updateRequisicaoGenerateAvailability(false);
}

function abrirRequisicaoSucessoModal(res, warnings, afterClose) {
  var modal = document.getElementById('modalReqSuccess');
  var title = document.getElementById('reqSuccessTitle');
  var msg = document.getElementById('reqSuccessMsg');
  var warningEl = document.getElementById('reqSuccessWarnings');
  var isContingencia = !!(res && res.pdfContingencia);
  if (!modal) {
    setRequisicaoStatus((isContingencia ? 'Rascunho criado em contingencia. ' : 'Rascunho criado. ') + ((res && res.message) || ''), isContingencia ? 'danger' : 'ok');
    if (typeof afterClose === 'function') afterClose();
    return;
  }
  warnings = warnings || [];
  _rqSuccessAfterClose = typeof afterClose === 'function' ? afterClose : null;
  if (title) title.textContent = isContingencia ? 'Requisicao gerada em contingencia' : (warnings.length ? 'Requisicao gerada com aviso' : 'Requisicao gerada');
  if (msg) {
    msg.textContent = isContingencia
      ? 'O rascunho de e-mail foi criado, mas o anexo PDF usou o modo de contingencia. Confira o PDF antes de enviar.'
      : ((res && res.message) || 'O PDF foi gerado e o rascunho de e-mail foi criado com sucesso.');
  }
  if (warningEl) {
    warningEl.innerHTML = warnings.length
      ? '<span style="color:#b3261e;">Atencao: ' + esc(warnings.join(' ')) + '</span>'
      : '';
  }
  abrirOverlay('modalReqSuccess');
}

function fecharRequisicaoSucessoModal(event) {
  if (event && event.target && event.target.id !== 'modalReqSuccess') return;
  fecharOverlay('modalReqSuccess');
  var afterClose = _rqSuccessAfterClose;
  _rqSuccessAfterClose = null;
  if (typeof afterClose === 'function') afterClose();
}

function gerarRequisicao() {
  if (!updateRequisicaoGenerateAvailability(true)) return;
  var dadosValidados = validarRequisicaoAntesDeGerar();
  if (!dadosValidados) return;
  var preloadOffer = montarReqPreloadOfferAposGerar();
  var btn = requisicaoEl('gerarBtn');
  var statusEl = requisicaoEl('status');
  setRequisicaoButtonState(btn, true, 'Gerando...');
  setRequisicaoStatus('Gerando PDF e rascunho de e-mail...', '');
  var dados = montarPayloadRequisicao(dadosValidados);
  appServerRun({
    method: 'gerarRequisicaoPDF',
    args: [dados],
    onSuccess: function(res) {
      var msg = res && typeof res === 'object' ? (res.message || 'Rascunho de e-mail criado com sucesso!') : res;
      setRequisicaoButtonState(btn, false);
      setRequisicaoStatus('Salvo. ' + msg, 'ok');
      var warnings = res && typeof res === 'object' ? [res.pdfWarning, res.preloadWarning, res.statusWarning].filter(Boolean) : [];
      if (warnings.length) {
        statusEl.innerHTML += '<div style="color:#b3261e;margin-top:6px">Atencao: ' + esc(warnings.join(' ')) + '</div>';
        snackErro(warnings.join(' '));
      }
      appClearUnsavedChanges('page-requisicao');
      finalizarRequisicaoAposSucesso(res && res.statusRequisicao, res);
      limparRequisicaoForm({ skipAvailabilityUpdate: true });
      setRequisicaoStatus(res && res.pdfContingencia ? 'Rascunho criado em contingencia. Confira o PDF antes de enviar.' : 'Salvo. ' + msg, res && res.pdfContingencia ? 'danger' : 'ok');
      abrirRequisicaoSucessoModal(res, warnings, function() {
        oferecerSalvarReqPreloadAposGerar(preloadOffer);
      });
    },
    onFailure: function(e) {
      setRequisicaoButtonState(btn, false);
      var msgErro = appErrorMessage(e);
      setRequisicaoStatus('Erro: ' + msgErro, 'danger');
      snackErro(msgErro);
    }
  });
}

function onRequisicaoRequiredInput(event) {
  if (!event || !event.target || !event.target.closest || !event.target.closest('#page-requisicao')) return;
  if (['rqPaciente','rqPrestador','rqLocalExame','rqData','rqSolicitante'].indexOf(String(event.target.id || '')) === -1) return;
  setRequisicaoFieldInvalid(event.target.id, false);
  updateRequisicaoGenerateAvailability(false);
}

document.addEventListener('input', onRequisicaoRequiredInput);
document.addEventListener('change', onRequisicaoRequiredInput);

function finalizarRequisicaoAposSucesso(statusRequisicao, resultado) {
  var origem = _rqOrigemContext || {};
  var agendaIdOrigem = requisicaoAgendaOrigemIdAtual();
  if (agendaIdOrigem) {
    var sync = resultado && resultado.statusSync;
    if (sync && sync.ok && statusRequisicao) {
      aplicarStatusRequisicaoAgendaLocal(agendaIdOrigem, statusRequisicao, true, resultado && resultado.recordVersion, resultado && resultado.editRecordVersion);
    } else if (!sync && statusRequisicao) {
      aplicarStatusRequisicaoAgendaLocal(agendaIdOrigem, statusRequisicao, true, resultado && resultado.recordVersion, resultado && resultado.editRecordVersion);
    } else if (!sync || !sync.ok) {
      appServerRun({
        method: 'atualizarStatusRequisicaoAgenda',
        args: [agendaIdOrigem, true],
        onSuccess: function(res) {
          if (res && res.statusRequisicao) {
            aplicarStatusRequisicaoAgendaLocal(agendaIdOrigem, res.statusRequisicao, true, res.recordVersion, res.editRecordVersion);
            snack('Status da requisição atualizado na Agenda.');
          } else if (res && res.semPrestador) {
            snackErro('Rascunho criado, mas o agendamento está sem prestador para marcar a requisição.');
          }
        },
        onFailure: function(e) {
          snackErro('Rascunho criado, mas não foi possível atualizar o status da Agenda: ' + appErrorMessage(e));
        }
      });
    }
    return;
  }
  if (origem.tipo === 'participante') {
    var participante = origem.participante || null;
    irPara('participantes');
    setTimeout(function() {
      if (participante) abrirFormPart(participante);
    }, 120);
  }
}

function snackErro(msg) { snack('⚠ ' + appErrorMessage(msg)); }

function salvarRequisicao() {
  var missing = mostrarRequisicaoCamposObrigatorios();
  if (missing.length) return;
  gerarRequisicao();
}

var _prestadores = [];
var _prestadorTipoServicoOptions = [];

function carregarPrestadores(force) {
  document.getElementById('bodyPrestadores').innerHTML =
    '<tr class="loading-row"><td colspan="5"><div class="spinner"></div>Carregando...</td></tr>';
  getCadastrosBootstrapCached('prestadores',
    function(res) {
      _prestadorTipoServicoOptions = (res && res.config && res.config.tiposServico) || [];
      renderPrestadorTipoServicoOptions();
      renderPrestadores(sortCadastroByField((res && res.data) || [], 'empresa'));
    },
    function(e) { snack(typeof appErrorMessage === 'function' ? appErrorMessage(e) : e.message); },
    !!force);
}

function renderPrestadores(lista) {
  _prestadores = lista || [];
  document.getElementById('prestTotal').textContent =
    _prestadores.length || '0';
  document.getElementById('prestComEmail').textContent =
    _prestadores.filter(function(p) { return p.email; }).length || '0';
  filtrarPrestadores(true);
}

function _renderTabelaPrestadores(lista) {
  var tb = document.getElementById('bodyPrestadores');
  if (!lista.length) {
    tb.innerHTML = '<tr class="empty-row"><td colspan="5">Nenhum prestador cadastrado.</td></tr>';
    return;
  }
  tb.innerHTML = lista.map(function(p, index) {
    var ini = p.empresa ? p.empresa[0].toUpperCase() : '?';
    var tipoServicoCell = prestadorTipoServicoChip(p.tipoServico);
    var emailCell = prestadorEmailCell(p.email);
    return '<tr>' +
      '<td><div class="name-cell"><div class="row-avatar">' + ini + '</div>' +
        '<span class="row-name">' + esc(p.empresa) + '</span></div></td>' +
      '<td>' + esc(p.endereco || '—') + '</td>' +
      '<td>' + tipoServicoCell + '</td>' +
      '<td>' + emailCell + '</td>' +
      '<td><div class="action-btns">' +
        '<button class="icon-btn" title="Editar" data-record-action="edit" data-record-index="' + index + '"><span class="material-symbols-outlined">edit</span></button>' +
        '<button class="icon-btn del" title="Excluir" data-record-action="delete" data-record-index="' + index + '"><span class="material-symbols-outlined">delete</span></button>' +
      '</div></td>' +
      '</tr>';
  }).join('');
  bindTableRecordActions(tb, lista, {
    edit: function(item) { abrirFormPrestador(item.id); },
    delete: function(item) { confirmarExcluirPrestador(item.id, item.empresa); }
  });
}

function filtrarPrestadores(forceNow) {
  codexRunSearchFilter('searchPrestadores', 'prestadores', function() {
    var q = ((document.getElementById('searchPrestadores') || {}).value || '').toLowerCase();
    _renderTabelaPrestadores(!q ? _prestadores : _prestadores.filter(function(p) {
      return (p.empresa + ' ' + p.endereco + ' ' + p.email + ' ' + (p.tipoServico || '')).toLowerCase().includes(q);
    }));
  }, !!forceNow);
}

function montarReqPreloadOfferAposGerar() {
  var projeto = getProjetoRequisicaoAtual();
  var tipoServico = tipoServicoPrestadorRequisicaoAtual();
  var exames = getExames();
  if (!projeto || !tipoServico || !exames.length) return null;
  return {
    projeto: projeto,
    tipoServico: tipoServico,
    exames: exames
  };
}

function oferecerSalvarReqPreloadAposGerar(snapshot) {
  if (!snapshot) return;
  appServerRun({
    method: 'getReqExamesPreloadProjetoEditor',
    args: [snapshot.projeto, snapshot.tipoServico],
    onSuccess: function(data) {
      if (data && data.exists && data.active !== false) return;
      abrirReqPreloadSaveOffer(snapshot, data && data.hash ? data.hash : '');
    },
    onFailure: function(e) {
      snackErro(appErrorMessage(e));
    }
  });
}

function abrirReqPreloadSaveOffer(snapshot, hash) {
  var modal = document.getElementById('confirmReqPreloadSave');
  var msg = document.getElementById('confirmReqPreloadSaveMsg');
  var status = document.getElementById('statusReqPreloadSave');
  var btn = document.getElementById('btnConfirmReqPreloadSave');
  if (!modal || !msg || !btn) return;
  _rqPostGeneratePreloadOffer = {
    projeto: snapshot.projeto,
    tipoServico: snapshot.tipoServico,
    exames: snapshot.exames || [],
    hash: hash || ''
  };
  msg.innerHTML =
    'A requisicao foi gerada com sucesso e ainda nao existe padrao salvo para <strong>' + esc(snapshot.projeto) + ' / ' + esc(snapshot.tipoServico) + '</strong>.' +
    '<br><br>Deseja salvar os exames desta requisicao como padrao para os proximos usos?';
  if (status) status.innerHTML = '';
  btn.disabled = false;
  abrirOverlay('confirmReqPreloadSave');
}

function fecharReqPreloadSaveOffer() {
  _rqPostGeneratePreloadOffer = null;
  fecharOverlay('confirmReqPreloadSave');
}

function salvarReqPreloadAposGerar() {
  var data = _rqPostGeneratePreloadOffer;
  if (!data) return;
  var btn = document.getElementById('btnConfirmReqPreloadSave');
  var status = document.getElementById('statusReqPreloadSave');
  appSetButtonBusy(btn, true);
  if (status) status.innerHTML = '<span style="color:#5f6b7c;">Salvando...</span>';
  appServerRun({
    method: 'salvarReqExamesPreloadProjeto',
    args: [data.projeto, data.exames, data.hash, data.tipoServico],
    onSuccess: function(res) {
      appSetButtonBusy(btn, false);
      if (res && res.conflict) {
        if (status) status.innerHTML = '<span style="color:#b3261e;">' + esc(res.message || 'Este padrao foi alterado por outro usuario.') + '</span>';
        return;
      }
      _rqPreloadLastKey = res && res.chave ? res.chave : _rqPreloadLastKey;
      _rqPostGeneratePreloadOffer = null;
      fecharOverlay('confirmReqPreloadSave');
      snack((res && res.message) || 'Exames padrao salvos.');
    },
    onFailure: function(e) {
      appSetButtonBusy(btn, false);
      if (status) status.innerHTML = '<span style="color:#e53935;">' + esc(appErrorMessage(e)) + '</span>';
    }
  });
}

function prestadorTipoServicoChip(tipoServico) {
  var tipo = tipoServico || '—';
  var n = _rqNorm(tipo);
  var cls = n.indexOf('analises clinicas') >= 0 ? 'chip-green'
    : (n.indexOf('imagem') >= 0 ? 'chip-blue' : 'chip-grey');
  return '<span class="chip ' + cls + '">' + esc(tipo) + '</span>';
}

function prestadorEmailCell(email) {
  email = String(email || '').trim();
  if (!email) return '<span style="color:var(--text-faint)">—</span>';
  return '<div class="prest-email-cell"><a href="mailto:' + esc(email) + '">' + esc(email) + '</a></div>';
}

function prestadorEmailsNormalizados(raw) {
  var vistos = {};
  return String(raw || '').split(/[;,\n]+/).map(function(email) {
    return email.trim();
  }).filter(function(email) {
    var chave = email.toLowerCase();
    if (!email || vistos[chave]) return false;
    vistos[chave] = true;
    return true;
  });
}

function renderPrestadorEmails(raw) {
  var valor = document.getElementById('prestEmail');
  var lista = document.getElementById('prestEmailRecipients');
  var editor = document.getElementById('prestEmailEditor');
  if (!valor || !lista) return;
  var emails = Array.isArray(raw) ? prestadorEmailsNormalizados(raw.join(';')) : prestadorEmailsNormalizados(raw);
  valor.value = emails.join('; ');
  lista.replaceChildren();
  emails.forEach(function(email) {
    var chip = document.createElement('span');
    chip.className = 'prest-email-chip';
    var texto = document.createElement('span');
    texto.textContent = email;
    var remover = document.createElement('button');
    remover.type = 'button';
    remover.className = 'prest-email-remove';
    remover.setAttribute('aria-label', 'Remover ' + email);
    remover.innerHTML = '<span class="material-symbols-outlined">close</span>';
    remover.addEventListener('click', function() {
      renderPrestadorEmails(prestadorEmailsNormalizados(valor.value).filter(function(item) {
        return item.toLowerCase() !== email.toLowerCase();
      }));
    });
    chip.appendChild(texto);
    chip.appendChild(remover);
    lista.appendChild(chip);
  });
  if (editor) editor.classList.toggle('invalid', !emails.length);
  if (emails.length) limparErro('prestEmail', 'errPrestEmail');
}

function adicionarEmailPrestador() {
  var entrada = document.getElementById('prestEmailEntry');
  if (!entrada) return false;
  var novos = prestadorEmailsNormalizados(entrada.value);
  if (!novos.length) return false;
  var invalidos = novos.filter(function(email) {
    return !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  });
  if (invalidos.length) {
    entrada.classList.add('invalid');
    var erro = document.getElementById('errPrestEmail');
    if (erro) {
      erro.textContent = 'Informe um e-mail válido.';
      erro.classList.add('visible');
    }
    entrada.focus();
    return false;
  }
  entrada.classList.remove('invalid');
  renderPrestadorEmails(prestadorEmailsNormalizados((document.getElementById('prestEmail').value || '') + ';' + novos.join(';')));
  entrada.value = '';
  entrada.focus();
  return true;
}

function prepararEditorEmailsPrestador() {
  var entrada = document.getElementById('prestEmailEntry');
  var botao = document.getElementById('prestEmailAdd');
  if (!entrada || !botao || entrada.dataset.bound === '1') return;
  entrada.dataset.bound = '1';
  botao.addEventListener('click', adicionarEmailPrestador);
  entrada.addEventListener('keydown', function(event) {
    if (event.key === 'Enter') {
      event.preventDefault();
      adicionarEmailPrestador();
    }
  });
  entrada.addEventListener('input', function() {
    entrada.classList.remove('invalid');
  });
}

function renderPrestadorTipoServicoOptions(currentValue) {
  var sel = document.getElementById('prestTipoServico');
  if (!sel) return;
  currentValue = currentValue || sel.value || '';
  var base = (_prestadorTipoServicoOptions && _prestadorTipoServicoOptions.length)
    ? _prestadorTipoServicoOptions
    : ['Análises clínicas', 'Serviço de imagem', 'Outros'];
  var opts = [''].concat(base);
  if (currentValue && opts.indexOf(currentValue) === -1) opts.push(currentValue);
  sel.innerHTML = opts.map(function(v) {
    return '<option value="' + esc(v) + '"' + (v === currentValue ? ' selected' : '') + '>' + esc(v || 'Selecione') + '</option>';
  }).join('');
}

function abrirFormPrestador(id) {
  ['editPrestId','prestEmpresa','prestEndereco','prestEmail','prestTipoServico'].forEach(function(fId) {
    document.getElementById(fId).value = '';
  });
  prepararEditorEmailsPrestador();
  document.getElementById('prestEmailEntry').value = '';
  renderPrestadorEmails('');
  document.getElementById('errPrestEmail').textContent = 'Informe ao menos um e-mail.';
  renderPrestadorTipoServicoOptions('');
  document.getElementById('statusPrest').textContent = '';
  document.getElementById('modalPrestTitle').textContent = id ? 'EDITAR PRESTADOR' : 'CADASTRO DE PRESTADOR';
  ['errPrestEmpresa','errPrestTipoServico','errPrestEmail'].forEach(function(eId) {
    document.getElementById(eId).classList.remove('visible');
  });
  ['prestEmpresa','prestTipoServico','prestEmail'].forEach(function(fId) {
    document.getElementById(fId).classList.remove('invalid');
  });
  if (id) {
    var p = _prestadores.find(function(x) { return x.id === id; });
    if (p) {
      document.getElementById('editPrestId').value   = p.id;
      document.getElementById('prestEmpresa').value  = p.empresa;
      document.getElementById('prestEndereco').value = p.endereco || '';
      renderPrestadorEmails(p.email || '');
      renderPrestadorTipoServicoOptions(p.tipoServico || '');
    }
  }
  document.getElementById('modalPrestador').classList.add('open');
  setTimeout(function() { document.getElementById('prestEmpresa').focus(); }, 180);
}

function salvarPrestadorApp() {
  var entradaEmail = document.getElementById('prestEmailEntry');
  if (entradaEmail && entradaEmail.value.trim() && !adicionarEmailPrestador()) return;
  var empresa = document.getElementById('prestEmpresa').value.trim();
  var email   = document.getElementById('prestEmail').value.trim();
  var tipoServico = document.getElementById('prestTipoServico').value.trim();
  if (!appRequiredFeedback([
    { input: 'prestEmpresa', error: 'errPrestEmpresa', label: 'Empresa', value: empresa },
    { input: 'prestTipoServico', error: 'errPrestTipoServico', label: 'Tipo de servico', value: tipoServico },
    { input: 'prestEmail', error: 'errPrestEmail', label: 'E-mail', value: email }
  ], { status: 'statusPrest' })) {
    document.getElementById('prestEmailEditor').classList.toggle('invalid', !email);
    return;
  }
  var btn = document.getElementById('btnSalvarPrest');
  var payload = {
    id: document.getElementById('editPrestId').value,
    empresa: empresa,
    endereco: document.getElementById('prestEndereco').value.trim(),
    email: email,
    tipoServico: tipoServico
  };
  appSetButtonBusy(btn, true);
  appServerRun({
    method: 'salvarDadosPrestador',
    args: [payload],
    onSuccess: function(msg) {
      appSetButtonBusy(btn, false);
      appSetStatus('statusPrest', '\u2713 ' + msg, '#137333');
      carregarPrestadores(true);
      setTimeout(function() { fecharOverlay('modalPrestador'); }, 900);
    },
    onFailure: function(e) {
      appSetButtonBusy(btn, false);
      appSetStatus('statusPrest', '\u2717 ' + appErrorMessage(e), '#e53935');
    }
  });
}

function confirmarExcluirPrestador(id, nome) {
  document.getElementById('confirmPrestNome').textContent =
    'Excluir "' + nome + '"? Esta acao nao pode ser desfeita.';
  document.getElementById('btnConfirmExcluirPrest').onclick = function() {
    appServerRun({
      method: 'excluirPrestador',
      args: [id],
      onSuccess: function() {
        fecharOverlay('confirmPrestador');
        carregarPrestadores(true);
        snack('Prestador excluido.');
      },
      onFailure: function(e) { snackErro(e); }
    });
  };
  document.getElementById('confirmPrestador').classList.add('open');
}

var _couriers = [];
var _courierStatusOptions = ['Não Agendado', 'Pendente', 'Agendado', 'Adicionado à Agenda', 'Confirmado', 'Coletado', 'Enviado', 'Entregue', 'Cancelado'];

function renderCouriers(lista) {
  _couriers = lista || [];

function stripHtmlSimple(html) {
  var tmp = document.createElement('div');
  tmp.innerHTML = html || '';
  return (tmp.textContent || tmp.innerText || '').trim();
}

function renderCourierStatusConfirmacaoOptions(currentValue) {
  var sel = ensureCourierStatusConfirmacaoSelect();
  if (!sel) return;
  var current = String(currentValue || sel.value || '').trim();
  var opts = [''].concat(_courierStatusOptions || []);
  if (current && opts.indexOf(current) === -1) opts.push(current);
  sel.innerHTML = opts.map(function(v) {
    return '<option value="' + esc(v) + '"' + (v === current ? ' selected' : '') + '>' + esc(v || '') + '</option>';
  }).join('');
}

function ensureCourierStatusConfirmacaoSelect() {
  var el = document.getElementById('courierStatusConfirmacao');
  if (!el) return null;
  if (String(el.tagName || '').toLowerCase() === 'select') return el;
  var value = String(el.value || '').trim();
  var sel = document.createElement('select');
  sel.id = el.id;
  sel.className = el.className || 'f-input';
  sel.value = value;
  el.parentNode.replaceChild(sel, el);
  return sel;
}

function courierNormNome(v) {
  return String(v || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();
}

function courierConfirmationDefaultFront(nome) {
  var n = courierNormNome(nome);
  if (n.indexOf('marken') >= 0) {
    return {
      monitorConfirmacao: 'Sim',
      emailConfirmacao: 'expobrasil@marken.com',
      textoConfirmacao: 'Confirmamos o agendamento da retirada conforme informações abaixo. || Agendamento da retirada confirmado conforme solicitado.',
      statusConfirmacao: 'Confirmado'
    };
  }
  if (n.indexOf('ocasa') >= 0) {
    return {
      monitorConfirmacao: 'Sim',
      emailConfirmacao: 'ocasa.com',
      textoConfirmacao: 'Informamos que sua coleta foi devidamente agendada. Solicitamos, por gentileza, que verifique atentamente as informações abaixo:',
      statusConfirmacao: 'Confirmado'
    };
  }
  if (n.indexOf('dhl') >= 0) {
    return {
      monitorConfirmacao: 'Sim',
      emailConfirmacao: 'wmxbrasil@dhl.com',
      textoConfirmacao: 'Agendamento realizado para',
      statusConfirmacao: 'Confirmado'
    };
  }
  return {};
}

function courierConfirmationEffective(c) {
  c = c || {};
  var d = courierConfirmationDefaultFront(c.nome || c.courier || '');
  return {
    monitorConfirmacao: c.monitorConfirmacao || d.monitorConfirmacao || '',
    emailConfirmacao: c.emailConfirmacao || d.emailConfirmacao || '',
    textoConfirmacao: c.textoConfirmacao || d.textoConfirmacao || '',
    statusConfirmacao: c.statusConfirmacao || d.statusConfirmacao || '',
    fromDefault: !!d.monitorConfirmacao && (!c.monitorConfirmacao || !c.emailConfirmacao || !c.textoConfirmacao || !c.statusConfirmacao)
  };
}

function courierConfirmationHtml(c) {
  var eff = courierConfirmationEffective(c);
  if (!eff.monitorConfirmacao && !eff.emailConfirmacao && !eff.textoConfirmacao && !eff.statusConfirmacao) return '';
  return [
    eff.monitorConfirmacao ? 'Confirmação: ' + eff.monitorConfirmacao + (eff.fromDefault ? ' (padrão)' : '') : '',
    eff.emailConfirmacao ? 'Remetente: ' + eff.emailConfirmacao : '',
    eff.statusConfirmacao ? 'Status: ' + eff.statusConfirmacao : '',
    eff.textoConfirmacao ? 'Texto: ' + eff.textoConfirmacao : ''
  ].filter(Boolean).map(esc).join('<br>');
}

function _renderTabelaCouriers(lista) {
  var tb = document.getElementById('bodyCouriers');
  if (!lista.length) {
    tb.innerHTML = '<tr class="empty-row"><td colspan="6">Nenhuma courier cadastrada.</td></tr>';
    return;
  }
  tb.innerHTML = lista.map(function(c, index) {
    var ini = c.nome ? c.nome[0].toUpperCase() : 'C';
    var remessa1 = [c.empresa1, c.cnpj1, c.telefone1].filter(Boolean).join(' · ') || '—';
    var remessa2 = [c.empresa2, c.cnpj2, c.telefone2].filter(Boolean).join(' · ') || '—';
    var emails = [
      c.email ? 'Padrão: ' + c.email : '',
      c.emailAmbiente ? 'Ambiente: ' + c.emailAmbiente : '',
      c.emailCongelado ? 'Congelado: ' + c.emailCongelado : '',
      courierConfirmationHtml(c)
    ].filter(Boolean).map(function(item) {
      return item.indexOf('<br>') >= 0 ? item : esc(item);
    }).join('<br>') || '—';
    return '<tr>' +
      '<td><div class="name-cell"><div class="row-avatar">' + esc(ini) + '</div>' +
        '<span class="row-name">' + esc(c.nome || '—') + '</span></div></td>' +
      '<td>' + esc(remessa1) + '<div style="color:var(--text-muted);font-size:11px;margin-top:3px">Fax: ' + esc(c.fax1 || '—') + '</div></td>' +
      '<td>' + esc(remessa2) + '<div style="color:var(--text-muted);font-size:11px;margin-top:3px">Fax: ' + esc(c.fax2 || '—') + '</div></td>' +
      '<td style="font-size:12px;line-height:1.45">' + emails + '</td>' +
      '<td>' + esc(stripHtmlSimple(c.conteudoDeclaracao) || '—') + '</td>' +
      '<td><div class="action-btns">' +
        '<button class="icon-btn" title="Editar" data-record-action="edit" data-record-index="' + index + '"><span class="material-symbols-outlined">edit</span></button>' +
        '<button class="icon-btn del" title="Excluir" data-record-action="delete" data-record-index="' + index + '"><span class="material-symbols-outlined">delete</span></button>' +
      '</div></td>' +
      '</tr>';
  }).join('');
  bindTableRecordActions(tb, lista, {
    edit: function(item) { abrirFormCourier(item.id); },
    delete: function(item) { confirmarExcluirCourier(item.id); }
  });
}

function filtrarCouriers(forceNow) {
  codexRunSearchFilter('searchCouriers', 'couriers', function() {
    var q = ((document.getElementById('searchCouriers') || {}).value || '').toLowerCase();
    _renderTabelaCouriers(!q ? _couriers : _couriers.filter(function(c) {
      return [
        c.id, c.nome, c.empresa1, c.cnpj1, c.telefone1, c.fax1,
        c.empresa2, c.cnpj2, c.telefone2, c.fax2, c.conteudoDeclaracao,
        c.email, c.emailAmbiente, c.emailCongelado, c.monitorConfirmacao,
        c.emailConfirmacao, c.textoConfirmacao, c.statusConfirmacao
      ].join(' ').toLowerCase().indexOf(q) !== -1;
    }));
  }, !!forceNow);
}

function abrirFormCourier(id) {
  var statusConfirmacaoAtual = '';
  ensureCourierStatusConfirmacaoSelect();
  [
    'editCourierId','courierNome','courierEmpresa1','courierCnpj1','courierTelefone1','courierFax1',
    'courierEmpresa2','courierCnpj2','courierTelefone2','courierFax2','courierConteudo',
    'courierEmail','courierEmailAmbiente','courierEmailCongelado','courierMonitorConfirmacao',
    'courierEmailConfirmacao','courierTextoConfirmacao','courierStatusConfirmacao'
  ].forEach(function(fId) { document.getElementById(fId).value = ''; });
  courierEditorSetHtml('');
  document.getElementById('statusCourier').textContent = '';
  document.getElementById('errCourierNome').classList.remove('visible');
  document.getElementById('courierNome').classList.remove('invalid');
  document.getElementById('modalCourierTitle').textContent = id ? 'EDITAR COURIER' : 'CADASTRO DE COURIER';
  if (id) {
    var c = _couriers.find(function(x) { return x.id === id; });
    if (c) {
      document.getElementById('editCourierId').value = c.id || '';
      document.getElementById('courierNome').value = c.nome || '';
      document.getElementById('courierEmpresa1').value = c.empresa1 || '';
      document.getElementById('courierCnpj1').value = c.cnpj1 || '';
      document.getElementById('courierTelefone1').value = c.telefone1 || '';
      document.getElementById('courierFax1').value = c.fax1 || '';
      document.getElementById('courierEmpresa2').value = c.empresa2 || '';
      document.getElementById('courierCnpj2').value = c.cnpj2 || '';
      document.getElementById('courierTelefone2').value = c.telefone2 || '';
      document.getElementById('courierFax2').value = c.fax2 || '';
      courierEditorSetHtml(c.conteudoDeclaracao || '');
      document.getElementById('courierEmail').value = c.email || '';
      document.getElementById('courierEmailAmbiente').value = c.emailAmbiente || '';
      document.getElementById('courierEmailCongelado').value = c.emailCongelado || '';
      document.getElementById('courierMonitorConfirmacao').value = c.monitorConfirmacao || '';
      document.getElementById('courierEmailConfirmacao').value = c.emailConfirmacao || '';
      document.getElementById('courierTextoConfirmacao').value = c.textoConfirmacao || '';
      statusConfirmacaoAtual = c.statusConfirmacao || '';
    }
  }
  renderCourierStatusConfirmacaoOptions(statusConfirmacaoAtual);
  aplicarDefaultsCourierConfirmacao(false);
  renderCourierStatusConfirmacaoOptions(document.getElementById('courierStatusConfirmacao').value);
  document.getElementById('modalCourier').classList.add('open');
  setTimeout(function() { document.getElementById('courierNome').focus(); }, 180);
}

function aplicarDefaultsCourierConfirmacao(force) {
  var nomeEl = document.getElementById('courierNome');
  var infoEl = document.getElementById('courierConfirmacaoDefaultInfo');
  if (!nomeEl) return;
  var d = courierConfirmationDefaultFront(nomeEl.value);
  if (!d.monitorConfirmacao) {
    if (infoEl) infoEl.style.display = 'none';
    return;
  }
  [
    ['courierMonitorConfirmacao', 'monitorConfirmacao'],
    ['courierEmailConfirmacao', 'emailConfirmacao'],
    ['courierTextoConfirmacao', 'textoConfirmacao'],
    ['courierStatusConfirmacao', 'statusConfirmacao']
  ].forEach(function(pair) {
    var el = pair[0] === 'courierStatusConfirmacao' ? ensureCourierStatusConfirmacaoSelect() : document.getElementById(pair[0]);
    if (el && (force || !String(el.value || '').trim())) el.value = d[pair[1]] || '';
  });
  if (infoEl) {
    infoEl.textContent = 'Regra padrão aplicada para esta courier. Os campos podem ser ajustados no próprio cadastro.';
    infoEl.style.display = '';
  }
}

function courierEditorSetHtml(html) {
  var editor = document.getElementById('courierConteudoEditor');
  var hidden = document.getElementById('courierConteudo');
  if (editor) editor.innerHTML = html || '';
  if (hidden) hidden.value = html || '';
}

function courierEditorHtml() {
  var editor = document.getElementById('courierConteudoEditor');
  return editor ? editor.innerHTML.trim() : '';
}

function courierEditorCommand(cmd) {
  var editor = document.getElementById('courierConteudoEditor');
  if (!editor) return;
  editor.focus();
  document.execCommand(cmd, false, null);
  document.getElementById('courierConteudo').value = courierEditorHtml();
}

function courierEditorPastePlain(event) {
  event.preventDefault();
  var text = (event.clipboardData || window.clipboardData).getData('text/plain');
  document.execCommand('insertText', false, text);
}

function salvarCourierApp() {
  var nome = document.getElementById('courierNome').value.trim();
  if (!appRequiredFeedback([
    { input: 'courierNome', error: 'errCourierNome', label: 'Nome', value: nome }
  ], { status: 'statusCourier' })) return;
  var btn = document.getElementById('btnSalvarCourier');
  var payload = {
    id: document.getElementById('editCourierId').value,
    nome: nome,
    empresa1: document.getElementById('courierEmpresa1').value.trim(),
    cnpj1: document.getElementById('courierCnpj1').value.trim(),
    telefone1: document.getElementById('courierTelefone1').value.trim(),
    fax1: document.getElementById('courierFax1').value.trim(),
    empresa2: document.getElementById('courierEmpresa2').value.trim(),
    cnpj2: document.getElementById('courierCnpj2').value.trim(),
    telefone2: document.getElementById('courierTelefone2').value.trim(),
    fax2: document.getElementById('courierFax2').value.trim(),
    conteudoDeclaracao: courierEditorHtml(),
    email: document.getElementById('courierEmail').value.trim(),
    emailAmbiente: document.getElementById('courierEmailAmbiente').value.trim(),
    emailCongelado: document.getElementById('courierEmailCongelado').value.trim(),
    monitorConfirmacao: document.getElementById('courierMonitorConfirmacao').value.trim(),
    emailConfirmacao: document.getElementById('courierEmailConfirmacao').value.trim(),
    textoConfirmacao: document.getElementById('courierTextoConfirmacao').value.trim(),
    statusConfirmacao: (ensureCourierStatusConfirmacaoSelect() || document.getElementById('courierStatusConfirmacao')).value.trim()
  };
  appSetButtonBusy(btn, true);
  appServerRun({
    method: 'salvarCourier',
    args: [payload],
    onSuccess: function(msg) {
      appSetButtonBusy(btn, false);
      appSetStatus('statusCourier', '\u2713 ' + msg, '#137333');
      carregarCouriers(true);
      setTimeout(function() { fecharOverlay('modalCourier'); }, 900);
    },
    onFailure: function(e) {
      appSetButtonBusy(btn, false);
      appSetStatus('statusCourier', '\u2717 ' + appErrorMessage(e), '#e53935');
    }
  });
}

function confirmarExcluirCourier(id) {
  var c = _couriers.find(function(x) { return x.id === id; }) || {};
  document.getElementById('confirmCourierNome').textContent =
    'Excluir "' + (c.nome || id) + '"? Esta acao nao pode ser desfeita.';
  document.getElementById('btnConfirmExcluirCourier').onclick = function() {
    appServerRun({
      method: 'excluirCourier',
      args: [id],
      onSuccess: function() {
        fecharOverlay('confirmCourier');
        carregarCouriers(true);
        snack('Courier excluida.');
      },
      onFailure: function(e) { snackErro(e); }
    });
  };
  document.getElementById('confirmCourier').classList.add('open');
}

</script>
