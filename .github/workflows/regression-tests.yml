name: Testes de regressao

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: regression-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression-tests:
    name: Testes de regressao
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Obter codigo
        uses: actions/checkout@v6

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Executar testes locais simulados
        run: npm test
