  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20;
      font-size: 18px; line-height: 1; vertical-align: middle;
      user-select: none; flex-shrink: 0;
    }
    .ms-filled { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 20; }

    :root {
      --primary: #1266f1; --primary-dark: #0d47a1;
      --primary-light: #e8f0fe; --primary-border: rgba(18,102,241,.18);
      --surface: #ffffff; --bg: #eef1f7;
      --text: #1a1a2e; --text-muted: #5f6b7c; --text-faint: #9aa3b0;
      --border: rgba(0,0,0,.12); --r-sm:6px; --r-md:10px; --r-lg:14px;
      --nav-width: 230px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Roboto', sans-serif; background: var(--bg); color: var(--text); font-size: 13px; display: flex; }

    /* NAV DRAWER */
    .nav-drawer { width: var(--nav-width); background: var(--surface); border-right: 1px solid #e0e6f0; display: flex; flex-direction: column; height: 100vh; flex-shrink: 0; overflow-y: auto; overflow-x: hidden; }
    .nav-brand { padding: 12px 14px; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #eef0f8; flex-shrink: 0; }
    .nav-brand img { height: 38px; width: auto; max-width: 100%; object-fit: contain; }
    .nav-section { font-size: 9.5px; font-weight: 700; letter-spacing: 1.2px; color: var(--text-faint); text-transform: uppercase; padding: 12px 18px 5px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 18px; cursor: pointer; border-radius: 0 24px 24px 0; margin-right: 12px; color: var(--text-muted); font-size: 13px; transition: background .15s; }
    .nav-item:hover { background: var(--primary-light); }
    .nav-item.active { background: #d3e3fd; color: var(--primary); font-weight: 500; }
    .nav-group-toggle { display: grid; grid-template-columns: 22px 1fr 16px; align-items: center; column-gap: 10px; padding: 8px 18px; cursor: pointer; border-radius: 0 24px 24px 0; margin-right: 12px; color: var(--text-muted); font-size: 13px; transition: background .15s; }
    .nav-group-toggle:hover { background: var(--primary-light); }
    .nav-group-toggle.open { color: var(--primary); font-weight: 500; }
    .nav-group-toggle .toggle-left { display: contents; }
    .nav-group-toggle .toggle-arrow { font-size: 16px; transition: transform .2s; color: var(--text-faint); justify-self: center; }
    .nav-group-toggle.open .toggle-arrow { transform: rotate(90deg); }
    .nav-group-body { max-height: 0; overflow: hidden; transition: max-height .3s ease; }
    .nav-group-body.open { max-height: 1000px; overflow: visible; }
    .nav-group-body .nav-item { padding-left: 28px; }
    .nav-icon { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .nav-icon .material-symbols-outlined { font-size: 20px; }
    .nav-badge { margin-left: auto; background: var(--primary); color: #fff; border-radius: 10px; padding: 1px 7px; font-size: 10px; }
    .nav-divider { height: 1px; background: #eef0f8; margin: 5px 0; }
    .mobile-menu-btn { display: none; width: 36px; height: 36px; border: 0; border-radius: var(--r-sm); background: rgba(255,255,255,.14); color: #fff; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
    .mobile-menu-btn .material-symbols-outlined { font-size: 22px; }
    .mobile-nav-backdrop { display: none; position: fixed; inset: 0; background: rgba(15,23,42,.48); z-index: 289; opacity: 0; pointer-events: none; transition: opacity .2s ease; }

    /* MAIN */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .top-bar { background: linear-gradient(135deg, #1a74f5, #0d47a1); padding: 0 22px; display: flex; align-items: center; gap: 14px; flex-shrink: 0; height: 52px; box-shadow: 0 2px 8px rgba(18,102,241,.25); }
    .page-title { font-size: 16px; font-weight: 600; flex: 1; color: #fff; display: flex; align-items: center; gap: 9px; }
    .page-title-icon { width: 30px; height: 30px; background: rgba(255,255,255,.15); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .page-title-icon .material-symbols-outlined { font-size: 17px; color: #fff; }
    #topDate { font-size: 11px; color: rgba(255,255,255,.7); }
    .user-chip { background: rgba(255,255,255,.15); border-radius: 20px; padding: 5px 12px 5px 7px; display: flex; align-items: center; gap: 7px; font-size: 12px; color: rgba(255,255,255,.9); border: 1px solid rgba(255,255,255,.2); }
    .user-avatar { width: 24px; height: 24px; background: rgba(255,255,255,.3); border-radius: 50%; color: #fff; font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; }
    .app-version-chip { color: rgba(255,255,255,.88); background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.18); border-radius: 16px; padding: 4px 9px; font-size: 11px; font-weight: 600; white-space: nowrap; max-width: 180px; overflow: hidden; text-overflow: ellipsis; }

    /* CONTEUDO */
    .content { flex: 1; overflow-y: auto; padding: 20px 22px; }
    .page { display: none; }
    .page.active { display: block; }

    /* STATS */
    .stats-row { display: grid; gap: 0; background: var(--surface); border: 1px solid #e8edf8; border-top: none; overflow: hidden; }
    .stat-card { padding: 16px 20px; border-right: 1px solid #eef0f8; position: relative; transition: background .15s; }
    .stat-card:last-child { border-right: none; }
    .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--accent, var(--primary)); }
    .stat-card:hover { background: #fafbff; }
    .stat-value { font-size: 24px; font-weight: 700; color: var(--accent, var(--primary)); margin-bottom: 2px; }
    .stat-label { font-size: 10.5px; color: var(--text-faint); text-transform: uppercase; letter-spacing: .5px; }
    .stat-icon { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); opacity: .1; color: var(--accent, var(--primary)); }
    .stat-icon .material-symbols-outlined { font-size: 36px; }

    /* SECTION LABEL */
    .section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: var(--primary); margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
    .section-label .material-symbols-outlined { font-size: 14px; }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--primary-border); margin-left: 4px; }

    /* TOOLBAR */
    .toolbar-card { background: var(--surface); border: 1px solid #e8edf8; border-top: none; padding: 12px 16px; display: flex; align-items: center; gap: 10px; }
    .search-wrap { flex: 1; display: flex; align-items: center; background: #f6f8ff; border: 1.5px solid #e0e6f0; border-radius: var(--r-sm); padding: 7px 12px; gap: 8px; transition: border-color .18s, box-shadow .18s; }
    .search-wrap:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(18,102,241,.1); background: #fff; }
    .search-wrap .material-symbols-outlined { color: #9aa3b0; font-size: 17px; }
    .search-wrap input { border: none; outline: none; font-family: 'Roboto', sans-serif; font-size: 13px; color: var(--text); flex: 1; background: transparent; }
    .search-wrap input::placeholder { color: var(--text-faint); }
    .search-clear-btn { width: 24px; height: 24px; border: none; border-radius: 50%; background: transparent; color: #8a94a3; cursor: pointer; display: none; align-items: center; justify-content: center; flex-shrink: 0; padding: 0; transition: background .15s, color .15s; }
    .search-clear-btn.visible { display: flex; }
    .search-clear-btn:hover { background: #e8eef8; color: var(--text); }
    .search-clear-btn .material-symbols-outlined { font-size: 17px; color: inherit; }
    .btn-new { background: var(--primary); color: #fff; border: none; border-radius: var(--r-sm); padding: 8px 16px; font-family: 'Roboto', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 5px; box-shadow: 0 2px 8px rgba(18,102,241,.3); transition: background .15s, box-shadow .15s; white-space: nowrap; }
    .btn-new .material-symbols-outlined { font-size: 18px; color: #fff; }
    .btn-new:hover { background: var(--primary-dark); box-shadow: 0 4px 14px rgba(18,102,241,.4); }

    /* TABELA */
    .table-card { background: var(--surface); border: 1px solid #e8edf8; border-top: none; border-radius: 0 0 var(--r-lg) var(--r-lg); overflow: hidden; }
    .data-table { width: 100%; border-collapse: separate; border-spacing: 0; }
    .data-table th { background: #f6f8ff; padding: 10px 16px; text-align: left; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .9px; color: var(--text-faint); border-bottom: 1px solid #e8edf8; }
    .data-table th:first-child { padding-left: 20px; }
    .data-table td { padding: 12px 16px; border-bottom: 1px solid #f0f4f8; font-size: 13px; vertical-align: middle; color: var(--text); transition: background .1s; }
    .data-table td:first-child { padding-left: 20px; }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: #f6f9ff; }
    .empty-row td, .loading-row td { text-align: center; color: var(--text-faint); padding: 48px; }
    .name-cell { display: flex; align-items: center; gap: 11px; }
    .row-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--primary-light); color: var(--primary); font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: 2px solid rgba(18,102,241,.15); }
    .row-name { font-weight: 500; }
    .chip { display: inline-flex; align-items: center; border-radius: 6px; padding: 4px 10px; font-size: 11.5px; font-weight: 500; white-space: nowrap; }
    .chip-blue  { background: var(--primary-light); color: var(--primary); }
    .chip-green { background: #e6f4ea; color: #137333; }
    .chip-red   { background: #fce8e6; color: #b3261e; }
    .action-btns { display: flex; gap: 5px; justify-content: flex-end; padding-right: 4px; }
    .icon-btn { width: 32px; height: 32px; border-radius: var(--r-sm); border: 1.5px solid #e0e6f0; background: var(--surface); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-muted); transition: all .15s; }
    .icon-btn .material-symbols-outlined { font-size: 16px; }
    .icon-btn:hover { background: var(--primary-light); border-color: #c5d5fb; color: var(--primary); transform: scale(1.08); }
    .icon-btn.del { color: #b3261e; }
    .icon-btn.del:hover { background: #fce8e6; border-color: #f4b5b2; transform: scale(1.08); }

    .expand-btn { width: 28px; height: 28px; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-faint); border-radius: var(--r-sm); transition: all .15s; padding: 0; }
    .expand-btn:hover { background: var(--primary-light); color: var(--primary); }
    .expand-btn .material-symbols-outlined { font-size: 18px; transition: transform .25s; }
    .expand-btn.open .material-symbols-outlined { transform: rotate(90deg); }
    .ped-main td { border-bottom: none !important; }
    .ped-detail { display: none; }
    .ped-detail.open { display: table-row; }
    .ped-detail > td { padding: 0 !important; background: #f8faff; border-bottom: 1px solid #e8edf8 !important; }
    .ped-main.ped-hover td, .ped-detail.ped-hover td { background: #f0f4ff !important; }
    .ped-detail-inner { padding: 8px 0 14px; }
    .ped-detail-grid { display: grid; grid-template-columns: minmax(0, 1fr) 280px; gap: 14px; padding: 0 16px 0 0; }
    .ped-subtable { width: 100%; border-collapse: separate; border-spacing: 0; table-layout: fixed; }
    .ped-subtable thead tr { background: #eef2ff; }
    .ped-subtable th { padding: 7px 16px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--primary); border-top: 1px solid #dde5f8; border-bottom: 1px solid #dde5f8; text-align: left; }
    .ped-subtable td { padding: 9px 16px; font-size: 12px; color: var(--text); border-bottom: 1px solid #f0f4f8; vertical-align: middle; }
    .ped-subtable tr:last-child td { border-bottom: none; }
    .ped-subtable tr:hover td { background: #f4f7ff; }
    .ped-detail-note { border: 1px solid #dde5f8; border-radius: var(--r-md); background: #fff; padding: 12px 14px; min-height: 72px; }
    .ped-detail-note-title { display: flex; align-items: center; gap: 6px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--primary); margin-bottom: 8px; }
    .ped-detail-note-title .material-symbols-outlined { font-size: 15px; }
    .ped-detail-note-body { font-size: 12px; color: var(--text-muted); line-height: 1.45; }
    .sub-empty { padding: 14px 20px; font-size: 12px; color: var(--text-faint); font-style: italic; }
    .chip-yellow { background: #fff3cd; color: #856404; }
    .chip-grey { background: #eeeeee; color: #5f6b7c; }
    .chip-purple { background: #ede7f6; color: #4a148c; }
    .btn-remove-item { width: 26px; height: 26px; border: none; background: none; cursor: pointer; color: #b3261e; display: flex; align-items: center; justify-content: center; border-radius: 4px; transition: background .15s; }
    .btn-remove-item:hover { background: #fce8e6; }
    .btn-remove-item .material-symbols-outlined { font-size: 16px; }
    .pedido-item-form-grid { display: grid; grid-template-columns: minmax(120px, 160px) minmax(280px, 1fr) 80px auto; gap: 10px; align-items: end; margin-bottom: 12px; }
    .mov-form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .mov-form-grid .full { grid-column: 1 / -1; }
    @media (max-width: 760px) { .ped-detail-grid, .pedido-item-form-grid, .mov-form-grid { grid-template-columns: 1fr; } .mov-form-grid .full { grid-column: auto; } }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: flex; align-items: center; justify-content: center; z-index: 200; opacity: 0; pointer-events: none; transition: opacity .2s; }
    #confirmUnsaved { z-index: 340; }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal-box { background: var(--surface); border-radius: 16px; width: 90%; max-width: 560px; max-height: 90vh; overflow-y: auto; transform: scale(.95); transition: transform .2s; box-shadow: 0 8px 32px rgba(0,0,0,.2); }
    .modal-overlay.open .modal-box { transform: scale(1); }
    .modal-header { background: linear-gradient(135deg, #1a74f5, #0d47a1); padding: 16px 22px; display: flex; align-items: center; gap: 12px; border-radius: 16px 16px 0 0; }
    .modal-header-icon { width: 38px; height: 38px; background: rgba(255,255,255,.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .modal-header-icon .material-symbols-outlined { font-size: 20px; color: #fff; }
    .modal-header-title { font-size: 14px; font-weight: 600; color: #fff; }
    .modal-header-sub   { font-size: 11px; color: rgba(255,255,255,.72); margin-top: 2px; }
    .modal-close { margin-left: auto; background: rgba(255,255,255,.15); border: none; color: #fff; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s; }
    .modal-close .material-symbols-outlined { font-size: 18px; color: #fff; }
    .modal-close:hover { background: rgba(255,255,255,.3); }
    .modal-body { padding: 22px; }
    .form-section { background: #f6f8ff; border: 1px solid var(--primary-border); border-radius: var(--r-md); padding: 18px; margin-bottom: 16px; }
    .form-section:last-of-type { margin-bottom: 0; }
    .field-label { display: block; font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .5px; color: var(--text-muted); margin-bottom: 5px; }
    .f-input { display: block; width: 100%; height: 40px; padding: 0 12px; background: #fff; border: 1.5px solid var(--border); border-radius: var(--r-sm); font-family: 'Roboto', sans-serif; font-size: 13px; color: var(--text); outline: none; transition: border-color .18s, box-shadow .18s; }
    .f-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(18,102,241,.14); }
    .f-input.large { height: 44px; font-size: 14px; }
    .f-input::placeholder { color: var(--text-faint); font-size: 12.5px; }
    .f-input.invalid { border-color: #e53935; box-shadow: 0 0 0 3px rgba(229,57,53,.12); }
    .field-error { font-size: 11px; color: #e53935; margin-top: 3px; font-weight: 500; display: none; }
    .field-error.visible { display: block; }
    .required-star { color: #e53935; font-size: 13px; font-weight: 700; margin-left: 2px; }
    .field-row { display: grid; gap: 14px; }
    .field-row.cols-2 { grid-template-columns: 1fr 1fr; }
    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px 16px; align-items: start; }
    .form-grid.single { grid-template-columns: minmax(0, 1fr); }
    .form-grid.cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .form-grid .full { grid-column: 1 / -1; }
    @media (max-width: 760px) { .field-row.cols-2, .form-grid, .form-grid.cols-3 { grid-template-columns: 1fr; } .form-grid .full { grid-column: auto; } }
    .rich-toolbar { display: flex; gap: 6px; margin-bottom: 8px; }
    .rich-btn { width: 34px; height: 32px; border: 1px solid var(--border); border-radius: var(--r-sm); background: #fff; color: var(--text); font-weight: 800; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
    .rich-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
    .rich-editor { min-height: 96px; height: auto; padding: 10px 12px; line-height: 1.45; overflow-y: auto; }
    .rich-editor:empty::before { content: attr(data-placeholder); color: var(--text-faint); font-size: 12.5px; }
    .ac-wrap { position: relative; }
    .ac-list { position: absolute; top: calc(100% + 3px); left: 0; right: 0; background: #fff; border: 1.5px solid var(--primary); border-radius: var(--r-sm); box-shadow: 0 4px 16px rgba(18,102,241,.14); max-height: 200px; overflow-y: auto; z-index: 999; display: none; }
    .ac-list.open { display: block; }
    .ac-item { padding: 9px 12px; font-size: 13px; cursor: pointer; color: var(--text); transition: background .15s; border-bottom: 1px solid rgba(0,0,0,.05); }
    .ac-item:last-child { border-bottom: none; }
    .ac-item:hover, .ac-item.active { background: var(--primary-light); color: var(--primary); }
    .ac-item-main { font-weight: 500; }
    .ac-item-meta { margin-top: 2px; color: var(--text-faint); font-size: 11px; }
    .ac-empty { padding: 10px 12px; font-size: 12px; color: var(--text-faint); font-style: italic; }
    .ac-chevron { position: absolute; right: 11px; top: 50%; transform: translateY(-50%); pointer-events: none; color: #9aa3b0; }
    .ac-chevron .material-symbols-outlined { font-size: 18px; }
    .btn-save { width: 100%; height: 46px; background: var(--primary); color: #fff; border: none; border-radius: var(--r-md); font-family: 'Roboto', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: .8px; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 18px; box-shadow: 0 2px 8px rgba(18,102,241,.32); transition: background .15s, box-shadow .15s, transform .1s; }
    .btn-save .material-symbols-outlined { font-size: 18px; color: #fff; }
    .btn-save:hover { background: var(--primary-dark); box-shadow: 0 4px 16px rgba(18,102,241,.42); }
    .btn-save:active { transform: translateY(1px); }
    .btn-save:disabled { background: #b0bec5; box-shadow: none; cursor: not-allowed; transform: none; }
    .status-msg { text-align: center; font-size: 13px; font-weight: 500; margin-top: 10px; min-height: 18px; }
    .confirm-box { background: var(--surface); border-radius: 16px; padding: 24px; width: 88%; max-width: 340px; transform: scale(.93); transition: transform .2s; }
    .modal-overlay.open .confirm-box { transform: scale(1); }
    .confirm-box h3 { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
    .confirm-box p  { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
    .confirm-actions { display: flex; justify-content: flex-end; gap: 8px; flex-wrap: wrap; }
    .btn-txt { background: transparent; color: var(--primary); border: none; border-radius: 20px; padding: 8px 18px; font-family: 'Roboto', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; }
    .btn-txt:hover { background: var(--primary-light); }
    .btn-danger { background: #b3261e; color: #fff; border: none; border-radius: 20px; padding: 8px 18px; font-family: 'Roboto', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; }
    .btn-danger:hover { background: #8c1a14; }
    .snackbar { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(8px); background: #323232; color: #fff; padding: 11px 20px; border-radius: 8px; font-size: 13px; opacity: 0; transition: all .3s; z-index: 400; white-space: nowrap; pointer-events: none; }
    .snackbar.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .scroll-top-btn { position: fixed; right: 22px; bottom: 24px; width: 44px; height: 44px; border-radius: 50%; border: 1px solid rgba(13,71,161,.14); background: var(--primary); color: #fff; box-shadow: 0 8px 24px rgba(13,71,161,.24); display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 180; opacity: 0; pointer-events: none; transform: translateY(10px); transition: opacity .18s, transform .18s, background .15s, box-shadow .15s; }
    .scroll-top-btn.show { opacity: 1; pointer-events: auto; transform: translateY(0); }
