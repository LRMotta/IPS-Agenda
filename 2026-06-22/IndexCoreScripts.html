function applyAppBootstrapData(data) {
  window.APP_BOOTSTRAP_DATA = data || {};
  CURRENT_ACCESS = window.APP_BOOTSTRAP_DATA.access || CURRENT_ACCESS || {};
  var email = CURRENT_ACCESS.email || 'usuário';
  var displayName = CURRENT_ACCESS.firstName || CURRENT_ACCESS.name || email;
  document.getElementById('userEmail').textContent = displayName + (CURRENT_ACCESS.role ? ' · ' + CURRENT_ACCESS.role : '');
  document.getElementById('userInitial').textContent = String(displayName || email || '?')[0].toUpperCase();
  document.querySelectorAll('.admin-only').forEach(function(el) {
    el.style.display = CURRENT_ACCESS.role === 'admin' ? '' : 'none';
  });
  updateFloatingAddButton();
  if (!CURRENT_ACCESS.ok && CURRENT_ACCESS.message) {
    document.getElementById('userEmail').textContent = 'acesso não validado';
    document.getElementById('userInitial').textContent = '!';
    snack(CURRENT_ACCESS.message);
  }
  handleUserOAuthStatus(window.APP_BOOTSTRAP_DATA.auth);
}

function handleUserOAuthStatus(auth) {
  if (!auth || !auth.required || !auth.url) return;
  var userEl = document.getElementById('userEmail');
  if (userEl) {
    userEl.innerHTML = '<a href="' + esc(auth.url) + '" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;font-weight:800">Autorizar Agenda/Drive</a>';
  }
  snack('Autorize Agenda e Drive para usar os recursos vinculados à sua conta.');
}

function handleAppBootstrapFailure(error) {
  var msg = (error && (error.message || error.toString && error.toString())) || 'Falha ao iniciar o app.';
  var userEl = document.getElementById('userEmail');
  var initialEl = document.getElementById('userInitial');
  var urlMatch = String(msg || '').match(/https:\/\/[^\s"']+/);
  if (userEl && urlMatch) {
    userEl.innerHTML = '<a href="' + esc(urlMatch[0]) + '" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;font-weight:800">Autorizar acesso</a>';
  } else if (userEl) {
    userEl.textContent = 'falha no login';
  }
  if (initialEl) initialEl.textContent = '!';
  snack(msg);
}

function startCodexAppOnce() {
  if (window.APP_BOOTSTRAP_STARTED) return;
  window.APP_BOOTSTRAP_STARTED = true;
  var d = new Date();
  var dias  = ['dom','seg','ter','qua','qui','sex','sáb'];
  var meses = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  document.getElementById('topDate').textContent =
    dias[d.getDay()] + ', ' + d.getDate() + ' ' + meses[d.getMonth()] + ' ' + d.getFullYear();
  google.script.run
    .withSuccessHandler(function(data) {
      applyAppBootstrapData(data);
      irPara('agenda');
    })
    .withFailureHandler(function(error) {
      handleAppBootstrapFailure(error);
      irPara('agenda');
    })
    .getAppBootstrapData();
}

document.addEventListener('DOMContentLoaded', startCodexAppOnce);

function getActiveScrollContainer() {
  var estoqueShell = document.getElementById('estoqueInlineShell');
  var estoquePage = document.getElementById('page-estoque-app');
  if (estoqueShell && estoquePage && estoquePage.classList.contains('active')) return estoqueShell;
  return document.querySelector('.content');
}

function updateScrollTopButton() {
  var btn = document.getElementById('btnScrollTop');
  var scroller = getActiveScrollContainer();
  if (!btn || !scroller) return;
  btn.classList.toggle('show', Number(scroller.scrollTop || 0) > 320);
}

function getFloatingAddConfig() {
  var page = CURRENT_PAGE || '';
  var estoquePage = page === 'estoque-app' ? (_estoqueInlinePagina || 'itens') : '';
  var configs = {
    agenda: { label: 'Novo agendamento', action: function() { toggleAgendaCreate(); } },
    participantes: { label: 'Novo participante', action: function() { abrirFormParticipante(null); } },
    medicos: { label: 'Novo médico', action: function() { abrirFormMedico(null); } },
    projetos: { label: 'Novo projeto', action: function() { abrirFormProjeto(null); } },
    monitores: { label: 'Novo monitor', action: function() { abrirFormMonitor(null); } },
    prestadores: { label: 'Novo prestador', action: function() { abrirFormPrestador(null); } },
    labcentral: { label: 'Novo Lab Central', action: function() { abrirFormLabCentral(null); } },
    couriers: { label: 'Novo courier', action: function() { abrirFormCourier(null); } },
    solicitantes: { label: 'Novo solicitante', action: function() { abrirFormSolicitante(null); } },
    equipamentos: { label: 'Novo equipamento', action: function() { abrirFormEquipamento(null); } },
    medicamentos: { label: 'Novo medicamento', action: function() { abrirFormMedicamento(null); } },
    configuracoes: { label: 'Nova configuração', action: function() { abrirFormConfig(null); } },
    usuarios: { label: 'Novo usuário', adminOnly: true, action: function() { abrirFormUsuarioAdmin(); } }
  };
  if (page === 'estoque-app') {
    if (estoquePage === 'itens') return { label: 'Novo item de estoque', action: function() { abrirFormItemInline(); } };
    if (estoquePage === 'pedidos') return { label: 'Novo pedido', action: function() { abrirFormPedidoInline(); } };
    if (estoquePage === 'movimentacoes') return { label: 'Nova movimentação', action: function() { abrirFormMovInline(); } };
    if (estoquePage === 'descartes') return { label: 'Preparar descarte', action: function() { abrirPlanejamentoDescarteInline(); } };
  }
  return configs[page] || null;
}

function updateFloatingAddButton() {
  var btn = document.getElementById('btnFloatingAdd');
  if (!btn) return;
  var cfg = getFloatingAddConfig();
  var canWrite = CURRENT_ACCESS && CURRENT_ACCESS.ok && CURRENT_ACCESS.canWrite;
  var isAdmin = CURRENT_ACCESS && CURRENT_ACCESS.role === 'admin';
  var estoqueReady = CURRENT_PAGE !== 'estoque-app' || !!_estoqueInlineDados;
  var show = !!cfg && canWrite && (!cfg.adminOnly || isAdmin) && estoqueReady;
  btn.classList.toggle('show', show);
  if (cfg) {
    btn.title = cfg.label;
    btn.setAttribute('aria-label', cfg.label);
  }
}

function handleFloatingAdd() {
  var cfg = getFloatingAddConfig();
  if (!cfg) return;
  if (!(CURRENT_ACCESS && CURRENT_ACCESS.canWrite)) {
    snack('Seu perfil não permite criar registros.');
    updateFloatingAddButton();
    return;
  }
  if (cfg.adminOnly && CURRENT_ACCESS.role !== 'admin') {
    snack('Ação disponível apenas para administradores.');
    updateFloatingAddButton();
    return;
  }
  cfg.action();
}

function scrollAppToTop() {
  var scroller = getActiveScrollContainer();
  if (scroller && typeof scroller.scrollTo === 'function') {
    scroller.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  setTimeout(updateScrollTopButton, 220);
}

function resetAppScrollPosition() {
  var content = document.querySelector('.content');
  if (content) content.scrollTop = 0;
  var estoqueShell = document.getElementById('estoqueInlineShell');
  if (estoqueShell) estoqueShell.scrollTop = 0;
  updateScrollTopButton();
}

function initScrollTopButton() {
  var content = document.querySelector('.content');
  if (content && !content.dataset.scrollTopBound) {
    content.dataset.scrollTopBound = '1';
    content.addEventListener('scroll', updateScrollTopButton, { passive: true });
  }
  updateScrollTopButton();
}

document.addEventListener('DOMContentLoaded', initScrollTopButton);

function toggleNavCadastros() {
  var toggle = document.getElementById('navCadastrosToggle');
  var body = document.getElementById('navCadastrosBody');
  var willOpen = !body.classList.contains('open');
  document.getElementById('navEstoqueToggle').classList.remove('open');
  document.getElementById('navEstoqueBody').classList.remove('open');
  toggle.classList.toggle('open', willOpen);
  body.classList.toggle('open', willOpen);
}

function toggleNavEstoque() {
  var toggle = document.getElementById('navEstoqueToggle');
  var body = document.getElementById('navEstoqueBody');
  var willOpen = !body.classList.contains('open');
  document.getElementById('navCadastrosToggle').classList.remove('open');
  document.getElementById('navCadastrosBody').classList.remove('open');
  toggle.classList.toggle('open', willOpen);
  body.classList.toggle('open', willOpen);
}

function setMobileNav(open) {
  var shouldOpen = !!open && window.matchMedia('(max-width: 900px)').matches;
  document.body.classList.toggle('mobile-nav-open', shouldOpen);
  var btn = document.getElementById('mobileMenuBtn');
  var backdrop = document.getElementById('mobileNavBackdrop');
  var drawer = document.getElementById('appNavDrawer');
  if (backdrop) backdrop.setAttribute('aria-hidden', shouldOpen ? 'false' : 'true');
  if (drawer) drawer.setAttribute('aria-hidden', shouldOpen ? 'false' : (window.matchMedia('(max-width: 900px)').matches ? 'true' : 'false'));
  if (btn) {
    btn.setAttribute('aria-expanded', shouldOpen ? 'true' : 'false');
    btn.setAttribute('aria-label', shouldOpen ? 'Fechar menu' : 'Abrir menu');
    btn.title = shouldOpen ? 'Fechar menu' : 'Abrir menu';
    var icon = btn.querySelector('.material-symbols-outlined');
    if (icon) icon.textContent = shouldOpen ? 'close' : 'menu';
  }
}

function toggleMobileNav() {
  setMobileNav(!document.body.classList.contains('mobile-nav-open'));
}

function closeMobileNav() {
  setMobileNav(false);
}

document.addEventListener('keydown', function(event) {
  if (event.key === 'Escape' && document.body.classList.contains('mobile-nav-open')) closeMobileNav();
});

window.addEventListener('resize', function() {
  if (!window.matchMedia('(max-width: 900px)').matches) closeMobileNav();
  else if (!document.body.classList.contains('mobile-nav-open')) setMobileNav(false);
});

document.addEventListener('DOMContentLoaded', function() { setMobileNav(false); });

function irPara(pagina) {
  closeMobileNav();
  CURRENT_PAGE = pagina || 'agenda';
  document.querySelectorAll('.nav-item').forEach(function(el) { el.classList.remove('active'); });
  document.querySelectorAll('.nav-group-toggle').forEach(function(el) { el.classList.remove('open'); });
  document.querySelectorAll('.nav-group-body').forEach(function(el) { el.classList.remove('open'); });
  document.querySelectorAll('.nav-item').forEach(function(el) {
    var oc = el.getAttribute('onclick') || '';
    if (oc.indexOf("'" + pagina + "'") !== -1) el.classList.add('active');
  });
  var cadastros = ['participantes', 'medicos', 'projetos', 'monitores', 'prestadores', 'labcentral', 'couriers', 'solicitantes', 'equipamentos', 'medicamentos'];
  if (cadastros.indexOf(pagina) !== -1) {
    document.getElementById('navCadastrosToggle').classList.add('open');
    document.getElementById('navCadastrosBody').classList.add('open');
  }
  if (pagina === 'estoque-view') {
    document.getElementById('navEstoqueToggle').classList.add('open');
    document.getElementById('navEstoqueBody').classList.add('open');
  }
  document.querySelectorAll('.page').forEach(function(el) { el.classList.remove('active'); });
  var pg = document.getElementById('page-' + pagina);
  if (pg) pg.classList.add('active');
  resetAppScrollPosition();
  var t = TITULOS[pagina] || { label:'Agenda', icon:'calendar_today' };
  document.getElementById('topTitle').textContent = t.label;
  document.getElementById('topIcon').textContent  = t.icon;
  if (pagina === 'participantes') carregarParticipantes();
  if (pagina === 'medicos') carregarMedicos();
  if (pagina === 'solicitantes') carregarSolicitantes();
  if (pagina === 'projetos') carregarProjetos();
  if (pagina === 'monitores') carregarMonitores();
  if (pagina === 'prestadores') carregarPrestadores();
  if (pagina === 'labcentral') carregarLabCentral();
  if (pagina === 'couriers') carregarCouriers();
  if (pagina === 'equipamentos') carregarEquipamentos();
  if (pagina === 'medicamentos') carregarMedicamentos();
  if (pagina === 'configuracoes') carregarConfigApp();
  if (pagina === 'pendencias') carregarPendencias(false);
  if (pagina === 'usuarios') carregarUsersAdmin();
  if (pagina === 'audit-log') carregarAuditLog();
  if (pagina === 'dashboard') carregarDashboard(false);
  if (pagina === 'requisicao') {
    _rqAgendaOrigemId = '';
    _rqOrigemContext = null;
    initRequisicao();
  }
  if (pagina === 'estoque-view') carregarEstoqueView();
  if (pagina === 'agenda') initAgendaV1();
  updateFloatingAddButton();
}

function transporteLoadingHtml() {
  return '<!doctype html><html><head><meta charset="utf-8"><title>Preparando transporte</title>' +
    '<style>body{font-family:Arial,sans-serif;margin:0;min-height:100vh;display:grid;place-items:center;background:#f6f8fb;color:#1f2937}' +
    '.box{background:#fff;border:1px solid #d8e2f0;border-radius:8px;padding:26px 30px;box-shadow:0 8px 24px rgba(15,23,42,.08);max-width:420px;text-align:center}' +
    '.spin{width:28px;height:28px;border:3px solid #d8e2f0;border-top-color:#1266f1;border-radius:50%;animation:s 1s linear infinite;margin:0 auto 14px}@keyframes s{to{transform:rotate(360deg)}}' +
    'h1{font-size:18px;margin:0 0 8px}p{font-size:13px;color:#64748b;margin:0;line-height:1.45}</style></head><body>' +
    '<div class="box"><div class="spin"></div><h1>Preparando documentação</h1><p>Os dados da Agenda estão sendo enviados para o módulo de Transporte.</p></div>' +
    '</body></html>';
}

function transporteErrorHtml(message) {
  return '<!doctype html><html><head><meta charset="utf-8"><title>Falha no transporte</title>' +
    '<style>body{font-family:Arial,sans-serif;margin:0;min-height:100vh;display:grid;place-items:center;background:#fff8f8;color:#1f2937}' +
    '.box{background:#fff;border:1px solid #f3b9b3;border-radius:8px;padding:26px 30px;max-width:520px;text-align:center}' +
    'h1{font-size:18px;margin:0 0 8px;color:#b3261e}p{font-size:13px;color:#5f6b7c;margin:0;line-height:1.45;white-space:pre-wrap}</style></head><body>' +
    '<div class="box"><h1>Não foi possível preparar o transporte</h1><p>' + esc(message || 'Erro desconhecido.') + '</p></div>' +
    '</body></html>';
}

function prepararJanelaTransporte() {
  var w = null;
  try {
    w = window.open('', '_blank');
    if (w) {
      w.document.open();
      w.document.write(transporteLoadingHtml());
      w.document.close();
    }
  } catch (e) {
    w = null;
  }
  return w;
}

function atualizarJanelaTransporteErro(w, message) {
  if (!w || w.closed) return;
  try {
    w.document.open();
    w.document.write(transporteErrorHtml(message));
    w.document.close();
  } catch (e) {}
}

function abrirTransporteModulo(targetWindow) {
  var bootstrapUrl = window.APP_BOOTSTRAP_DATA && window.APP_BOOTSTRAP_DATA.webAppUrl;
  if (bootstrapUrl) {
    var url = String(bootstrapUrl) + '?page=transporte';
    if (targetWindow && !targetWindow.closed) targetWindow.location.href = url;
    else window.open(url, '_blank');
    return;
  }
  google.script.run
    .withSuccessHandler(function(url) {
      var targetUrl = String(url || '') + '?page=transporte';
      if (targetWindow && !targetWindow.closed) targetWindow.location.href = targetUrl;
      else window.open(targetUrl, '_blank');
    })
    .withFailureHandler(function(e) {
      var msg = e && e.message ? e.message : String(e);
      atualizarJanelaTransporteErro(targetWindow, msg);
      snackErro(msg);
    })
    .getWebAppUrl();
}

function carregarUsersAdmin() {
  var tb = document.getElementById('bodyUsersAdmin');
  if (tb) tb.innerHTML = '<tr class="loading-row"><td colspan="5"><div class="spinner"></div>Carregando…</td></tr>';
  google.script.run
    .withSuccessHandler(function(rows) {
      USERS_ADMIN_ROWS = rows || [];
      renderUsersAdmin();
    })
    .withFailureHandler(function(e) {
      if (tb) tb.innerHTML = '<tr class="empty-row"><td colspan="5">Erro: ' + esc(e.message || e) + '</td></tr>';
    })
    .getUsersAdminList();
}

function renderUsersAdmin() {
  var rows = USERS_ADMIN_ROWS || [];
  var qEl = document.getElementById('searchUsersAdmin');
  var q = norm(qEl ? qEl.value : '');
  var filtered = rows.filter(function(u) {
    return !q || norm([u.name, u.firstName, u.email, u.role, u.ativo].join(' ')).indexOf(q) >= 0;
  });
  var total = rows.length;
  var ativos = rows.filter(function(u) { return u.ativo === 'Sim'; }).length;
  var admins = rows.filter(function(u) { return u.role === 'admin' && u.ativo === 'Sim'; }).length;
  var totalEl = document.getElementById('usersTotal');
  var ativosEl = document.getElementById('usersAtivos');
  var adminsEl = document.getElementById('usersAdmins');
  if (totalEl) totalEl.textContent = total;
  if (ativosEl) ativosEl.textContent = ativos;
  if (adminsEl) adminsEl.textContent = admins;
  var tb = document.getElementById('bodyUsersAdmin');
  if (!tb) return;
  if (!filtered.length) {
    tb.innerHTML = '<tr class="empty-row"><td colspan="5">Nenhum usuário encontrado.</td></tr>';
    return;
  }
  tb.innerHTML = filtered.map(function(u) {
    var ativo = u.ativo === 'Sim';
    var roleCls = u.role === 'admin' ? 'chip-blue' : (u.role === 'readonly' ? 'chip-yellow' : 'chip-green');
    var name = u.name || u.firstName || '—';
    var initial = (u.firstName || u.name || u.email || '?')[0].toUpperCase();
    return '<tr>' +
      '<td><div class="name-cell"><div class="row-avatar">' + esc(initial) + '</div><span class="row-name">' + esc(name) + '</span></div></td>' +
      '<td style="color:#5f6b7c;">' + esc(u.email) + '</td>' +
      '<td><span class="chip ' + roleCls + '">' + esc(u.role) + '</span></td>' +
      '<td><span class="chip ' + (ativo ? 'chip-green' : 'chip-red') + '">' + (ativo ? 'Ativo' : 'Inativo') + '</span></td>' +
      '<td><div class="action-btns">' +
        '<button class="icon-btn" title="Editar" onclick="abrirFormUsuarioAdmin(' + Number(u.rowIndex || 0) + ')"><span class="material-symbols-outlined">edit</span></button>' +
        (ativo ? '<button class="icon-btn del" title="Inativar" onclick="confirmarInativarUsuarioAdmin(' + Number(u.rowIndex || 0) + ',\'' + esc(u.email).replace(/'/g, '&#39;') + '\')"><span class="material-symbols-outlined">person_off</span></button>' : '') +
      '</div></td>' +
    '</tr>';
  }).join('');
}

function abrirFormUsuarioAdmin(rowIndex) {
  var u = rowIndex ? (USERS_ADMIN_ROWS || []).find(function(x) { return Number(x.rowIndex) === Number(rowIndex); }) : null;
  document.getElementById('modalUsuarioAdminTitle').textContent = u ? 'EDITAR USUÁRIO' : 'NOVO USUÁRIO';
  document.getElementById('userAdminRowIndex').value = u ? u.rowIndex : '';
  document.getElementById('userAdminNome').value = u ? (u.name || '') : '';
  document.getElementById('userAdminEmail').value = u ? u.email : '';
  document.getElementById('userAdminRole').value = u ? u.role : 'user';
  document.getElementById('userAdminAtivo').value = u ? u.ativo : 'Sim';
  document.getElementById('statusUsuarioAdmin').textContent = '';
  document.getElementById('errUserAdminEmail').classList.remove('show');
  abrirOverlay('modalUsuarioAdmin');
}

function salvarUsuarioAdminApp() {
  var emailEl = document.getElementById('userAdminEmail');
  var email = (emailEl.value || '').trim().toLowerCase();
  var valido = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  var err = document.getElementById('errUserAdminEmail');
  if (err) err.classList.toggle('show', !valido);
  if (!valido) return;
  var btn = document.getElementById('btnSalvarUsuarioAdmin');
  var old = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<span class="material-symbols-outlined">hourglass_empty</span> Salvando...';
  google.script.run
    .withSuccessHandler(function() {
      btn.disabled = false;
      btn.innerHTML = old;
      fecharOverlay('modalUsuarioAdmin');
      snack('Usuário salvo com sucesso.');
      carregarUsersAdmin();
    })
    .withFailureHandler(function(e) {
      btn.disabled = false;
      btn.innerHTML = old;
      document.getElementById('statusUsuarioAdmin').innerHTML = '<span style="color:#b3261e">' + esc(e.message || e) + '</span>';
    })
    .salvarUsuarioAdmin({
      rowIndex: document.getElementById('userAdminRowIndex').value,
      name: document.getElementById('userAdminNome').value.trim(),
      email: email,
      role: document.getElementById('userAdminRole').value,
      ativo: document.getElementById('userAdminAtivo').value
    });
}

function confirmarInativarUsuarioAdmin(rowIndex, email) {
  abrirConfirmacaoDestrutiva({
    titulo: 'Confirmar inativação',
    mensagem: 'Deseja inativar o acesso de "' + email + '"?',
    acao: 'Inativar',
    onConfirm: function() {
      google.script.run
        .withSuccessHandler(function() {
          snack('Usuário inativado.');
          carregarUsersAdmin();
        })
        .withFailureHandler(function(e) { snackErro(e.message || e); })
        .inativarUsuarioAdmin(rowIndex);
    }
  });
}

function carregarAuditLog() {
  var tb = document.getElementById('bodyAuditLog');
  if (tb) tb.innerHTML = '<tr class="loading-row"><td colspan="6"><div class="spinner"></div>Carregando…</td></tr>';
  var limitEl = document.getElementById('auditLimit');
  var limit = limitEl ? Number(limitEl.value || 200) : 200;
  google.script.run
    .withSuccessHandler(function(data) {
      data = data || {};
      AUDIT_LOG_ROWS = data.log || [];
      AUDIT_CHANGES_ROWS = data.changes || [];
      renderAuditLog();
    })
    .withFailureHandler(function(e) {
      if (tb) tb.innerHTML = '<tr class="empty-row"><td colspan="6">Erro: ' + esc(e.message || e) + '</td></tr>';

    .getAuditData(limit);
}

function setAuditView(view) {

}

function renderAuditLog() {
  var isChanges = AUDIT_VIEW === 'changes';
  var rows = isChanges ? (AUDIT_CHANGES_ROWS || []) : (AUDIT_LOG_ROWS || []);
  var qEl = document.getElementById('searchAudit');
  var q = norm(qEl ? qEl.value : '');
  var filtered = rows.filter(function(r) {
    if (!q) return true;
    return norm([
      r.id, r.email, r.action, r.timestamp, r.module, r.recordId,
      r.field, r.oldValue, r.newValue, r.note
    ].join(' ')).indexOf(q) !== -1;
  });
  var users = {};
  var modules = {};
  rows.forEach(function(r) {
    if (r.email) users[r.email] = true;
    if (r.module) modules[r.module] = true;
  });
  var tabLog = document.getElementById('auditTabLog');
  var tabChanges = document.getElementById('auditTabChanges');
  if (tabLog) tabLog.classList.toggle('active', !isChanges);
  if (tabChanges) tabChanges.classList.toggle('active', isChanges);
  document.getElementById('auditTotal').textContent = rows.length;
  document.getElementById('auditTotalLabel').textContent = isChanges ? 'Alterações carregadas' : 'Registros carregados';
  document.getElementById('auditUsers').textContent = Object.keys(users).length;
  document.getElementById('auditModules').textContent = Object.keys(modules).length;
  var head = document.getElementById('headAuditLog');
  var tb = document.getElementById('bodyAuditLog');
  if (!tb) return;
  if (head) {
    head.innerHTML = isChanges
      ? '<tr><th>Data/Hora</th><th>Usuário</th><th>Módulo</th><th>Ação</th><th>ID registro</th><th>Campo</th><th>Antes</th><th>Depois</th><th>Observação</th></tr>'
      : '<tr><th>ID Audit</th><th>E-mail do usuário</th><th>Ação executada</th><th>Data/Hora</th><th>Módulo</th><th>ID do registro</th></tr>';
  }
  if (!filtered.length) {
    tb.innerHTML = '<tr class="empty-row"><td colspan="' + (isChanges ? 9 : 6) + '">Nenhum registro encontrado.</td></tr>';
    return;
  }
  tb.innerHTML = isChanges ? filtered.map(function(r) {
    return '<tr>' +
      '<td>' + esc(r.timestamp) + '</td>' +
      '<td>' + esc(r.email) + '</td>' +
      '<td><span class="audit-pill">' + esc(r.module || 'Sistema') + '</span></td>' +
      '<td>' + esc(r.action) + '</td>' +
      '<td><span class="audit-muted">' + esc(r.recordId || '') + '</span></td>' +
      '<td>' + esc(r.field || '') + '</td>' +
      '<td>' + esc(r.oldValue || '') + '</td>' +
      '<td>' + esc(r.newValue || '') + '</td>' +
      '<td>' + esc(r.note || '') + '</td>' +
      '</tr>';
  }).join('') : filtered.map(function(r) {
    return '<tr>' +
      '<td><span class="audit-muted">' + esc(r.id) + '</span></td>' +
      '<td>' + esc(r.email) + '</td>' +
      '<td>' + esc(r.action) + '</td>' +
      '<td>' + esc(r.timestamp) + '</td>' +
      '<td><span class="audit-pill">' + esc(r.module || 'Sistema') + '</span></td>' +

function configValoresUnicos(bloco, grupo) {
  var seen = {};
  return _configApp.filter(function(i) {
    return (!bloco || i.bloco === bloco) && (!grupo || i.grupo === grupo);
  }).map(function(i) {
    return grupo ? i.chave : i.grupo;
  }).filter(function(v) {
    v = String(v || '').trim();
    if (!v || seen[v]) return false;
    seen[v] = 1;
    return true;
  }).sort(function(a, b) { return a.localeCompare(b); });
}

function preencherSelectConfig(id, valores, selected, placeholder) {
  var el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = '<option value="">' + (placeholder || '— Selecione —') + '</option>' +
    (valores || []).map(function(v) {
      return '<option value="' + esc(v) + '">' + esc(v) + '</option>';
    }).join('');
  el.value = selected || '';
  if (selected && el.value !== selected) {
    var opt = document.createElement('option');
    opt.value = selected;
    opt.textContent = selected;
    el.appendChild(opt);
    el.value = selected;
  }
}

function onConfigBlocoChange(selectedGrupo, selectedChave) {
  var bloco = document.getElementById('cfgBloco').value || 'Principal';
  preencherSelectConfig('cfgGrupo', configValoresUnicos(bloco), selectedGrupo || '', '— Selecione —');
  onConfigGrupoChange(selectedChave);
}

function onConfigGrupoChange(selectedChave) {
  var bloco = document.getElementById('cfgBloco').value || 'Principal';
  var grupo = document.getElementById('cfgGrupo').value || '';
  preencherSelectConfig('cfgChave', grupo ? configValoresUnicos(bloco, grupo) : [], selectedChave || '', grupo ? '— Selecione —' : '— Selecione o grupo primeiro —');
}

function abrirFormConfig(item) {
  if (typeof item === 'string') item = JSON.parse(item);
  item = item || {};
  document.getElementById('modalCfgTitle').textContent = item.rowIndex ? 'EDITAR CONFIGURAÇÃO' : 'NOVA CONFIGURAÇÃO';
  document.getElementById('cfgRowIndex').value = item.rowIndex || '';
  document.getElementById('cfgStartCol').value = item.startCol || '';
  document.getElementById('cfgBloco').value = item.bloco || 'Principal';
  document.getElementById('cfgBloco').disabled = !!item.rowIndex;
  document.getElementById('cfgAtivo').value = item.ativo || 'Sim';
  onConfigBlocoChange(item.grupo || '', item.chave || '');
  document.getElementById('cfgValor').value = item.valor || '';
  document.getElementById('cfgOrdem').value = item.ordem || '';
  document.getElementById('cfgObs').value = item.observacao || '';

  ['errCfgGrupo','errCfgChave','errCfgValor'].forEach(function(id) { document.getElementById(id).classList.remove('visible'); });
  document.getElementById('statusCfg').innerHTML = '';
  document.getElementById('btnSalvarCfg').disabled = false;
  abrirOverlay('modalConfig');
}

function salvarConfigApp() {
  var grupo = document.getElementById('cfgGrupo').value.trim();
  var chave = document.getElementById('cfgChave').value.trim();
  var valor = document.getElementById('cfgValor').value.trim();
  var ok = true;
  if (!grupo) { document.getElementById('cfgGrupo').classList.add('invalid'); document.getElementById('errCfgGrupo').classList.add('visible'); ok = false; }
  if (!chave) { document.getElementById('cfgChave').classList.add('invalid'); document.getElementById('errCfgChave').classList.add('visible'); ok = false; }
  if (!valor) { document.getElementById('cfgValor').classList.add('invalid'); document.getElementById('errCfgValor').classList.add('visible'); ok = false; }
  if (!ok) return;
  var btn = document.getElementById('btnSalvarCfg');
  btn.disabled = true;
  document.getElementById('statusCfg').innerHTML = '<span style="color:#5f6b7c;">Processando…</span>';
  google.script.run
    .withSuccessHandler(function(r) {
      btn.disabled = false;
      document.getElementById('statusCfg').innerHTML = '';
      fecharOverlay('modalConfig');
      snack(r || 'Configuração salva.');
      _estoqueConfigLoaded = false;
      invalidarAgendaConfigCache();
      carregarConfigApp();
    })
    .withFailureHandler(function(e) {
      btn.disabled = false;
      document.getElementById('statusCfg').innerHTML = '<span style="color:#e53935;">' + esc(e.message) + '</span>';
    })
    .salvarConfigAppItem({
      rowIndex: document.getElementById('cfgRowIndex').value,
      startCol: document.getElementById('cfgStartCol').value,
      bloco: document.getElementById('cfgBloco').value,
      grupo: grupo,
      chave: chave,
      valor: valor,
      ativo: document.getElementById('cfgAtivo').value,
      ordem: document.getElementById('cfgOrdem').value,
      observacao: document.getElementById('cfgObs').value.trim()
    });
}

function confirmarExcluirConfig(rowIndex, startCol, valor) {
  abrirConfirmacaoDestrutiva({
    mensagem: 'Deseja excluir "' + valor + '"? Configurações padrão serão desativadas para não voltarem automaticamente.',
    onConfirm: function() {
      google.script.run
        .withSuccessHandler(function(r) {
          snack(r || 'Configuração excluída.');
          _estoqueConfigLoaded = false;
          invalidarAgendaConfigCache();
          carregarConfigApp();
        })
        .withFailureHandler(function(e) { snack('Erro: ' + e.message); })
        .excluirConfigAppItem(rowIndex, startCol);
    }
  });
}

function normSimNao(v) {
  return String(v || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();
}

function simNaoChip(v) {
  var txt = v || 'Não';
  var cls = normSimNao(txt) === 'sim' ? 'chip-green' : 'chip-grey';
  return '<span class="chip ' + cls + '">' + esc(txt) + '</span>';
}

function normSelectValue(v) {
  return String(v || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();
}

function fillSelectOptions(id, lista, selected, placeholder) {
    var el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = '<option value="">' + (placeholder || '— Selecione —') + '</option>';
    var selectedTxt = String(selected || '').trim();
    var selectedValue = selectedTxt;
    var hasSelected = !selectedTxt;
    (lista || []).forEach(function(v) {
      var val = typeof v === 'string' ? v : (v.nomeAbreviado || v.codigo || v.nome || '');
      val = String(val || '').trim();
      if (!val) return;
      if (selectedTxt && normSelectValue(val) === normSelectValue(selectedTxt)) {
        hasSelected = true;
        selectedValue = val;
      }
      var opt = document.createElement('option');
      opt.value = val;
      opt.textContent = val;
      el.appendChild(opt);
    });
    if (selectedTxt && !hasSelected) {
      var optSel = document.createElement('option');
      optSel.value = selectedTxt;
      optSel.textContent = selectedTxt;
      el.appendChild(optSel);
    }
  el.value = selectedValue;
  }

var _itemAutocompleteActive = { equipamento: -1, medicamento: -1 };

function itemAutocompleteConfig(tipo) {
  return tipo === 'equipamento'
    ? { inputId: 'eqDescricao', listId: 'eqDescricaoList', projectId: 'eqProjeto', items: _equipamentos }
    : { inputId: 'medDescricao', listId: 'medDescricaoList', projectId: 'medProjeto', items: _medicamentos };
}

function sugestoesItem(tipo) {
  var cfg = itemAutocompleteConfig(tipo);
  var input = document.getElementById(cfg.inputId);
  var project = document.getElementById(cfg.projectId);
  var query = normSelectValue(input ? input.value : '');
  var projetoSelecionado = normSelectValue(project ? project.value : '');
  var vistos = {};
  return (cfg.items || []).filter(function(item) {
    var descricao = String(item.descricao || '').trim();
    if (!descricao) return false;
    if (projetoSelecionado && normSelectValue(item.projeto) !== projetoSelecionado) return false;
    if (query && normSelectValue(descricao).indexOf(query) < 0) return false;
    var chave = normSelectValue(descricao) + '|' + normSelectValue(item.projeto);
    if (vistos[chave]) return false;
    vistos[chave] = true;
    return true;
  }).slice(0, 10);
}

function mostrarSugestoesItem(tipo) {
  var cfg = itemAutocompleteConfig(tipo);
  var list = document.getElementById(cfg.listId);
  if (!list) return;
  var sugestoes = sugestoesItem(tipo);
  list.innerHTML = '';
  _itemAutocompleteActive[tipo] = -1;
  if (!sugestoes.length) {
    list.classList.remove('open');
    return;
  }
  sugestoes.forEach(function(item) {
    var option = document.createElement('div');
    option.className = 'ac-item';
    option._cadastroItem = item;
    var main = document.createElement('div');
    main.className = 'ac-item-main';
    main.textContent = item.descricao || '';
    var meta = document.createElement('div');
    meta.className = 'ac-item-meta';
    meta.textContent = item.projeto || 'Projeto não informado';
    option.appendChild(main);
    option.appendChild(meta);
    option.onmousedown = function(event) {
      event.preventDefault();
      aplicarSugestaoItem(tipo, item);
    };
    list.appendChild(option);
  });
  list.classList.add('open');
}

function navegarSugestoesItem(event, tipo) {
  var cfg = itemAutocompleteConfig(tipo);
  var list = document.getElementById(cfg.listId);
  if (!list || !list.classList.contains('open')) {
    if (event.key === 'ArrowDown') mostrarSugestoesItem(tipo);
    return;
  }
  var options = list.querySelectorAll('.ac-item');
  if (!options.length) return;
  var active = _itemAutocompleteActive[tipo];
  if (event.key === 'ArrowDown') active = Math.min(active + 1, options.length - 1);
  else if (event.key === 'ArrowUp') active = Math.max(active - 1, 0);
  else if (event.key === 'Enter' && active >= 0) {
    event.preventDefault();
    aplicarSugestaoItem(tipo, options[active]._cadastroItem);
    return;
  } else if (event.key === 'Escape') {
    list.classList.remove('open');
    return;
  } else return;
  event.preventDefault();
  _itemAutocompleteActive[tipo] = active;
  Array.prototype.forEach.call(options, function(option, index) {
    option.classList.toggle('active', index === active);
  });
  options[active].scrollIntoView({ block: 'nearest' });
}

function fecharSugestoesItemDepois(tipo) {
  setTimeout(function() {
    var list = document.getElementById(itemAutocompleteConfig(tipo).listId);
    if (list) list.classList.remove('open');
  }, 120);
}

function aplicarSugestaoItem(tipo, item) {
  item = item || {};
  var cfg = itemAutocompleteConfig(tipo);
  document.getElementById(cfg.inputId).value = item.descricao || '';
  if (tipo === 'equipamento') {
    fillSelectOptions('eqProjeto', _equipProjetos, item.projeto, '— Selecione —');
    fillSelectOptions('eqResponsavelReceb', _equipSolicitantes, item.responsavelRecebimento, '— Selecione —');
    fillSelectOptions('eqLocalizacao', ESTOQUE_CONFIG.localizacoes || [], item.localizacao, '— Selecione —');
    document.getElementById('eqCadastroUcs').value = item.cadastroUcs || 'Sim';
    document.getElementById('eqRegistroRm').value = item.registroRm || 'Não';
    document.getElementById('eqRemetente').value = item.remetente || '';
    document.getElementById('eqCodigoTotvs').value = item.codigoTotvs || '';
  } else {
    fillSelectOptions('medProjeto', _medProjetos, item.projeto, '— Selecione —');
    fillSelectOptions('medResponsavelReceb', _medSolicitantes, item.responsavelRecebimento, '— Selecione —');
    fillSelectOptions('medLocalizacao', ESTOQUE_CONFIG.localizacoes || [], item.localizacao, '— Selecione —');
    document.getElementById('medRegistroRm').value = item.registroRm || 'Não';
    document.getElementById('medRemetente').value = item.remetente || '';
  }
  limparErro(cfg.inputId, tipo === 'equipamento' ? 'errEqDescricao' : 'errMedDescricao');
  var list = document.getElementById(cfg.listId);
  if (list) list.classList.remove('open');
}

function abrirFormEquipamento(e) {
  if (typeof e === 'string') e = JSON.parse(e);
  e = e || {};
  document.getElementById('modalEqTitle').textContent = e._duplicando ? 'DUPLICAR EQUIPAMENTO' : (e.rowIndex ? 'EDITAR EQUIPAMENTO' : 'NOVO EQUIPAMENTO');
  document.getElementById('eqRowIndex').value = e.rowIndex || '';
  fillSelectOptions('eqProjeto', _equipProjetos, e.projeto, '— Selecione —');
  fillSelectOptions('eqResponsavelReceb', _equipSolicitantes, e.responsavelRecebimento, '— Selecione —');

function dateFromISO(iso) {
  if (!iso) return null;
  var p = String(iso).split('-');
  if (p.length !== 3) return null;
  var d = new Date(Number(p[0]), Number(p[1]) - 1, Number(p[2]));
  return isNaN(d.getTime()) ? null : d;
}

function formatDateBr(dateString) {
  if (!dateString) return '';
  var meses = ['jan.', 'fev.', 'mar.', 'abr.', 'mai.', 'jun.', 'jul.', 'ago.', 'set.', 'out.', 'nov.', 'dez.'];
  var raw = String(dateString).trim();
  var m = raw.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (m) return ('0' + Number(m[3])).slice(-2) + '/' + meses[Number(m[2]) - 1] + '/' + m[1];
  m = raw.toLowerCase().match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) return ('0' + Number(m[1])).slice(-2) + '/' + meses[Number(m[2]) - 1] + '/' + m[3];
  m = raw.toLowerCase().match(/^(\d{1,2})\/([a-z.]{3,5})\/(\d{4})$/);
  if (m) {
    var mapa = { 'jan':1,'jan.':1,'fev':2,'fev.':2,'mar':3,'mar.':3,'abr':4,'abr.':4,'mai':5,'mai.':5,'jun':6,'jun.':6,'jul':7,'jul.':7,'ago':8,'ago.':8,'set':9,'set.':9,'out':10,'out.':10,'nov':11,'nov.':11,'dez':12,'dez.':12 };
    var mes = mapa[m[2]];
    return mes ? ('0' + Number(m[1])).slice(-2) + '/' + meses[mes - 1] + '/' + m[3] : raw;
  }
  var d = new Date(raw);
  return isNaN(d.getTime()) ? raw : ('0' + d.getDate()).slice(-2) + '/' + meses[d.getMonth()] + '/' + d.getFullYear();
}

function dateToInputValue(dateString) {
  if (!dateString) return '';
  var raw = String(dateString).trim();
  var m = raw.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (m) return m[1] + '-' + ('0' + Number(m[2])).slice(-2) + '-' + ('0' + Number(m[3])).slice(-2);
  m = raw.toLowerCase().match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) return m[3] + '-' + ('0' + Number(m[2])).slice(-2) + '-' + ('0' + Number(m[1])).slice(-2);
  m = raw.toLowerCase().match(/^(\d{1,2})\/([a-z.]{3,5})\/(\d{4})$/);
  if (m) {
    var mapa = { 'jan':1,'jan.':1,'fev':2,'fev.':2,'mar':3,'mar.':3,'abr':4,'abr.':4,'mai':5,'mai.':5,'jun':6,'jun.':6,'jul':7,'jul.':7,'ago':8,'ago.':8,'set':9,'set.':9,'out':10,'out.':10,'nov':11,'nov.':11,'dez':12,'dez.':12 };
    var mes = mapa[m[2]];
    return mes ? m[3] + '-' + ('0' + mes).slice(-2) + '-' + ('0' + Number(m[1])).slice(-2) : '';
  }
  return '';
}

function validadeMedicamentoChip(m) {
  if (!m.validade) return '<span style="color:#9aa3b0">—</span>';
  var d = dateFromISO(m.validadeISO);
  if (!d) return esc(m.validade);
  var hoje = new Date(); hoje.setHours(0,0,0,0);
  var dias = Math.ceil((d.getTime() - hoje.getTime()) / 86400000);
  var cls = dias < 0 ? 'chip-red' : dias <= 90 ? 'chip-yellow' : 'chip-green';
  return '<span class="chip ' + cls + '">' + esc(m.validade) + '</span>';
}

function chipStatus(s) {
  if (!s || s === '—') return '<span style="color:#9aa3b0;">—</span>';
  var norm = s.trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  var m = {
    'pre-triagem':'chip-pretriagem','em triagem':'chip-emtriagem',
    'falha de triagem':'chip-falhatriagem','ativo':'chip-ativo',
    'em seguimento':'chip-emseguimento','concluido':'chip-concluido',
    'retirou consentimento':'chip-retirou','descontinuado':'chip-descontinuado',
    'perda de seguimento':'chip-perdaseguimento','obito':'chip-obito'
  };
  return '<span class="chip '+(m[norm]||'')+'">'+esc(s)+'</span>';
}

var _selEsp = '', _acIdx = -1;
function norm(s) { return String(s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }
function renderAcList(q) {
  var el = document.getElementById('acEspList');
  var matches = q ? ESPS.filter(function(e) { return norm(e).includes(norm(q)); }) : ESPS;
  _acIdx = -1;
  el.innerHTML = !matches.length
    ? '<div class="ac-empty">Nenhuma especialidade encontrada.</div>'
    : matches.map(function(e) {
        return '<div class="ac-item" data-val="' + esc(e) + '"'
          + ' onmousedown="event.preventDefault();selectEsp(\'' + e.replace(/'/g,"\\'") + '\')">'
          + esc(e) + '</div>';
      }).join('');
  el.classList.add('open');
}
function selectEsp(val) {
  _selEsp = val;
  document.getElementById('mEsp').value = val;
  document.getElementById('acEspList').classList.remove('open');
  document.getElementById('mEsp').classList.remove('invalid');
  document.getElementById('errMEsp').classList.remove('visible');
}
function fecharAcList() { document.getElementById('acEspList').classList.remove('open'); }
function navAcList(e) {
  var items = document.querySelectorAll('#acEspList .ac-item');
  if (!items.length) return;
  if (e.key==='ArrowDown')  { e.preventDefault(); _acIdx=Math.min(_acIdx+1,items.length-1); }
  else if (e.key==='ArrowUp')   { e.preventDefault(); _acIdx=Math.max(_acIdx-1,0); }
  else if (e.key==='Enter' && _acIdx>=0) { e.preventDefault(); selectEsp(items[_acIdx].dataset.val); return; }
  else if (e.key==='Escape') { fecharAcList(); return; }
  items.forEach(function(el,i) { el.classList.toggle('active',i===_acIdx); });
  if (_acIdx>=0) items[_acIdx].scrollIntoView({block:'nearest'});
}

var SEARCH_CLEAR_HANDLERS = {
  searchMedicos: 'filtrarMedicos',
  searchProjetos: 'filtrarProjetos',
  searchConfig: 'filtrarConfig',
  searchPrestadores: 'filtrarPrestadores',
  searchLabCentral: 'filtrarLabCentral',
  searchCouriers: 'filtrarCouriers',
  searchMonitores: 'filtrarMonitores',
  searchEquipamentos: 'filtrarEquipamentos',
  searchMedicamentos: 'filtrarMedicamentos',
  searchSolicitantes: 'filtrarSolicitantes',
  searchParticipantes: 'filtrarParticipantes',
  agendaBusca: 'renderAgendaOperacional',
  searchUsersAdmin: 'renderUsersAdmin',
  searchAudit: 'renderAuditLog',
  evSearch: 'evFiltrar'
};

function setupSearchClearButtons() {
  Object.keys(SEARCH_CLEAR_HANDLERS).forEach(function(inputId) {
    var input = document.getElementById(inputId);
    if (!input || input.dataset.clearReady === '1') return;
    var wrap = input.closest ? input.closest('.search-wrap, .ag-search') : input.parentNode;
    if (!wrap) return;
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'search-clear-btn';
    btn.title = 'Limpar busca';
    btn.setAttribute('aria-label', 'Limpar busca');
    btn.innerHTML = '<span class="material-symbols-outlined">close</span>';
    function updateClearState() {
      btn.classList.toggle('visible', !!String(input.value || '').trim());
    }
    function runHandler() {
      var handlerName = SEARCH_CLEAR_HANDLERS[inputId];
      if (handlerName && typeof window[handlerName] === 'function') window[handlerName]();
    }
    btn.addEventListener('click', function() {
      input.value = '';
      updateClearState();
      runHandler();
      input.focus();
    });
    input.addEventListener('input', updateClearState);
    wrap.appendChild(btn);
    input.dataset.clearReady = '1';
    updateClearState();
  });
}

document.addEventListener('DOMContentLoaded', setupSearchClearButtons);

// ── Autocomplete genérico para projetos ──────────────────────
function renderAcProj(inputId, listId, opts, selVar) {
  var q   = norm(document.getElementById(inputId).value || '');
  var el  = document.getElementById(listId);
  var matches = q ? opts.filter(function(o){ return norm(o).includes(q); }) : opts;
  _acIdxProj[listId] = -1;
  el.innerHTML = !matches.length
    ? '<div class="ac-empty">Nenhum resultado encontrado.</div>'
    : matches.map(function(o) {
        return '<div class="ac-item" data-val="' + esc(o) + '" onmousedown="event.preventDefault();pickAcProj(\'' + inputId + '\',\'' + listId + '\',\'' + o.replace(/'/g,"\\'") + '\',\'' + selVar + '\')">'
          + esc(o) + '</div>';
      }).join('');
  el.classList.add('open');
}
function pickAcProj(inputId, listId, val, selVar) {
  window[selVar] = val;
  document.getElementById(inputId).value = val;
  document.getElementById(listId).classList.remove('open');
  var errMap = { 'pEsp':'errPEsp', 'pIP':'errPIP' };
  if (errMap[inputId]) {
    document.getElementById(inputId).classList.remove('invalid');
    document.getElementById(errMap[inputId]).classList.remove('visible');
  }
}
function fecharAcProj(listId) { document.getElementById(listId).classList.remove('open'); }
function fixAcProj(inputId, listId, opts, selVar) {
  if (!opts.includes(document.getElementById(inputId).value)) {
    window[selVar] = ''; document.getElementById(inputId).value = '';
  }
}
function navAcProj(e, inputId, listId, opts, selVar) {
  var items = document.querySelectorAll('#' + listId + ' .ac-item');
  if (!items.length) return;
  var idx = _acIdxProj[listId] !== undefined ? _acIdxProj[listId] : -1;
  if (e.key==='ArrowDown')  { e.preventDefault(); idx = Math.min(idx+1, items.length-1); }
  else if (e.key==='ArrowUp')   { e.preventDefault(); idx = Math.max(idx-1, 0); }
  else if (e.key==='Enter' && idx>=0) { e.preventDefault(); pickAcProj(inputId, listId, items[idx].dataset.val, selVar); return; }
  else if (e.key==='Escape') { fecharAcProj(listId); return; }
  _acIdxProj[listId] = idx;
  items.forEach(function(el,i){ el.classList.toggle('active',i===idx); });
  if (idx>=0) items[idx].scrollIntoView({block:'nearest'});
}

function carregarProjetos() {
  document.getElementById('bodyProjetos').innerHTML =

      _medicosProj = ((res && res.medicos) || []).map(function(m){ return m.nome || m; });
      _solicitantesProj = ((res && res.solicitantes) || []).map(function(s){ return s.nome || s; });

function preencherSelectProjeto(id, valores, selected, placeholder) {
  var el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = '<option value="">' + esc(placeholder || '— Selecione —') + '</option>' +
    (valores || []).map(function(v) {
      var faseNorm = norm(v);
      var label = id === 'pFase' && !faseNorm.includes('fase') && faseNorm !== 'observacional' ? 'Fase ' + v : v;
      return '<option value="' + esc(v) + '">' + esc(label) + '</option>';
    }).join('');
  el.value = selected || '';
}

function renderProjetos(lista) {
  _projetos = lista || [];
  var esps = {}; var concluidos = 0; var projetosAtivos = 0; var ativosTotal = 0; var metaTotal = 0; var participantesTotal = 0; var falhasTotal = 0;
  _projetos.forEach(function(p){
    if (p.especialidade) esps[p.especialidade]=1;
    if (isProjetoStatusConcluido(p.status)) {
      concluidos++;
      return;
    }
    projetosAtivos++;
    ativosTotal += Number(p.participantesAtivos || 0) || 0;
    metaTotal += Number(p.metaRecrutamento || 0) || 0;
    participantesTotal += Number(p.totalParticipantes || 0) || 0;
    falhasTotal += Number(p.falhasTriagem || 0) || 0;
  });
  document.getElementById('projTotal').textContent = _projetos.length;
  document.getElementById('projFases').textContent = projetosAtivos;
  document.getElementById('projEsps').textContent  = Object.keys(esps).length;
  document.getElementById('projRecrutamento').textContent = ativosTotal + ' pacientes ativo(s)';
  document.getElementById('projRecrutamentoPct').textContent = 'Meta ' + (metaTotal || '—') + ' | Total ' + participantesTotal + (falhasTotal ? ' | Falhas ' + falhasTotal : '');
  document.getElementById('projConcluidos').textContent = concluidos;
  filtrarProjetos();
}

function filtrarProjetos() {
  var q = (document.getElementById('searchProjetos').value||'').toLowerCase().trim();
  var f = q ? _projetos.filter(function(p){
    return (p.nomeAbreviado||'').toLowerCase().includes(q)
        || (p.codigo||'').toLowerCase().includes(q)
        || (p.fase||'').toLowerCase().includes(q)
        || (p.especialidade||'').toLowerCase().includes(q)
        || (p.investigador||'').toLowerCase().includes(q)
        || (p.subInvestigador1||'').toLowerCase().includes(q)
        || (p.subInvestigador2||'').toLowerCase().includes(q)
        || (p.patrocinador||'').toLowerCase().includes(q)
        || (p.cro||'').toLowerCase().includes(q)
        || (p.centro||'').toLowerCase().includes(q)
        || (p.status||'').toLowerCase().includes(q);
  }) : _projetos;
  renderTabelaProj(f);
}

var FASE_COLORS = {'I':'#e8f0fe:#1266f1','II':'#e6f4ea:#137333','III':'#fff3e0:#e65100','IV':'#fce8e6:#b3261e'};
var FASE_AUTO_COLORS = [
  '#e0f2fe:#075985',
  '#dcfce7:#166534',
  '#fef3c7:#92400e',
  '#fae8ff:#86198f',
  '#ffe4e6:#be123c',
  '#ccfbf1:#0f766e',
  '#ede9fe:#5b21b6',
  '#fef9c3:#854d0e',
  '#e0e7ff:#3730a3',
  '#ffedd5:#c2410c'
];

function faseAutoColor(fase) {
  var n = norm(fase || '');
  var hash = 0;
  for (var i = 0; i < n.length; i++) hash = ((hash * 31) + n.charCodeAt(i)) >>> 0;
  return FASE_AUTO_COLORS[hash % FASE_AUTO_COLORS.length];
}

function chipFase(fase) {
  var c = (FASE_COLORS[fase] || faseAutoColor(fase)).split(':');
  var faseNorm = norm(fase);
  var label = faseNorm === 'observacional' || String(fase || '').toLowerCase().indexOf('fase') >= 0 ? fase : 'Fase ' + fase;
  return '<span class="chip" style="background:'+c[0]+';color:'+c[1]+'">' + esc(label) + '</span>';
}

function isProjetoStatusConcluido(status) {
  var n = norm(status || '');
  return n.indexOf('concluido') >= 0 || n.indexOf('concluida') >= 0;
}

function projetoStatusAutoColor(status) {
  var c = faseAutoColor('status:' + (status || '')).split(':');
  return c[1] + ':' + c[0];
}

function projetoStatusChip(status) {
  var s = status || '—';
  var n = String(s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  var color = n.indexOf('concluido') >= 0 ? '#137333:#e6f4ea' :
    n.indexOf('acompanhamento') >= 0 ? '#276a7b:#d7eef5' :
    n.indexOf('recrutamento') >= 0 ? '#0b8043:#d7f5cf' :
    n.indexOf('regulatoria') >= 0 ? '#9a4b16:#ffd8bd' :
    n.indexOf('close-out') >= 0 || n.indexOf('closeout') >= 0 ? '#3c4043:#eeeeee' :
    n.indexOf('cancelado') >= 0 ? '#c5221f:#fce8e6' : projetoStatusAutoColor(s);
  var p = color.split(':');
  return '<span class="chip" style="background:' + p[1] + ';color:' + p[0] + '">' + esc(s) + '</span>';
}

function recrutamentoProjetoHtml(p) {
  var concluido = isProjetoStatusConcluido(p.status);
  var ativos = Number(p.participantesAtivos || 0);
  var falhas = Number(p.falhasTriagem || 0);
  var total = Number(p.totalParticipantes || 0);
  var meta = Number(p.metaRecrutamento || 0);
  var pct = meta > 0 ? Math.min(100, Math.round((ativos * 1000) / meta) / 10) : 0;
  var pctLabel = meta > 0 ? pct.toLocaleString('pt-BR', { maximumFractionDigits: 1 }) + '%' : '—';
  var barColor = pct >= 100 ? '#137333' : pct >= 70 ? '#1266f1' : pct >= 35 ? '#e65100' : '#9aa3b0';
  var metricas = '<span class="chip" style="padding:2px 6px;font-size:10px;background:#eef1f5;color:#5f6b7c">Total: ' + esc(total) + '</span>' +
    (falhas > 0 ? '<span class="chip" style="padding:2px 6px;font-size:10px;background:#f3f4f6;color:#5f6b7c">Falha triagem: ' + esc(falhas) + '</span>' : '') +
    (!concluido ? '<span class="chip" style="padding:2px 6px;font-size:10px;background:#fff7e6;color:#9a4b16">Meta: ' + (meta > 0 ? esc(meta) : '—') + '</span>' : '');
  if (concluido) {
    return '<div style="min-width:148px;max-width:190px">' +
      '<div style="font-size:11px;font-weight:700;color:#137333;margin-bottom:5px">Projeto concluído</div>' +
      '<div style="display:flex;flex-wrap:wrap;gap:4px">' + metricas + '</div>' +
    '</div>';
  }
  return '<div style="min-width:148px;max-width:190px">' +
    '<div style="display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:5px">' +
      '<span class="chip chip-green" style="padding:2px 7px;font-size:10.5px">' + esc(ativos) + ' pacientes ativo(s)</span>' +
      '<span style="font-size:11px;font-weight:700;color:#5f6b7c">' + esc(pctLabel) + '</span>' +
    '</div>' +
    '<div style="height:7px;background:#eef1f5;border-radius:999px;overflow:hidden;border:1px solid #e0e6f0">' +
      '<div style="height:100%;width:' + esc(pct) + '%;background:' + barColor + ';border-radius:999px"></div>' +
    '</div>' +
    '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:5px">' + metricas + '</div>' +
  '</div>';
}
function renderTabelaProj(lista) {
  var tb = document.getElementById('bodyProjetos');

    tb.innerHTML='<tr class="empty-row"><td colspan="9">Nenhum projeto encontrado.</td></tr>';

  }
  tb.innerHTML = lista.map(function(p) {
    var ini  = (p.nomeAbreviado||'?')[0].toUpperCase();
    var sStr = JSON.stringify(p).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    var codigoHtml = p.codigo
      ? '<div style="font-size:11px;color:#9aa3b0;margin-top:2px;">'+esc(p.codigo)+'</div>'
      : '';
    var coordHtml = p.coordenador
      ? '<div style="font-size:11px;color:#9aa3b0;margin-top:2px;">Coord.: '+esc(p.coordenador)+'</div>'
      : '';
    var subs = [p.subInvestigador1, p.subInvestigador2].filter(Boolean);
    var subsHtml = subs.length
      ? '<div style="font-size:11px;color:#5f6b7c;margin-top:3px;">Sub: '+esc(subs.join(' / '))+'</div>'
      : '';
    var croHtml = p.cro
      ? '<div style="font-size:11px;color:#9aa3b0;margin-top:4px;">'+esc(p.cro)+'</div>'
      : '<div style="font-size:11px;color:#9aa3b0;margin-top:4px;">—</div>';
    return '<tr>'
      + '<td><div class="name-cell"><div class="row-avatar" style="border-radius:8px;">' + ini + '</div>'
      + '<div><div class="row-name">' + esc(p.nomeAbreviado||'—') + '</div>'
      + codigoHtml + '</div></div></td>'
      + '<td>' + (p.fase ? chipFase(p.fase) : '—') + '</td>'
      + '<td><span class="chip chip-blue">' + esc(p.especialidade||'—') + '</span></td>'
      + '<td><div class="row-name" style="font-size:13px;">' + esc(p.investigador||'—') + '</div>'
      + subsHtml + coordHtml + '</td>'
      + '<td><div class="row-name" style="font-size:13px;">' + esc(p.patrocinador||'—') + '</div>' + croHtml + '</td>'
      + '<td>' + recrutamentoProjetoHtml(p) + '</td>'
      + '<td class="wide-only" style="color:#5f6b7c;">' + esc(p.centro || '—') + '</td>'
      + '<td>' + projetoStatusChip(p.status) + '</td>'
      + '<td><div class="action-btns">'
      + '<button class="icon-btn" title="Editar" onclick=\'abrirFormProjeto(' + sStr + ')\'>'
      + '<span class="material-symbols-outlined">edit</span></button>'
      + '<button class="icon-btn del" title="Excluir" onclick=\'confirmarExcluirProj("' + esc(p.id) + '","' + esc(p.nomeAbreviado||'') + '")\'>'
      + '<span class="material-symbols-outlined">delete</span></button>'
      + '</div></td></tr>';
  }).join('');
}

function salvarProjetoApp() {
  var btn = document.getElementById('btnSalvarProj');

  var nome = document.getElementById('pNome').value.trim();
  if (!nome) {
    document.getElementById('pNome').classList.add('invalid');
    document.getElementById('errPNome').classList.add('visible'); ok=false;
  } else {
    document.getElementById('pNome').classList.remove('invalid');
    document.getElementById('errPNome').classList.remove('visible');
  }
  if (!document.getElementById('pFase').value) {
    document.getElementById('pFase').classList.add('invalid');
    document.getElementById('errPFase').classList.add('visible'); ok=false;
  } else {
    document.getElementById('pFase').classList.remove('invalid');
    document.getElementById('errPFase').classList.remove('visible');
  }
  if (!document.getElementById('pStatus').value) {
    document.getElementById('pStatus').classList.add('invalid');
    document.getElementById('errPStatus').classList.add('visible'); ok=false;
  } else {
    document.getElementById('pStatus').classList.remove('invalid');
    document.getElementById('errPStatus').classList.remove('visible');
  }
  if (!_selPEsp) {
    document.getElementById('pEsp').classList.add('invalid');
    document.getElementById('errPEsp').classList.add('visible'); ok=false;
  } else {
    document.getElementById('pEsp').classList.remove('invalid');
    document.getElementById('errPEsp').classList.remove('visible');
  }
  if (!_selPIP) {
    document.getElementById('pIP').classList.add('invalid');
    document.getElementById('errPIP').classList.add('visible'); ok=false;
  } else {
    document.getElementById('pIP').classList.remove('invalid');
    document.getElementById('errPIP').classList.remove('visible');
  }
  if (!ok) return;
  btn.disabled=true;
  document.getElementById('statusProj').innerHTML='<span style="color:#5f6b7c;">⏳ Processando…</span>';
  google.script.run
    .withSuccessHandler(function(r){
      btn.disabled=false;
      document.getElementById('statusProj').innerHTML='';
      fecharOverlay('modalProjeto');
      snack('✅ '+r);
      carregarProjetos();
    })
    .withFailureHandler(function(e){
      btn.disabled=false;
      document.getElementById('statusProj').innerHTML='<span style="color:#e53935;">⚠ '+e.message+'</span>';
    })
    .salvarDadosProjeto({
      id:            document.getElementById('editProjId').value,
      nomeAbreviado: nome,
      codigo:        document.getElementById('pCodigo').value.trim(),
      fase:          document.getElementById('pFase').value,
      metaRecrutamento: document.getElementById('pMeta').value,
      status:        document.getElementById('pStatus').value,
      especialidade: _selPEsp,
      investigador:  _selPIP,
      subInvestigador1: _selPSub1,
      subInvestigador2: _selPSub2,
      coordenador:   _selPCoord,
      patrocinador:  _selPPat,
      cro:           _selPCRO,
      centro:        document.getElementById('pCentro').value.trim(),
      numeroCE:      document.getElementById('pNumeroCE').value.trim(),
      expedienteCE:  document.getElementById('pExpedienteCE').value.trim(),
      tituloCompleto:document.getElementById('pTituloCompleto').value.trim()
    });
}

    .withSuccessHandler(function(res) {
      _monProjetos = (res && res.projetos) || [];
      renderMonitores((res && res.data) || []);
    })
    .withFailureHandler(function(e) { snackErro(e.message); })
    .getCadastrosBootstrapData('monitores');
}

function preencherSelectMonitorProjeto(id, selected) {
  var el = document.getElementById(id);
  if (!el) return;
  var valores = (_monProjetos || []).slice();
  if (selected && valores.indexOf(selected) === -1) valores.unshift(selected);
  el.innerHTML = '<option value="">— Selecione —</option>' +
    valores.map(function(p) {
      return '<option value="' + esc(p) + '">' + esc(p) + '</option>';
    }).join('');
  el.value = selected || '';
}

function monitorUnblindedValor(v) {
  return normAgenda(v) === 'sim' ? 'Sim' : 'Não';
}

function monitorProjetosDetalhes(m) {
  if (!m) return [];
  if (m.projetosDetalhes && m.projetosDetalhes.length) {
    return m.projetosDetalhes.map(function(p) {
      return {
        projeto: String((p && p.projeto) || '').trim(),
        unblinded: monitorUnblindedValor((p && p.unblinded) || '')
      };
    }).filter(function(p) { return p.projeto; });
  }
  if (m.projetos && m.projetos.length) {
    return m.projetos.map(function(p, idx) {
      return {
        projeto: String(p || '').trim(),
        unblinded: monitorUnblindedValor(m['unblinded' + (idx + 1)] || '')
      };
    }).filter(function(p) { return p.projeto; });
  }
  return [1, 2, 3, 4].map(function(i) {
    return {
      projeto: String(m['projeto' + i] || '').trim(),
      unblinded: monitorUnblindedValor(m['unblinded' + i] || '')
    };
  }).filter(function(p) { return p.projeto; });
}

function monitorProjetos(m) {
  return monitorProjetosDetalhes(m).map(function(p) { return p.projeto; });
}

function renderMonitores(lista) {
  _monitores = lista || [];
  var projetos = {};
  var multi = 0;
  _monitores.forEach(function(m) {
    var ps = monitorProjetos(m);
    if (ps.length > 1) multi++;
    ps.forEach(function(p) { projetos[p] = 1; });
  });
  document.getElementById('monTotal').textContent = _monitores.length || '0';
  document.getElementById('monProjetos').textContent = Object.keys(projetos).length || '0';
  document.getElementById('monMulti').textContent = multi || '0';
  filtrarMonitores();
}

function filtrarMonitores() {
  var q = (document.getElementById('searchMonitores').value || '').toLowerCase().trim();
  var f = q ? _monitores.filter(function(m) {
    return (m.nome || '').toLowerCase().includes(q)
        || (m.email || '').toLowerCase().includes(q)
        || (m.telefone || '').toLowerCase().includes(q)
        || monitorProjetosDetalhes(m).map(function(p) { return p.projeto + ' ' + p.unblinded; }).join(' ').toLowerCase().includes(q);
  }) : _monitores;
  renderTabelaMonitores(f);
}

function renderTabelaMonitores(lista) {
  var tb = document.getElementById('bodyMonitores');
  if (!lista.length) {
    tb.innerHTML = '<tr class="empty-row"><td colspan="5">Nenhum monitor encontrado.</td></tr>';
    return;
  }
  tb.innerHTML = lista.map(function(m) {
    var ini = (m.nome || '?')[0].toUpperCase();
    var sStr = JSON.stringify(m).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    var idAttr = esc(m.id).replace(/'/g, '&#39;');
    var nomeAttr = esc(m.nome || '').replace(/'/g, '&#39;');
    var projetos = monitorProjetosDetalhes(m);
    var projetosHtml = projetos.length
      ? projetos.map(function(p) {
          var extra = normAgenda(p.unblinded) === 'sim' ? ' · Unblinded' : '';
          return '<span class="chip chip-blue" style="margin:2px 4px 2px 0">' + esc(p.projeto + extra) + '</span>';
        }).join('')
      : '<span style="color:#9aa3b0;">—</span>';
    return '<tr>'
      + '<td><div class="name-cell"><div class="row-avatar" style="border-radius:8px;">' + esc(ini) + '</div>'
      + '<div><div class="row-name">' + esc(m.nome || '—') + '</div></div></div></td>'
      + '<td style="color:#5f6b7c;">' + esc(m.email || '—') + '</td>'
      + '<td style="color:#5f6b7c;">' + esc(m.telefone || '—') + '</td>'
      + '<td>' + projetosHtml + '</td>'
      + '<td style="text-align:right;"><div class="action-btns">'
      + '<button class="icon-btn" title="Editar" onclick=\'abrirFormMonitor(' + sStr + ')\'><span class="material-symbols-outlined">edit</span></button>'
      + '<button class="icon-btn del" title="Excluir" onclick=\'confirmarExcluirMonitor("' + idAttr + '","' + nomeAttr + '")\'><span class="material-symbols-outlined">delete</span></button>'
      + '</div></td></tr>';
  }).join('');
}

function abrirFormMonitor(m) {
  var modalMonitor = document.getElementById('modalMonitor');
  if (modalMonitor) {
    delete modalMonitor.dataset.agendaOrigem;
    modalMonitor.style.zIndex = '';
  }
  ['monNome','monEmail','monTelefone'].forEach(function(id) { document.getElementById(id).value = ''; });

    document.getElementById('monNome').value = m.nome || '';

    document.getElementById('monTelefone').value = m.telefone || '';

    preencherSelectMonitorProjeto('monProjeto2', m.projeto2 || '');
    preencherSelectMonitorProjeto('monProjeto3', m.projeto3 || '');
    preencherSelectMonitorProjeto('monProjeto4', m.projeto4 || '');
    document.getElementById('monUnblinded1').value = monitorUnblindedValor(m.unblinded1 || '');
    document.getElementById('monUnblinded2').value = monitorUnblindedValor(m.unblinded2 || '');
    document.getElementById('monUnblinded3').value = monitorUnblindedValor(m.unblinded3 || '');
    document.getElementById('monUnblinded4').value = monitorUnblindedValor(m.unblinded4 || '');
  } else {
    document.getElementById('modalMonitorTitle').textContent = 'CADASTRO DE MONITOR';

function salvarMonitorApp() {
  var nome = document.getElementById('monNome').value.trim();
  var projeto1 = document.getElementById('monProjeto1').value;
  var modalMonitor = document.getElementById('modalMonitor');
  var veioDaAgenda = modalMonitor && modalMonitor.dataset.agendaOrigem === '1';

    document.getElementById('errMonNome').classList.add('visible');

  } else {
    document.getElementById('monNome').classList.remove('invalid');

  if (!projeto1) {

    document.getElementById('errMonProjeto1').classList.add('visible');
    ok = false;
  } else {
    document.getElementById('monProjeto1').classList.remove('invalid');

  var btn = document.getElementById('btnSalvarMonitor');

    .withSuccessHandler(function(r) {

      projeto3: document.getElementById('monProjeto3').value,
      unblinded3: document.getElementById('monUnblinded3').value,
      projeto4: document.getElementById('monProjeto4').value,

    });
}

    .withSuccessHandler(function(res) {

//  REQUISIÇÃO DE EXAMES — JavaScript

var _reqInited = false;
var _rqParticipantes      = [];
var _rqParticipantesNomes = [];
var _rqPrestadores        = [];
var _rqPrestadoresNomes   = [];
var _rqSolicitantes       = [];
var _rqSolicitantesNomes  = [];
var _rqSelPaciente    = null;
var _rqSelLocal       = null;
var _rqSelSolicitante = null;
var _rqUrgente        = false;
var _rqAcIdx          = {};
var _rqParticipantesLoaded = false;
var _rqPrestadoresLoaded = false;
var _rqSolicitantesLoaded = false;
var _rqLoadCallbacks = [];
var _rqAgendaOrigemId = '';
var _rqOrigemContext = null;

function initRequisicao() {
  if (_reqInited) return;
  _reqInited = true;
  document.getElementById('rqPacienteList').innerHTML =
    '<div class="ac-loading"><div class="ac-spin"></div>Carregando...</div>';
  google.script.run
    .withSuccessHandler(function(lista) {
      _rqParticipantes      = lista || [];
      _rqParticipantesNomes = _rqParticipantes.map(function(p) { return p.nome; });
      _rqParticipantesLoaded = true;
      flushRequisicaoLoadCallbacks();
    })
    .withFailureHandler(function(e) { _rqParticipantesLoaded = true; flushRequisicaoLoadCallbacks(); snackErro(e.message); })
    .buscarParticipantesRequisicao();
  google.script.run
    .withSuccessHandler(function(lista) {
      _rqPrestadores      = lista || [];
      _rqPrestadoresNomes = _rqPrestadores.map(function(p){ return p.empresa; });
      _rqPrestadoresLoaded = true;
      flushRequisicaoLoadCallbacks();
    })
    .withFailureHandler(function(e) { _rqPrestadoresLoaded = true; flushRequisicaoLoadCallbacks(); snackErro(e.message); })
    .buscarPrestadoresParaRequisicao();
  google.script.run
    .withSuccessHandler(function(lista) {
      _rqSolicitantes      = lista || [];
      _rqSolicitantesNomes = _rqSolicitantes.map(function(s){ return s.nome; });
      _rqSolicitantesLoaded = true;
      preencherSolicitanteUsuarioAtual();
      flushRequisicaoLoadCallbacks();
    })
    .withFailureHandler(function(e) { _rqSolicitantesLoaded = true; flushRequisicaoLoadCallbacks(); snackErro(e.message); })
    .buscarSolicitantesCompleto();
  var listaExames = document.getElementById('rqExamesLista') || document.getElementById('examList');
  if (listaExames && !listaExames.children.length) adicionarExame();
}

function requisicaoDadosCarregados() {
  return _rqParticipantesLoaded && _rqPrestadoresLoaded && _rqSolicitantesLoaded;
}

function flushRequisicaoLoadCallbacks() {
  if (!requisicaoDadosCarregados()) return;
  var callbacks = _rqLoadCallbacks.splice(0);
  callbacks.forEach(function(cb) {
    try { cb(); } catch(e) { snackErro(e.message || e); }
  });
}

function ensureRequisicaoDataLoaded(callback) {
  initRequisicao();
  if (requisicaoDadosCarregados()) {
    callback();
    return;
  }
  _rqLoadCallbacks.push(callback);
}

// ── Autocomplete genérico para o form de requisição ──────────────────────
function _rqNorm(s) {
  return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
}

function renderReqAC(inputId, listId, opts, selVarName) {
  var q = _rqNorm(document.getElementById(inputId).value);
  var el = document.getElementById(listId);
  var matches = q
    ? opts.filter(function(o) { return _rqNorm(o).includes(q); })
    : opts.slice(0, 40);
  _rqAcIdx[listId] = -1;
  el.innerHTML = '';
  if (!matches.length) {
    el.innerHTML = '<div class="ac-empty">Nenhum resultado encontrado.</div>';
  } else {
    matches.forEach(function(o) {
      var div = document.createElement('div');
      div.className = 'ac-item';
      div.dataset.val = o;
      div.textContent = o;
      div.addEventListener('mousedown', function(evt) {
        evt.preventDefault();
        pickReqAC(inputId, listId, o, selVarName);
      });
      el.appendChild(div);
    });
  }
  el.classList.add('open');
}

function pickReqAC(inputId, listId, val, selVarName) {
  window[selVarName] = val;
  document.getElementById(inputId).value = val;
  document.getElementById(listId).classList.remove('open');
  if (inputId === 'rqPrestador') preencherEnderecoReq();
  if (inputId === 'rqPaciente') preencherDadosPaciente();
  if (inputId === 'rqSolicitante') preencherDadosSolicitante();
}

function fecharReqAC(listId) {
  var el = document.getElementById(listId);
  if (el) el.classList.remove('open');
}

function navReqAC(e, inputId, listId, opts, selVarName) {
  var items = document.querySelectorAll('#' + listId + ' .ac-item');
  if (!items.length) return;
  var idx = _rqAcIdx[listId] !== undefined ? _rqAcIdx[listId] : -1;
  if (e.key === 'ArrowDown')  { e.preventDefault(); idx = Math.min(idx+1, items.length-1); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); idx = Math.max(idx-1, 0); }
  else if (e.key === 'Enter' && idx >= 0) {
    e.preventDefault();
    pickReqAC(inputId, listId, items[idx].dataset.val, selVarName);
    return;
  } else if (e.key === 'Escape') { fecharReqAC(listId); return; }
  _rqAcIdx[listId] = idx;
  items.forEach(function(el,i){ el.classList.toggle('active', i===idx); });
  if (idx >= 0) items[idx].scrollIntoView({block:'nearest'});
}

// ── Auto-preenchimento ────────────────────────────────────────────────────
function preencherDadosPaciente() {
  var nome = document.getElementById('rqPaciente').value.trim();
  var p = _rqParticipantes.find(function(x){ return x.nome === nome; });
  if (p) {
    document.getElementById('rqNascimento').value  = p.nascimento || '';
    document.getElementById('rqProtocolo').value   = p.protocolo  || '';
    document.getElementById('rqMedico').value      = p.medico     || '';
    carregarReqPreloadProjeto(p.protocolo || '');
  } else {
    ['rqNascimento','rqProtocolo','rqMedico'].forEach(function(id){
      document.getElementById(id).value = '';
    });
  }
}

function carregarReqPreloadProjeto(projeto) {
  projeto = String(projeto || '').trim();
  if (!projeto || typeof google === 'undefined' || !google.script || !google.script.run) return;
  google.script.run
    .withSuccessHandler(function(exames) {
      exames = exames || [];
      if (!exames.length) return;
      var atuais = Array.from(document.querySelectorAll('#rqExamesLista .exam-input, #examList .exam-input'))
        .map(function(i){ return i.value.trim(); }).filter(Boolean);
      if (atuais.length && !confirm('Substituir os exames atuais pelo preload do projeto ' + projeto + '?')) return;
      preencherReqExames(exames);
      snack('Exames padrao do projeto carregados.');
    })
    .withFailureHandler(function(e) { snackErro(e.message || e); })
    .getReqExamesPreloadProjeto(projeto);
}

function preencherReqExames(exames) {
  exames = (exames || []).slice(0, 40);
  var lista = document.getElementById('rqExamesLista') || document.getElementById('examList');
  if (!lista) return;
  lista.innerHTML = '';
  var qtd = Math.max(1, exames.length);
  for (var i = 0; i < qtd; i++) {
    adicionarExame();
    var inputs = document.querySelectorAll('#rqExamesLista .exam-input, #examList .exam-input');
    if (inputs[i]) inputs[i].value = exames[i] || '';
  }
  updateExamCount();
}

function getProjetoRequisicaoAtual() {
  var el = document.getElementById('rqProtocolo');
  return el ? el.value.trim() : '';
}

function examesAtuaisRequisicao() {
  return Array.from(document.querySelectorAll('#rqExamesLista .exam-input, #examList .exam-input'))
    .map(function(i){ return i.value.trim(); })

function abrirReqPreloadModal() {

function salvarReqPreloadProjeto() {
  var projeto = document.getElementById('reqPreloadProjeto').value.trim();

function preencherSolicitanteUsuarioAtual() {
  var input = document.getElementById('rqSolicitante');
  if (!input || input.value.trim() || !_rqSolicitantes.length) return;
  google.script.run
    .withSuccessHandler(function(email) {
      email = String(email || '').toLowerCase().trim();
      if (!email || input.value.trim()) return;
      var solicitante = _rqSolicitantes.find(function(s) {
        return String(s.email || '').toLowerCase().trim() === email;

// ── Gerenciamento de exames ───────────────────────────────────────────────
function adicionarExame() {
  var lista = document.getElementById('rqExamesLista') || document.getElementById('examList');
  if (!lista) return;
  var total = lista.children.length;
  if (total >= 40) { snack('Limite de 40 exames atingido.'); return; }
  var num = total + 1;
  var row = document.createElement('div');
  row.className = 'exam-row';
  row.innerHTML =
    '<div class="exam-num">' + num + '</div>' +
    '<input type="text" class="exam-input" placeholder="Descrição do exame ' + num + '">' +
    '<button class="exam-remove" onclick="removerExame(this)" title="Remover">' +
      '<span class="material-symbols-outlined">close</span>' +
    '</button>';
  lista.appendChild(row);
  updateExamCount();
  var btnAdd = document.getElementById('rqBtnAddExam');
  if (btnAdd) btnAdd.style.display = lista.children.length >= 40 ? 'none' : '';
}

function addExam() { adicionarExame(); }

function removerExame(btn) {
  var row = btn.closest('.exam-row');
  row.parentNode.removeChild(row);
  var rows = document.querySelectorAll('#rqExamesLista .exam-row, #examList .exam-row');
  rows.forEach(function(r, i) {
    r.querySelector('.exam-num').textContent = i + 1;
    r.querySelector('.exam-input').placeholder = 'Descrição do exame ' + (i + 1);
  });
  updateExamCount();
  var btnAdd = document.getElementById('rqBtnAddExam');
  if (btnAdd) btnAdd.style.display = '';
}

function updateExamCount() {
  var n = document.querySelectorAll('#rqExamesLista .exam-row, #examList .exam-row').length;
  var count = document.getElementById('rqExamCount') || document.getElementById('examCount');
  if (count) count.textContent = n + (count.id === 'examCount' ? ' exame(s)' : ' / 40 exames');
}

function getExames() {
  var inputs = document.querySelectorAll('#rqExamesLista .exam-input, #examList .exam-input');
  return Array.from(inputs)
    .map(function(i){ return i.value.trim(); })
    .filter(Boolean)
    .slice(0, 40);
}

// ── Geração do PDF ────────────────────────────────────────────────────────
function gerarRequisicao() {
  var paciente = document.getElementById('rqPaciente').value.trim();
  var localEl  = document.getElementById('rqLocalExame') || document.getElementById('rqPrestador');
  var local    = localEl ? localEl.value.trim() : '';
  var dataEl   = document.getElementById('rqData');
  var data     = dataEl ? dataEl.value : '';
  var sol      = document.getElementById('rqSolicitante').value.trim();
  var erros = [];
  if (!paciente) erros.push('Paciente');
  if (!local)    erros.push('Local do Exame');
  if (!data)     erros.push('Data do Exame');
  if (!sol)      erros.push('Solicitante');
  if (erros.length) {
    snackErro('Campos obrigatórios: ' + erros.join(', '));
    return;
  }
  var solObj = _rqSolicitantes.find(function(s){ return s.nome === sol; }) || {};
  var btn = document.getElementById('rqBtnGerar') || document.getElementById('btnSalvarReq');
  var statusEl = document.getElementById('rqStatus') || document.getElementById('statusReq');
  if (btn) btn.disabled = true;
  statusEl.innerHTML = '<span style="color:#5f6b7c">⏳ Gerando PDF e rascunho de e-mail...</span>';
  var dados = {
    paciente:        paciente,
    nascimento:      document.getElementById('rqNascimento').value,
    protocolo:       document.getElementById('rqProtocolo').value,
    medico:          document.getElementById('rqMedico').value,
    localExame:      local,
    endereco:        document.getElementById('rqEndereco').value,
    dataAgendamento: data,
    horario:         document.getElementById('rqHorario').value,
    exames:          getExames(),
    observacoes:     document.getElementById('rqObs').value.trim(),
    urgente:         _rqUrgente,
    solicitante:     sol,
    solFormacao:     solObj.formacao || '',
    solRegistro:     solObj.registro || '',
    agendaId:        _rqOrigemContext && _rqOrigemContext.tipo === 'agenda' ? (_rqOrigemContext.agendaId || '') : '',
    requestedByEmail: solObj.email || (window.APP_BOOTSTRAP_DATA && window.APP_BOOTSTRAP_DATA.access ? window.APP_BOOTSTRAP_DATA.access.email : '')
  };
  google.script.run
    .withSuccessHandler(function(res) {
      var msg = res && typeof res === 'object' ? (res.message || 'Rascunho de e-mail criado com sucesso!') : res;
      btn.disabled = false;
      statusEl.innerHTML = '<span style="color:#137333">✓ ' + esc(msg) + '</span>';
      var warnings = res && typeof res === 'object' ? [res.preloadWarning, res.statusWarning].filter(Boolean) : [];
      if (warnings.length) snackErro(warnings.join(' '));
      else snack('✓ Rascunho criado com sucesso!');
      finalizarRequisicaoAposSucesso(res && res.statusRequisicao);
      limparRequisicaoForm();
    })
    .withFailureHandler(function(e) {
      btn.disabled = false;
      statusEl.innerHTML = '<span style="color:#e53935">✗ ' + esc(e.message) + '</span>';
      snackErro(e.message);
    })
    .gerarRequisicaoPDF(dados);
}

function finalizarRequisicaoAposSucesso(statusRequisicao) {
  var origem = _rqOrigemContext || {};
  if (origem.tipo === 'agenda' && origem.agendaId) {
    if (statusRequisicao) aplicarStatusRequisicaoAgendaLocal(origem.agendaId, statusRequisicao, true);
    else marcarAgendaRequisicaoEnviadaLocal(origem.agendaId, true);
    return;
  }
  if (origem.tipo === 'participante') {
    var participante = origem.participante || null;
    irPara('participantes');
    setTimeout(function() {
      if (participante) abrirFormPart(participante);
    }, 120);
  }
}

function snackErro(msg) { snack('⚠ ' + msg); }
